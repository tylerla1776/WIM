// ---- Real item statuses ----
// Listed    = actively listed on eBay (green)
// Created   = built in WIM and sent for review, but not on eBay yet (blue)
// Active    = in inventory, not listed, not sold (default — what everything was before)
// Sold      = sold but not yet completed through the fulfillment workflow
// Inactive  = historical: sold+completed, deleted, or zero on-hand
// The old i.sold boolean is kept in sync so existing code that reads it still works.
function itemStatus(it){
  if(it.status) return it.status;
  if(it.sold) return "inactive";
  if(it.listing && it.listing.status==="listed") return "listed";
  return "active";
}
function itemStatusLabel(it){ return {listed:"Listed",created:"Created",active:"Active",sold:"Sold",inactive:"Inactive"}[itemStatus(it)]||"Active"; }
function itemStatusColor(it){ return {listed:"#1f7244",created:"#1a5fa8",active:"#444",sold:"#7a5200",inactive:"#888"}[itemStatus(it)]||"#444"; }
function setItemStatus(it,st){
  it.status=st;
  // Keep the old boolean in sync so nothing else breaks
  it.sold = (st==="inactive");
  if(st==="sold"||st==="inactive"){ if(!it.soldAt) it.soldAt=new Date().toISOString(); }
  else { it.soldAt=null; it.soldBy=null; }
}
// Simulated items (Simulation Mode) are hidden from every real list the instant the mode
// is turned off — this is what "turning it off reverts to the real application" actually
// means. Data isn't deleted, just hidden, so turning it back on instantly restores the
// demo state without needing to reload anything.
function visibleItems(){ return DB.simulationMode ? DB.items : DB.items.filter(i=>!i.simulated); }
function activeItems(){ return visibleItems().filter(i=>!i.sold && itemStatus(i)!=="inactive" && itemStatus(i)!=="sold"); }
function soldItems(){ return visibleItems().filter(i=>i.sold||itemStatus(i)==="inactive"); }
function listedItems(){ return visibleItems().filter(i=>itemStatus(i)==="listed"); }
// ---- Fulfillment workflow data ----
// it.fulfillment holds everything specific to a sold-and-being-shipped item: which eBay
// order it came from, the buyer's shipping info, and which stage it's at within
// Fulfillment (recentlySold -> readyToShip/shipped -> completed). Kept separate from the
// item's normal fields so a reactivated/returned item doesn't carry stale shipping data.
function ensureFulfillment(it){ if(!it.fulfillment) it.fulfillment={ stage:"recentlySold", orderId:null, lineItemId:null, buyer:null, shipTo:null, soldPrice:null, soldAt:null, movedToShippingAt:null, shippedAt:null, completedAt:null, trackingNumber:null, sentToCatalogAt:null }; return it.fulfillment; }
function fulfillmentItems(stage){ return visibleItems().filter(i=>itemStatus(i)==="sold" && i.fulfillment && i.fulfillment.stage===stage); }
function createdItems(){ return visibleItems().filter(i=>itemStatus(i)==="created"); }
function activeInSlot(slotId,ex){ return activeItems().filter(i=>i.slot===slotId&&i.id!==ex); }
function takenPlacements(slotId,ex){ return new Set(activeInSlot(slotId,ex).map(i=>i.placement)); }
function lowestPlacement(slotId,ex){ const s=slotById(slotId); if(!s) return null; const t=takenPlacements(slotId,ex);
  for(let p=1;p<=s.skuLimit;p++){ if(!t.has(p)) return p; } return null; }
function autoSlot(ex,category){ const c=DB.slots.filter(s=>!s.manualOnly&&(category==null||slotHasCat(s,category))&&activeInSlot(s.id,ex).length<s.skuLimit);
  if(!c.length) return null; c.sort((a,b)=>{ const ca=activeInSlot(a.id,ex).length,cb=activeInSlot(b.id,ex).length;
    if(ca!==cb)return ca-cb; return a.id.localeCompare(b.id,undefined,{numeric:true}); });
  const s=c[0],p=lowestPlacement(s.id,ex); if(p===null) return null; return {slot:s.id,placement:p}; }
function skuOf(slotId,p){ return slotId+"."+pad2(p); }
function lowestRun(free,len){ // free = sorted ascending placement numbers; return first run of consecutive numbers of given length, or null
  for(let i=0;i+len<=free.length;i++){ let ok=true; for(let k=1;k<len;k++){ if(free[i+k]!==free[i]+k){ ok=false; break; } } if(ok) return free.slice(i,i+len); }
  return null;
}
function freeIn(slotId,ex,sim){ const s=slotById(slotId); if(!s) return []; const t=sim&&sim[slotId]?sim[slotId]:takenPlacements(slotId,ex); const out=[]; for(let p=1;p<=s.skuLimit;p++){ if(!t.has(p)) out.push(p); } return out; }
// Allocate n placements within slots of the given Category, keeping them together & consecutive
// when possible; prefers a single slot that fits all n, otherwise spills into the roomiest slots.
function allocateMulti(n,ex,category){
  const slotsOf=()=>DB.slots.filter(s=>!s.manualOnly&&(category==null||slotHasCat(s,category)));
  const sim={}; const t=id=>{ if(!sim[id]) sim[id]=new Set(takenPlacements(id,ex)); return sim[id]; };
  const result=[];
  const single=slotsOf().map(s=>({s,free:freeIn(s.id,ex)})).filter(c=>c.free.length>=n);
  if(single.length){
    single.forEach(c=>{ c.run=lowestRun(c.free,n); });
    single.sort((a,b)=> (b.run?1:0)-(a.run?1:0)
      || (activeInSlot(a.s.id,ex).length-activeInSlot(b.s.id,ex).length)
      || a.s.id.localeCompare(b.s.id,undefined,{numeric:true}));
    const c=single[0]; const spots=c.run?c.run:c.free.slice(0,n);
    spots.forEach(p=>result.push({slot:c.s.id,placement:p}));
    return result;
  }
  let remaining=n;
  while(remaining>0){
    const cands=slotsOf().map(s=>({s,free:freeIn(s.id,ex,sim)})).filter(c=>c.free.length>0);
    if(!cands.length) break;
    cands.sort((a,b)=> b.free.length-a.free.length || a.s.id.localeCompare(b.s.id,undefined,{numeric:true}));
    const c=cands[0], take=Math.min(c.free.length,remaining);
    c.free.slice(0,take).forEach(p=>{ result.push({slot:c.s.id,placement:p}); t(c.s.id).add(p); });
    remaining-=take;
  }
  return result; // length may be < n if there isn't room in this Category
}
function allocateInSlot(slotId,n,ex){ // manual slot: place n together in this slot, consecutive if possible
  const free=freeIn(slotId,ex); if(free.length<n) return null;
  const run=lowestRun(free,n); return (run||free.slice(0,n)).map(p=>({slot:slotId,placement:p}));
}
function restoreSlot(it){
  if(!it.slot||!slotById(it.slot)){ const r=autoSlot(it.id,it.section); if(r){ it.slot=r.slot;it.placement=r.placement;it.sku=skuOf(r.slot,r.placement);} else {it.slot="";it.placement=null;it.sku="";} return; }
  const slot=slotById(it.slot), taken=takenPlacements(it.slot,it.id);
  if(it.placement&&!taken.has(it.placement)&&it.placement<=slot.skuLimit){ it.sku=skuOf(it.slot,it.placement); return; }
  const lp=lowestPlacement(it.slot,it.id);
  if(lp!=null){ it.placement=lp; it.sku=skuOf(it.slot,lp); }
  else { const r=autoSlot(it.id,it.section); if(r){it.slot=r.slot;it.placement=r.placement;it.sku=skuOf(r.slot,r.placement);} else {it.slot="";it.placement=null;it.sku="";} }
}
function fmtDate(iso){ if(!iso)return "—"; const d=new Date(iso); return d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function fmtDay(iso){ if(!iso)return "—"; return new Date(iso).toLocaleDateString(); }

/* ---- item-number grouping (same Item Number = quantity of one item) ---- */
function skuCmp(a,b){ const sa=a||"\uffff", sb=b||"\uffff"; return sa.localeCompare(sb,undefined,{numeric:true}); }
function groupKey(it){ const n=(it.upc||"").trim(); return n?("#"+n):("@"+it.id); } // blank item numbers stay individual
function unitsOf(it){ // active units sharing this item number, ordered by SKU (closest to A.1.01 first)
  const k=groupKey(it); return activeItems().filter(x=>groupKey(x)===k).sort((a,b)=>skuCmp(a.sku,b.sku)); }
function groupQty(it){ return unitsOf(it).reduce((n,u)=>n+(parseFloat(u.onHand)||1),0); }
function firstUnit(it){ const u=unitsOf(it); return u[0]||it; }
function groupActive(){ // one representative per item-number group, rep = lowest SKU
  const seen={}, out=[];
  activeItems().slice().sort((a,b)=>skuCmp(a.sku,b.sku)).forEach(it=>{ const k=groupKey(it); if(!seen[k]){ seen[k]=1; out.push(it); } });
  return out;
}
function addHistory(it,desc){ if(!Array.isArray(it.history)) it.history=[]; it.history.push({at:new Date().toISOString(),desc,by:(SESSION.user?userLabel(SESSION.user.id):"system")}); }

/* ============================================================ records ============================================================ */
function nextInvoiceNum(){ DB.meta.invoiceSeq=(DB.meta.invoiceSeq||1000)+1; return DB.meta.invoiceSeq; }
function makeRecord(type,lines,userId){ const rec={ id:crypto.randomUUID(), num:nextInvoiceNum(), createdAt:new Date().toISOString(), soldBy:userId, type, lines }; DB.invoices.push(rec); return rec; }
function sellItems(items,userId,type){
  const lines=[];
  items.forEach(it=>{ const q=parseFloat(it.onHand);
    if(!isNaN(q)&&q>1){ it.onHand=String(q-1); addHistory(it,"Sold 1 (qty now "+it.onHand+")"); lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'decrement',reversed:false}); }
    else { it.sold=true; it.soldAt=new Date().toISOString(); it.soldBy=userId; it.outType="Sell"; addHistory(it,"Sold (SKU "+it.sku+")"); lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'sold',reversed:false}); } });
  const rec=makeRecord(type||"Sell",lines,userId); save(); return rec;
}
function adjustItems(items,userId,reason){
  const lines=[];
  items.forEach(it=>{ it.sold=true; it.soldAt=new Date().toISOString(); it.soldBy=userId; it.outType=reason; addHistory(it,"Adjusted out — "+reason+" (SKU "+it.sku+")");
    lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'adjust',reversed:false}); });
  const rec=makeRecord(reason,lines,userId); save(); return rec;
}
function recordAdds(items,userId,type){ // type = "Add" or "Bulk Add"
  const lines=items.map(it=>({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'add',reversed:false}));
  const rec=makeRecord(type,lines,userId); save(); return rec;
}
function reverseLines(inv,idxs){
  idxs.forEach(i=>{ const ln=inv.lines[i]; if(!ln||ln.reversed) return; const it=DB.items.find(x=>x.id===ln.itemId);
    if(ln.mode==='add'){ if(it && !it.sold){ DB.items=DB.items.filter(x=>x.id!==it.id); } }
    else if(it){ if(ln.mode==='decrement'){ it.onHand=String((parseFloat(it.onHand)||0)+ln.qty); }
      else { it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1"; restoreSlot(it); addHistory(it,"Reactivated (record #"+inv.num+" reversed)"); } }
    ln.reversed=true; });
  save();
}
function invStatus(inv){ const r=inv.lines.filter(l=>l.reversed).length; if(r===0)return "Active"; if(r===inv.lines.length)return "Reversed"; return "Partial"; }
function invSections(inv){ return [...new Set(inv.lines.map(l=>l.section).filter(Boolean))]; }
function invTotalItems(inv){ return inv.lines.reduce((n,l)=>n+(l.qty||1),0); }

/* ============================================================ window manager ============================================================ */
let zTop=50;
const screenEl=document.getElementById("screen"),modalsEl=document.getElementById("modals"),tbWindows=document.getElementById("tb-windows");
const openWindows={};
function clearScreen(){ screenEl.innerHTML=""; }
function closeAllModals(){ modalsEl.innerHTML=""; for(const k in openWindows) delete openWindows[k]; renderTaskbar(); }
function makeDraggable(win,h){
  if(WIM_POPOUT_MODE){
    // Pop-out apps are locked to fill their OS window. Dragging the title bar moves the whole OS window (like a normal app).
    h.style.cursor="default";
    h.addEventListener("mousedown",(e)=>{ if(e.target.closest(".winbtn")||e.target.closest("button")||e.target.closest("input")||e.target.closest("select")) return;
      try{ const W=window.__TAURI__&&window.__TAURI__.window; const cw=W&&(W.getCurrentWindow?W.getCurrentWindow():(W.appWindow||(W.getCurrent&&W.getCurrent()))); if(cw&&cw.startDragging) cw.startDragging(); }catch(err){} });
    return;
  }
  let sx,sy,ox,oy,drag=false;
  h.addEventListener("mousedown",(e)=>{ if(e.target.closest(".winbtn"))return; drag=true;sx=e.clientX;sy=e.clientY;const r=win.getBoundingClientRect();ox=r.left;oy=r.top;win.style.zIndex=++zTop;e.preventDefault(); });
  window.addEventListener("mousemove",(e)=>{ if(!drag)return; let nl=ox+(e.clientX-sx),nt=oy+(e.clientY-sy); nt=Math.max(0,Math.min(nt,window.innerHeight-50)); nl=Math.max(-200,Math.min(nl,window.innerWidth-120)); win.style.left=nl+"px";win.style.top=nt+"px";win.style.transform="none"; });
  window.addEventListener("mouseup",()=>{drag=false;}); }
function focusWin(win){ win.style.zIndex=++zTop; }
function userLabel(id){ const u=DB.users.find(x=>x.id===id); return u?(u.longName||u.shortName||u.id):(id||"—"); }
function buildWindow({id,title,width,height,toolbar,onClose,center=true,left,top,popoutKey}){
  const win=document.createElement("div"); win.className="window"; win.dataset.wid=id;
  // fit requested size to the available screen (leave room for the taskbar)
  const availW=window.innerWidth-16, availH=window.innerHeight-16;
  const w=Math.min(width||availW, availW), h=Math.min(height||availH, availH);
  win.style.width=w+"px"; win.style.height=h+"px";
  if(center){ win.style.left=Math.max(8,(window.innerWidth-w)/2)+"px"; win.style.top=Math.max(8,(window.innerHeight-h)/2)+"px"; }
  else { win.style.left=Math.max(8,Math.min(left||120, window.innerWidth-w-8))+"px"; win.style.top=Math.max(8,Math.min(top||80, window.innerHeight-h-8))+"px"; }
  win.style.transform="none"; win.style.zIndex=++zTop;
  if(WIM_POPOUT_MODE){ const fillWin=()=>{ win.style.left="0px"; win.style.top="0px"; win.style.width=window.innerWidth+"px"; win.style.height=window.innerHeight+"px"; }; fillWin(); window.addEventListener("resize",fillWin); }
  const tb=document.createElement("div"); tb.className="titlebar"; tb.innerHTML=`<span class="appicon"></span><span class="ttl">${title}</span>`;
  const popBtn = (popoutKey && WIM_IS_DESKTOP && !WIM_POPOUT_MODE) ? `<button class="winbtn" title="Open in its own window" data-popout="${popoutKey}">&#10696;</button>` : "";
  const ctr=document.createElement("div"); ctr.className="winbtns"; ctr.innerHTML=`${popBtn}<button class="winbtn" title="Minimize">&#8211;</button><button class="winbtn" title="Maximize">&#9633;</button><button class="winbtn close" title="Close">&#10005;</button>`;
  tb.appendChild(ctr); win.appendChild(tb);
  const pb=ctr.querySelector("[data-popout]"); if(pb) pb.onclick=(e)=>{ e.stopPropagation(); popOut(pb.dataset.popout); };
  if(toolbar){ const t=document.createElement("div"); t.className="toolbar"; t.innerHTML=toolbar; win.appendChild(t); }
  const body=document.createElement("div"); body.className="body"; win.appendChild(body);
  const winbtnList=ctr.querySelectorAll(".winbtn:not([data-popout])"); const [minB,maxB,closeB]=winbtnList;
  const doClose=()=>{ win.remove(); delete openWindows[id]; renderTaskbar(); if(onClose)onClose();
    if(WIM_POPOUT_MODE && WIM_ACTION_WIN && !modalsEl.querySelector(".window")){ try{ const W=window.__TAURI__&&window.__TAURI__.window; const cw=W&&(W.getCurrentWindow?W.getCurrentWindow():(W.appWindow||(W.getCurrent&&W.getCurrent()))); if(cw&&cw.close) cw.close(); }catch(e){} } };
  let prev=null;
  const toggleMax=()=>{ if(win.dataset.max==="1"){ Object.assign(win.style, prev); win.dataset.max="0"; }
    else { prev={left:win.style.left,top:win.style.top,width:win.style.width,height:win.style.height};
      win.style.left="0px"; win.style.top="0px"; win.style.width=window.innerWidth+"px"; win.style.height=(window.innerHeight-42)+"px"; win.dataset.max="1"; focusWin(win); } };
  closeB.onclick=doClose; minB.onclick=()=>win.classList.toggle("hidden"); maxB.onclick=toggleMax;
  tb.addEventListener("dblclick",(e)=>{ if(!e.target.closest(".winbtn")) toggleMax(); });
  win.addEventListener("mousedown",()=>focusWin(win)); makeDraggable(win,tb);
  modalsEl.appendChild(win); openWindows[id]={el:win,title:title.replace(/<[^>]+>/g,"")}; renderTaskbar();
  return {win,body,close:doClose};
}
function renderTaskbar(){ tbWindows.innerHTML="";
  Object.entries(openWindows).forEach(([id,w])=>{ const b=document.createElement("div"); b.className="tb-item";
    b.innerHTML=`<div class="tb-logo"></div> ${w.title}`; b.onclick=()=>{ w.el.classList.remove("hidden"); focusWin(w.el); }; tbWindows.appendChild(b); }); }

function uiModal(title, bodyHTML, buttons){
  const ov=document.createElement("div"); ov.className="ui-modal-ov";
  const box=document.createElement("div"); box.className="ui-modal";
  box.innerHTML=`<div class="ui-modal-ttl">${esc(title||"WIM")}</div><div class="ui-modal-body">${bodyHTML}</div><div class="ui-modal-btns"></div>`;
  const bwrap=box.querySelector(".ui-modal-btns");
  const cleanup=()=>{ ov.remove(); };
  (buttons||[{label:"OK",primary:true}]).forEach(b=>{ const btn=document.createElement("button"); btn.className="btn"+(b.primary?" primary":""); btn.textContent=b.label;
    btn.onclick=()=>{ if(b.onClick){ if(b.onClick(box)===false) return; } cleanup(); }; bwrap.appendChild(btn); });
  ov.appendChild(box); (screenEl||document.body).appendChild(ov);
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) cleanup(); });
  return { box, close:cleanup };
}
function uiAlert(msg,title){ return uiModal(title||"WIM", `<div style="font-size:13px;">${esc(msg)}</div>`, [{label:"OK",primary:true}]); }
function uiConfirm(msg,onYes,opts){ opts=opts||{}; return uiModal(opts.title||"Please confirm", `<div style="font-size:13px;">${esc(msg)}</div>`,
  [{label:opts.yes||"Yes",primary:true,onClick:()=>{ if(onYes) onYes(); }},{label:opts.no||"Cancel"}]); }
function uiChoose(msg,choices,title){ // choices: [{label,primary,onClick}]
  return uiModal(title||"WIM", `<div style="font-size:13px;">${esc(msg)}</div>`, choices); }
function attachAutofill(input, getOptions){
  input.addEventListener("input",()=>{
    const len=input.value.length;
    if(input._afLen!=null && len<input._afLen){ input._afLen=len; return; } // deleting — don't autofill
    input._afLen=len;
    const v=input.value; if(!v) return;
    const opts=getOptions()||[];
    const m=opts.find(o=>o&&o.toLowerCase().startsWith(v.toLowerCase()));
    if(m && m.length>v.length){ input.value=m; try{ input.setSelectionRange(v.length, m.length); }catch(e){} input._afLen=m.length; }
  });
}
function compressImage(file,maxDim=480,q=0.65){ return new Promise((res,rej)=>{ const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; const s=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement("canvas"); c.width=w;c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); res(c.toDataURL("image/jpeg",q)); }; img.onerror=rej; img.src=rd.result; }; rd.onerror=rej; rd.readAsDataURL(file); }); }
function printTable(title, headers, rows){
  const w=window.open("","_blank"); if(!w){ uiAlert("Pop-up blocked. Allow pop-ups to print/save PDF."); return; }
  const thead=headers.map(h=>`<th>${esc(h)}</th>`).join("");
  const tbody=rows.map(r=>"<tr>"+r.map(c=>`<td>${esc(c)}</td>`).join("")+"</tr>").join("");
  w.document.write(`<html><head><title>${esc(title)}</title><style>body{font-family:Segoe UI,Arial,sans-serif;margin:24px;}h2{margin:0 0 4px;}table{border-collapse:collapse;width:100%;font-size:12px;margin-top:10px;}th,td{border:1px solid #999;padding:5px 8px;text-align:left;}th{background:#eee;}</style></head><body><h2>${esc(title)}</h2><div>${new Date().toLocaleString()} &middot; ${rows.length} records</div><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),350);
}
function downloadCSV(filename, headers, rows){
  const esc2=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
  const csv=[headers.map(esc2).join(",")].concat(rows.map(r=>r.map(esc2).join(","))).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}

/* ============================================================ LOGIN ============================================================ */
function runUpdateCheck(el){
  if(!el) return;
  if(!(window.__TAURI__ && window.__TAURI__.updater)){ el.textContent=""; return; }
  let dots=0, timer=null;
  const stop=()=>{ if(timer){ clearInterval(timer); timer=null; } };
  const animate=(label)=>{ stop(); el.style.color="#888"; el.textContent=label+" ."; dots=1; timer=setInterval(()=>{ dots=(dots%3)+1; el.textContent=label+" "+".".repeat(dots); },420); };
  const done=(text,color)=>{ stop(); el.style.color=color||"#888"; el.textContent=text; };
  animate("Checking for updates");
  (async()=>{
    let lastErr=null;
    for(let attempt=1; attempt<=3; attempt++){
      try{
        const upd=await window.__TAURI__.updater.check();
        if(!upd){ done("WIM is up to date","#1f7244"); return; }
        animate("Installing update "+(upd.version||""));
        await upd.downloadAndInstall();
        done("Update installed — restart WIM to finish","#1f5fbf"); return;
      }catch(e){ lastErr=e; if(attempt<3){ await new Promise(r=>setTimeout(r,2500)); animate("Checking for updates"); } }
    }
    done("Couldn't check for updates right now","");
    console.warn("update check failed:", lastErr&&lastErr.message?lastErr.message:lastErr);
  })();
}
function showLogin(msg){
  closeAllModals(); clearScreen(); setDesktopWindow("login");
  const wrap=document.createElement("div"); wrap.className="center-screen";
  const win=document.createElement("div"); win.className="window login"; win.style.position="static";
  const cloudConnected=!!(DB.cloud&&DB.cloud.teamCode);
  win.innerHTML=`<div class="titlebar"><span class="appicon"></span><span class="ttl">User Login</span><div class="winbtns"><button class="winbtn close">&#10005;</button></div></div>
    <div class="body" style="position:relative;"><div class="help">?</div>
      <div class="banner">${cloudConnected?("Connected to <b>"+esc(DB.cloud.teamName||"your team")+"</b> — signing in here syncs with your team."):"WIM runs entirely on this computer &mdash; offline, no account needed."}</div>
      <div class="row"><label class="fld">User Name</label><input class="txt" id="lg-user" autocomplete="off"></div>
      <div class="row"><label class="fld">Password</label><input class="txt" id="lg-pass" type="password" autocomplete="off"></div>
      <div class="row"><label class="fld">Mode</label><select class="cmb" id="lg-mode" style="flex:1;"><option value="warehouse">Warehouse</option><option value="live">Live (eBay)</option></select></div>
      <div class="err" id="lg-err">${msg||""}</div>
      <div class="actions"><button class="btn primary" id="lg-ok">OK</button><button class="btn" id="lg-cancel">Cancel</button></div>
      <div id="lg-update" style="position:absolute;bottom:6px;left:0;right:0;text-align:center;color:#888;font-size:11.5px;"></div></div>`;
  wrap.appendChild(win); screenEl.appendChild(wrap);
  runUpdateCheck(win.querySelector("#lg-update"));
  const u=win.querySelector("#lg-user"),p=win.querySelector("#lg-pass"),err=win.querySelector("#lg-err"); u.focus();
  const okBtn=win.querySelector("#lg-ok");
  const attempt=async ()=>{ const uid=u.value.trim(),pw=p.value; if(!uid||!pw) return;
    // Local login is checked first, always — connecting the cloud must never break this.
    const f=DB.users.find(x=>x.id===uid);
    if(f && f.password===pw){
      SESSION.user=f; SESSION.mode=win.querySelector("#lg-mode").value||"warehouse";
    if(SESSION.mode==="live" && !hasAccess("live_mode")) SESSION.mode="warehouse"; // Warehouse Only Mode — quietly redirected, not blocked with an error
    if(f.mustChange) showChangePassword(f,true); else showLauncher(); return;
    }
    // Not a local match — if this device is connected, try the cloud as an additional
    // way to log in (for staff who exist there but aren't in this device's local list).
    if(cloudConnected){
      okBtn.disabled=true; err.style.color="#555"; err.textContent="Checking…";
      try{
        const r=await Cloud.login(DB.cloud.teamCode,uid,pw);
        okBtn.disabled=false;
        let rows=[]; if(r.ok){ try{ rows=JSON.parse(r.body); }catch(e){} }
        const row=rows&&rows[0];
        if(!r.ok || !row){ err.style.color="#c0392b"; err.textContent="Invalid user name or password."; p.value="";p.focus(); return; }
        cloudSession=row;
        // Cloud staff still have their own separate "role" field (admin/leadership/etc.)
        // from the cloud schema — mapped here to an equivalent supervisory level so cloud
        // logins aren't treated as Basic by the new permission system. Properly unifying
        // these into one real system is part of the bigger cloud migration work, not this.
        SESSION.user={ id:row.staff_name, role:row.role, levelId: row.role==="admin"?"admin":row.role==="leadership"?"supervisor":"basic", permissionOverrides:{}, password:pw, mustChange:false };
        SESSION.mode=win.querySelector("#lg-mode").value||"warehouse";
        if(SESSION.mode==="live" && !hasAccess("live_mode")) SESSION.mode="warehouse";
        showLauncher();
      }catch(e){ okBtn.disabled=false; err.style.color="#c0392b"; err.textContent="Invalid user name or password."; }
      return;
    }
    err.style.color="#c0392b"; err.textContent="Invalid user name or password."; p.value="";p.focus(); };
  win.querySelector("#lg-ok").onclick=attempt;
  win.querySelector("#lg-cancel").onclick=()=>{ u.value="";p.value="";err.textContent="";u.focus(); };
  win.querySelector(".close").onclick=()=>{ u.value="";p.value="";err.style.color="#c0392b";err.textContent="Login required to use WIM."; };
  [u,p].forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") attempt(); }));
}
function showChangePassword(user,first){
  closeAllModals(); clearScreen(); setDesktopWindow("login");
  const wrap=document.createElement("div"); wrap.className="center-screen";
  const win=document.createElement("div"); win.className="window login"; win.style.position="static";
  win.innerHTML=`<div class="titlebar"><span class="appicon"></span><span class="ttl">Change Password</span><div class="winbtns"><button class="winbtn close">&#10005;</button></div></div>
    <div class="body"><p style="margin:0 0 4px;font-size:13px;">User <b>${user.id}</b> is using a default password and must set a new one.</p>
      <div class="note">Password must be numerical (digits only). No length or complexity rules.</div>
      <div class="row"><label class="fld">New Password</label><input class="txt" id="cp-new" type="password" inputmode="numeric"></div>
      <div class="row"><label class="fld">Confirm</label><input class="txt" id="cp-conf" type="password" inputmode="numeric"></div>
      <div class="err" id="cp-err"></div>

function openWidgetConfigPopover(widgetDef,currentCfg,anchorEl,onSave){

    <div class="wp-body">${(widgetDef.options||[]).map(o=>`<label class="wp-opt"><input type="radio" name="wp-period" value="${o.key}" ${o.key===sel?"checked":""}/> ${esc(o.label)}</label>`).join("")}</div>

}
// Cache for the New Messages dashboard widget — populated by a background refresh so the
// widget itself can stay a plain synchronous render() like every other widget.
let LIVE_MSG_STATS={ unread:null, total:null, fetchedAt:0 };
let liveMsgFetchInFlight=false;
async function refreshLiveMsgStats(){
  if(!EBAY.ready() || liveMsgFetchInFlight) return;
  if(Date.now()-LIVE_MSG_STATS.fetchedAt < 60000) return; // throttle to once a minute
  liveMsgFetchInFlight=true;
  try{
    const r=await EBAY.user("/commerce/message/v1/conversation?limit=50", EBAY_SCOPE_MSG);
    if(r&&r.ok){
      let data={}; try{ data=JSON.parse(r.body); }catch(e){}
      const list=data.conversations||data.conversationSummaries||data.messages||[];
      const unread=list.filter(c=>{ const u=c&&c.unreadCount; return (u===true)||(parseInt(u,10)>0); }).length;
      LIVE_MSG_STATS={ unread, total:list.length, fetchedAt:Date.now() };
      try{ renderDashboard(); }catch(e){}
    }
  }catch(e){ /* leave last-known stats in place on a transient failure */ }
  finally{ liveMsgFetchInFlight=false; }
}

// Admin-only, checked once per running session: if the automated GitHub Actions backup
// hasn't actually succeeded in 7+ days, that's a sign the automation itself broke
// (an expired token, GitHub having a bad day) -- not something to wait out quietly.
// This does NOT touch last_backup_at itself -- only the real automation gets to mark
// itself successful -- so the alarm stays accurate even after this fires.
let backupFailsafeChecked=false;
async function checkBackupFailsafe(){
  if(backupFailsafeChecked) return;
  if(role()!=="admin" || !cloudSession) return;
  backupFailsafeChecked=true;
  try{
    const r=await Cloud.getBackupStatus(cloudSession.session_token);
    if(!r.ok) return;
    let row={}; try{ const parsed=JSON.parse(r.body); row=Array.isArray(parsed)?parsed[0]:parsed; }catch(e){}
    const last=row&&row.last_backup_at?new Date(row.last_backup_at):null;
    const days=last&&!isNaN(last)?(Date.now()-last.getTime())/86400000:Infinity;
    if(days<7) return; // the real automation is healthy — nothing to do
    // Don't re-download every single time WIM opens while the underlying problem
    // persists — once a day is enough of a nudge without being obnoxious about it.
    const lastOwn=DB.cloud&&DB.cloud.lastFailsafeBackupAt?new Date(DB.cloud.lastFailsafeBackupAt):null;
    if(lastOwn && !isNaN(lastOwn) && (Date.now()-lastOwn.getTime())<86400000) return;
    await runFailsafeBackup(last);
  }catch(e){ /* not worth surfacing a network hiccup as an error here */ }
}
async function runFailsafeBackup(lastRealBackup){
  try{
    const r=await Cloud.getItems(cloudSession.session_token);
    let items=[]; if(r.ok){ try{ items=JSON.parse(r.body)||[]; }catch(e){} }
    const payload={ exportedAt:new Date().toISOString(), source:"WIM 7-day fail-safe — the automated GitHub Actions backup hasn't succeeded recently", items };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="WIM-cloud-failsafe-backup-"+new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")+".json"; a.click();
    URL.revokeObjectURL(url);
    if(!DB.cloud) DB.cloud={}; DB.cloud.lastFailsafeBackupAt=new Date().toISOString(); save();
    uiAlert("The automated cloud backup hasn't succeeded in over 7 days"+(lastRealBackup&&!isNaN(lastRealBackup)?(" (last real success: "+lastRealBackup.toLocaleString()+")"):" (no successful run has ever been recorded)")+" — WIM just downloaded an emergency backup of your current cloud items as a precaution.\n\nThis only covers your inventory items, not the full database — please check the GitHub Actions automation to see what's actually wrong.");
  }catch(e){ /* if even the fail-safe itself can't reach the cloud, there's nothing more WIM can do from here */ }
}

    if(!/^\d+$/.test(n.value)){ err.textContent="Password must be numerical (digits only)."; return; }

function ebayPayload(it){ // builds the Sell Inventory API createOrReplaceInventoryItem body (sku goes in the URL, not the body)
  return { condition: ebayCondEnum(it.condition),
    product:{ title:(it.listing&&it.listing.title?it.listing.title:it.desc||"").slice(0,80),
      description:(it.listing&&it.listing.descBody)||it.desc||"",
      aspects: (it.aspects&&Object.keys(it.aspects).length)?Object.fromEntries(Object.entries(it.aspects).map(([k,v])=>[k,[String(v)]])):{ Condition:[it.condition||"Unspecified"] },
      imageUrls: (it.listing&&it.listing.ebayImageUrls)||[] },
    availability:{ shipToLocationAvailability:{ quantity: groupQty(it) } } };
}
// Everything an item needs before WIM will attempt a real eBay publish.
function ebayListingPrereqs(it){
  const missing=[];
  if(!it.sku) missing.push("a Warehouse SKU (save the item first)");
  const sc=subcatObj(it.section,it.subCategory);
  if(!sc || !sc.ebayId) missing.push("an eBay category mapped for "+(it.subCategory||it.section||"this category")+" (set it in Category Maintenance)");
  if(!DB.ebay.fulfillmentPolicyId) missing.push("a shipping policy");
  if(!DB.ebay.paymentPolicyId) missing.push("a payment policy");
  if(!DB.ebay.returnPolicyId) missing.push("a return policy");
  if(!DB.ebay.merchantLocationKey) missing.push("an inventory location");
  if(missing.some(m=>/policy|location/.test(m))) missing.push("(set policies/location once in Configuration → eBay Connection → Listing setup)");
  const price=(it.listing&&it.listing.price)||it.retail;
  if(!price || isNaN(parseFloat(price))) missing.push("a listing price");
  return missing;
}
// Full Sell Inventory API publish: createOrReplaceInventoryItem -> createOffer (once) -> publishOffer.
// Safe to call again after a partial failure — it reuses an existing offer instead of duplicating one.
async function publishToEbay(it,onStep){
  if(!EBAY.ready()) return { ok:false, error:"Not connected to eBay — click Connect next to Live Mode." };
  const missing=ebayListingPrereqs(it);
  if(missing.length) return { ok:false, error:"Missing before publishing:\n• "+missing.join("\n• ") };
  const sku=String(it.sku);
  onStep&&onStep("Creating/updating the eBay inventory item…");
  const invPayload=ebayPayload(it);
  let r;
  try{ r=await wimDesktop.invoke("ebay_put_inventory_item",{ env:DB.ebay.env||"sandbox", appId:DB.ebay.appId, certId:DB.ebay.certId, refreshToken:DB.ebay.refreshToken, marketplace:DB.ebay.marketplace||"EBAY_US", sku, payloadJson:JSON.stringify(invPayload) }); }
  catch(e){ return { ok:false, error:"Could not reach eBay (inventory item): "+(e&&e.message?e.message:e) }; }
  if(!r.ok) return { ok:false, error:"eBay rejected the inventory item (HTTP "+r.status+"):\n"+(r.body||"") };

  let offerId=it.listing&&it.listing.offerId;
  if(!offerId){
    onStep&&onStep("Creating the eBay offer…");
    const sc=subcatObj(it.section,it.subCategory);
    const price=(it.listing&&it.listing.price)||it.retail;
    const offerPayload={ sku, marketplaceId:DB.ebay.marketplace||"EBAY_US", format:"FIXED_PRICE",
      availableQuantity: groupQty(it), categoryId: sc.ebayId,
      listingDescription: (it.listing&&it.listing.descBody)||it.desc||"",
      listingPolicies:{ fulfillmentPolicyId:DB.ebay.fulfillmentPolicyId, paymentPolicyId:DB.ebay.paymentPolicyId, returnPolicyId:DB.ebay.returnPolicyId },
      pricingSummary:{ price:{ value:String(price), currency:"USD" } },
      merchantLocationKey: DB.ebay.merchantLocationKey };
    let or;
    try{ or=await EBAY.postUser("/sell/inventory/v1/offer", JSON.stringify(offerPayload), EBAY_SCOPE_INV); }
    catch(e){ return { ok:false, error:"Could not reach eBay (offer): "+(e&&e.message?e.message:e) }; }
    if(!or.ok) return { ok:false, error:"eBay rejected the offer (HTTP "+or.status+"):\n"+(or.body||"") };
    let od={}; try{ od=JSON.parse(or.body); }catch(e){}
    offerId=od.offerId;
    if(!offerId) return { ok:false, error:"eBay didn't return an offer ID:\n"+(or.body||"") };
    if(!it.listing) it.listing={status:"none"};
    it.listing.offerId=offerId; save();
  }

  onStep&&onStep("Publishing the offer…");
  let pr;
  try{ pr=await EBAY.postUser("/sell/inventory/v1/offer/"+encodeURIComponent(offerId)+"/publish", "{}", EBAY_SCOPE_INV); }
  catch(e){ return { ok:false, error:"Could not reach eBay (publish): "+(e&&e.message?e.message:e) }; }
  if(!pr.ok) return { ok:false, error:"eBay rejected the publish (HTTP "+pr.status+"):\n"+(pr.body||"")+"\n\n(The offer itself was created — trying Publish again will reuse it, not create a duplicate.)" };
  let pd={}; try{ pd=JSON.parse(pr.body); }catch(e){}
  const listingId=pd.listingId||"";
  if(!it.listing) it.listing={status:"none"};
  it.listing.status="listed"; it.listing.listedAt=new Date().toISOString(); it.listing.offerId=offerId; it.listing.ebayListingId=listingId; it.listing.publishMethod="api";
  addHistory(it,"Published to eBay (offer "+offerId+(listingId?(", listing "+listingId):"")+")"); save();
  return { ok:true, offerId, listingId };
}
// Withdraws a real eBay offer that WIM itself published. Items listed manually outside
// WIM (no offerId on record) have nothing for this to withdraw — those use the plain
// local status toggle instead.
async function delistFromEbay(it,onStep){
  if(!EBAY.ready()) return { ok:false, error:"Not connected to eBay — click Connect next to Live Mode." };
  if(!it.listing || !it.listing.offerId) return { ok:false, error:"This item wasn't published through WIM's eBay integration (no offer on record), so there's nothing on eBay for WIM to withdraw. If it's listed manually, use the local status toggle below instead." };
  onStep&&onStep("Withdrawing the eBay offer…");
  let r;
  try{ r=await EBAY.postUser("/sell/inventory/v1/offer/"+encodeURIComponent(it.listing.offerId)+"/withdraw", "{}", EBAY_SCOPE_INV); }
  catch(e){ return { ok:false, error:"Could not reach eBay: "+(e&&e.message?e.message:e) }; }
  if(!r.ok) return { ok:false, error:"eBay rejected the withdraw (HTTP "+r.status+"):\n"+(r.body||"") };
  it.listing.status="delisted"; it.listing.delistedAt=new Date().toISOString();
  addHistory(it,"Delisted from eBay (offer "+it.listing.offerId+")"); save();
  return { ok:true };
}

      out.style.color = res.ok?"#1f7244":"#c0392b"; out.textContent = (res.ok?"Success (HTTP "+res.status+"). Inventory item created/updated on eBay.\n":"eBay returned HTTP "+res.status+":\n")+(res.body||"");

function applyRename(kind,oldN,newN){
  if(kind==="section"){ DB.items.forEach(i=>{ if(i.section===oldN) i.section=newN; }); DB.slots.forEach(s=>{ if(Array.isArray(s.sections)) s.sections=s.sections.map(c=>c===oldN?newN:c); if(s.section===oldN) s.section=newN; });
    if(DB.conditionsByCat && DB.conditionsByCat[oldN]){ DB.conditionsByCat[newN]=DB.conditionsByCat[oldN]; delete DB.conditionsByCat[oldN]; } }
  else if(kind==="group"){ DB.items.forEach(i=>{ if(i.groups){ i.groups=i.groups.map(g=>g===oldN?newN:g); } }); }
  else if(kind==="vendor"){ DB.items.forEach(i=>{ if(i.vendor===oldN) i.vendor=newN; }); }
  else if(kind==="condition"){ DB.items.forEach(i=>{ if(i.condition===oldN) i.condition=newN; }); }
  else if(kind==="adjustment"){ DB.invoices.forEach(r=>{ if(r.type===oldN) r.type=newN; }); }
  const a=kind==="section"?DB.sections:kind==="group"?DB.groups:kind==="vendor"?DB.vendors:kind==="adjustment"?DB.adjustmentTypes:DB.conditions;
  const idx=a.indexOf(oldN); if(idx>=0) a[idx]=newN;
}
function applyDelete(kind,name){
  if(kind==="condition"){ DB.items.forEach(i=>{ if(i.condition===name) i.condition=""; }); DB.conditions=DB.conditions.filter(x=>x!==name); }
  else if(kind==="section"){ DB.sections=DB.sections.filter(x=>x!==name); if(DB.conditionsByCat) delete DB.conditionsByCat[name]; }
  else if(kind==="group"){ DB.groups=DB.groups.filter(x=>x!==name); }
  else if(kind==="vendor"){ DB.vendors=DB.vendors.filter(x=>x!==name); }
  else if(kind==="adjustment"){ DB.adjustmentTypes=DB.adjustmentTypes.filter(x=>x!==name); }
}

  const dlGrp=`<datalist id="dl-grp-${winId}"><option value="None"></option>`+DB.groups.map(g=>`<option value="${esc(g)}"></option>`).join("")+`</datalist>`;
  const dlCon=`<datalist id="dl-con-${winId}"><option value="None"></option>`+allConditions().map(c=>`<option value="${esc(c)}"></option>`).join("")+`</datalist>`;
  const optSlot=`<option value="">(any)</option><option value="None">None (no slot)</option>`+[...DB.slots].sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true})).map(s=>`<option value="${esc(s.id)}">${esc(s.id)}</option>`).join("");
  const optSec=`<option value="">(any)</option>`+DB.sections.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
  const optGrp=`<option value="">(any)</option><option value="None">None</option>`+DB.groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("");
  const optCon=`<option value="">(any)</option><option value="None">None</option>`+allConditions().map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  body.innerHTML=`
    ${dlSec}${dlSlot}${dlGrp}${dlCon}
    <div class="searchform">
      <div class="ff"><label>Item Number</label><input class="txt" id="s-upc"></div>
      <div class="ff"><label>Warehouse SKU</label><input class="txt" id="s-sku"></div>
      <div class="ff"><label>Slot</label><select class="cmb" id="s-slot">${optSlot}</select></div>
      <div class="ff"><label>Description</label><input class="txt" id="s-desc"></div>
      <div class="ff"><label>Category</label><select class="cmb" id="s-sec">${optSec}</select></div>
      <div class="ff"><label>Group</label><select class="cmb" id="s-grp">${optGrp}</select></div>
      <div class="ff"><label>Condition</label><select class="cmb" id="s-con">${optCon}</select></div>
      ${isCat?`<div class="ff"><label>Added on/after</label><input class="txt" id="s-added" type="date"></div>
      <div class="ff"><label>Sold on/after</label><input class="txt" id="s-soldon" type="date"></div>`:'<div></div>'}
    </div>
    <div style="padding:0 14px 10px;display:flex;gap:8px;align-items:center;">
      <button class="btn primary" id="s-go">Search</button><button class="btn" id="s-clear">Clear</button>
      ${isCat?'':`<button class="btn" id="s-add">+ Add Item</button><button class="btn" id="s-soldbtn" disabled>Items Sold (0)</button>`}
    </div>
    <div class="resultwrap"><table class="res"><thead><tr id="s-head"></tr></thead><tbody id="s-tbody"></tbody></table></div>
    <div class="statusbar"><span id="s-status">Enter search criteria, then press Search.</span><span id="s-count">Records: 0</span></div>`;
  try{ const win=body.closest(".window"); const tbar=win&&win.querySelector(".toolbar");
    if(tbar && !tbar.querySelector(".sf-loc")){ const info=document.createElement("div"); info.className="sf-loc";
      info.style.cssText="margin-left:auto;display:flex;gap:16px;align-items:center;font-size:12.5px;color:#5b6470;padding-right:4px;";
      info.innerHTML=`<span>Search <b>${isCat?'Catalog (sold)':'Active inventory'}</b></span><span>Location <b>Main Warehouse</b></span>`; tbar.appendChild(info); } }catch(e){}

  const pool=()=> isCat?soldItems():activeItems();
  function run(){
    const g=id=>{ const e=body.querySelector("#"+id); return e?e.value:""; };
    const upc=g("s-upc").trim().toLowerCase(), sku=g("s-sku").trim().toLowerCase(), slot=g("s-slot").trim(), desc=g("s-desc").trim().toLowerCase();
    const sec=g("s-sec").trim(), grp=g("s-grp").trim(), con=g("s-con").trim();
    const addedAfter=isCat?g("s-added"):"", soldAfter=isCat?g("s-soldon"):"";
    const eqi=(a,b)=>String(a||"").trim().toLowerCase()===String(b||"").trim().toLowerCase();
    st.results=pool().filter(it=>{
      if(upc){ const qn=normItemNum(upc); if(qn){ if(!normItemNum(it.upc).includes(qn)) return false; } else if(!it.upc.toLowerCase().includes(upc)) return false; }
      if(sku&&!(it.sku||"").toLowerCase().includes(sku)) return false;
      if(slot){ if(slot.toLowerCase()==="none"){ if(it.slot) return false; } else if(!eqi(it.slot,slot)) return false; }
      if(desc&&!(it.desc.toLowerCase().includes(desc))) return false;
      if(sec){ if(sec.toLowerCase()==="none"){ if(it.section) return false; } else if(!eqi(it.section,sec)) return false; }
      if(grp){ if(grp.toLowerCase()==="none"){ if((it.groups||[]).length) return false; } else if(!(it.groups||[]).some(x=>eqi(x,grp))) return false; }
      if(con){ if(con.toLowerCase()==="none"){ if(it.condition) return false; } else if(!eqi(it.condition,con)) return false; }
      if(addedAfter&&(!it.createdAt||it.createdAt.slice(0,10)<addedAfter)) return false;
      if(soldAfter&&(!it.soldAt||it.soldAt.slice(0,10)<soldAfter)) return false;
      return true;
    });
    if(!isCat){ const seen={}, groups=[]; st.results.forEach(u=>{ const k=groupKey(u); if(!seen[k]){ seen[k]=1; groups.push(firstUnit(u)); } }); st.results=groups; }
    st.searched=true; sortAndRender();
    body.querySelector("#s-status").textContent=st.results.length?("Found "+st.results.length+(isCat?" record(s).":" item(s).")):"No records matched your search.";
  }
  function sortAndRender(){
    if(st.sort.key){ const col=cols.find(c=>c.key===st.sort.key);
      st.results.sort((a,b)=>{ let r; if(col.type==="check"){ r=(st.pending.has(a.id)?1:0)-(st.pending.has(b.id)?1:0); } else { r=cmpVal(col.get(a),col.get(b),col.type); } return r*st.sort.dir; }); }
    renderHead(); renderRows();
  }
  function renderHead(){ const h=body.querySelector("#s-head"); h.innerHTML="";
    cols.forEach(c=>{ const th=document.createElement("th"); const arrow=st.sort.key===c.key?`<span class="arr">${st.sort.dir>0?'▲':'▼'}</span>`:"";
      th.innerHTML=`<span class="cf-h" style="cursor:pointer;">${esc(c.label)}${arrow}</span>`+cf.pinHtml(c.key);
      const hd=th.querySelector(".cf-h"); if(hd) hd.onclick=()=>{ if(st.sort.key===c.key) st.sort.dir*=-1; else { st.sort.key=c.key; st.sort.dir=1; } sortAndRender(); };
      h.appendChild(th); });
    cf.wire(h, ()=>st.results, colVal, ()=>renderRows());
  }
  function renderRows(){ const tb=body.querySelector("#s-tbody"); tb.innerHTML="";
    const shown=cf.apply(st.results, colVal);
    shown.forEach((it,ri)=>{ const tr=document.createElement("tr");
      cols.forEach(c=>{ const td=document.createElement("td");
        if(c.key==="sold"&&c.type==="check"){ td.className="cc"; const cb=document.createElement("span"); cb.className="chk"+(st.pending.has(it.id)?" on":"");
          cb.onclick=(e)=>{ e.stopPropagation(); if(st.pending.has(it.id)) st.pending.delete(it.id); else st.pending.add(it.id); cb.classList.toggle("on"); updateSoldBtn(); };
          td.appendChild(cb); }
        else { td.textContent = c.type==="date"? fmtDay(c.get(it)) : (c.get(it)||""); }
        tr.appendChild(td); });
      tr.ondblclick=()=>openItemDetail(it,isCat?"catalog":"edit",{list:shown.slice(),index:ri}); tb.appendChild(tr); });
    body.querySelector("#s-count").textContent="Records: "+shown.length+(shown.length!==st.results.length?(" of "+st.results.length):"");
  }
  function updateSoldBtn(){ const b=body.querySelector("#s-soldbtn"); if(!b) return; const n=st.pending.size; b.textContent="Items Sold ("+n+")"; b.disabled=n===0; }
  body._refresh=()=>{
    [...st.pending].forEach(id=>{ if(!DB.items.find(x=>x.id===id&&!x.sold)) st.pending.delete(id); });
    if(st.searched){ run(); } updateSoldBtn(); };

  body.querySelector("#s-go").onclick=run;
  body.querySelector("#s-clear").onclick=()=>{ body.querySelectorAll(".searchform input,.searchform select").forEach(i=>i.value="");
    st.results=[]; st.searched=false; st.pending.clear(); body.querySelector("#s-tbody").innerHTML=""; renderHead(); body.querySelector("#s-count").textContent="Records: 0"; body.querySelector("#s-status").textContent="Enter search criteria, then press Search."; updateSoldBtn(); };
  body.querySelectorAll(".searchform input").forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") run(); }));
  const w=openWindows[winId];
  if(w){ const rb=w.el.querySelector('[data-act="Run Search"]'); if(rb) rb.onclick=run;
    const nb=w.el.querySelector('[data-act="New Search"]'); if(nb) nb.onclick=()=>body.querySelector("#s-clear").click();
    const stopBtn=w.el.querySelector('[data-act="Stop"]'); if(stopBtn) stopBtn.onclick=()=>{ st.results=[]; st.searched=false; body.querySelector("#s-tbody").innerHTML=""; body.querySelector("#s-count").textContent="Records: 0"; body.querySelector("#s-status").textContent="Search stopped."; };
    const pb=w.el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>{ if(!st.results.length){ uiAlert("Run a search first."); return; }
      const pcols=cols.filter(c=>!(c.key==="sold"&&c.type==="check"));
      const heads=pcols.map(c=>c.label);
      const rows=st.results.map(it=>pcols.map(c=> c.type==="date"?fmtDay(c.get(it)):(c.get(it)||"") ));
      printTable(isCat?"WIM Catalog — Search Results":"WIM Item Maintenance — Search Results", heads, rows); }; }
  if(!isCat){ body.querySelector("#s-add").onclick=()=>openItemDetail(null,"new");
    body.querySelector("#s-soldbtn").onclick=()=>{ if(st.pending.size) openItemsSold(st, body); }; }
  renderHead();      // headers visible immediately; rows wait for Search
  updateSoldBtn();
}

  body._render=render; render();
}
function openInvoiceDetail(inv){
  const id="inv-"+inv.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body,close}=buildWindow({id,title:"Record #"+inv.num,width:700,height:560,
    toolbar:`${tbtn(I.print,'Print')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Reverse this record</span>`});
  const sel=new Set();
  const stateLabel=(ln)=> ln.reversed?"reversed":(ln.mode==="add"?"added":(ln.mode==="adjust"?"adjusted":"sold"));
  function render(){
    body.innerHTML=`<div style="padding:12px 14px 4px;font-size:12.5px;">Record <b>#${inv.num}</b> &middot; ${fmtDate(inv.createdAt)} &middot; type <b>${esc(inv.type||"Sell")}</b> &middot; user <b>${esc(userLabel(inv.soldBy))}</b> &middot; status <b>${invStatus(inv)}</b></div>

      tr.appendChild(td0);

      const a4=document.createElement("td"); a4.className="cc"; a4.textContent=ln.qty; tr.appendChild(a4);

      tb.appendChild(tr); });
    const revWord = (inv.lines[0]&&inv.lines[0].mode==="add")?"remove the added item(s)":"return the item(s) to inventory";
    body.querySelector("#id-rev").onclick=()=>{ if(!sel.size){ body.querySelector("#id-msg").textContent="Tick the lines you want to reverse first."; return; }
      uiConfirm("Reverse "+sel.size+" line(s)? This will "+revWord+".",()=>{ reverseLines(inv,[...sel]); sel.clear(); refreshSearchWindows(); refreshInvoices(); render(); body.querySelector("#id-msg").textContent="Reversed."; }); };
    body.querySelector("#id-revall").onclick=()=>{ const open=inv.lines.map((l,i)=>i).filter(i=>!inv.lines[i].reversed); if(!open.length){ body.querySelector("#id-msg").textContent="Nothing left to reverse."; return; }
      uiConfirm("Fully reverse this record ("+open.length+" line(s))?",()=>{ reverseLines(inv,open); sel.clear(); refreshSearchWindows(); refreshInvoices(); render(); body.querySelector("#id-msg").textContent="Record fully reversed."; }); };
    body.querySelector("#id-close").onclick=close;
    const pb=openWindows[id].el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>printTable("WIM Record #"+inv.num+" — "+(inv.type||"Sell")+" (user "+userLabel(inv.soldBy)+")",["Description","Warehouse SKU","Category","Qty","State"], inv.lines.map(l=>[l.desc,l.sku,l.section,l.qty,stateLabel(l)]));
  }
  render();
}

    clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(20px)"; },1600);

function openItemDetail(item,mode,nav){
  const isNew=mode==="new", isCat=mode==="catalog", ro=isCat;
  // Open existing-item landing pages in their own OS window (when floating is on), so each level is its own window and closes cleanly.
  if(!isNew && item && item.id && !WIM_ITEMDETAIL_WIN && WIM_IS_DESKTOP
     && !(DB.meta && DB.meta.floatWindows===false)
     && ((window.__TAURI__&&window.__TAURI__.webviewWindow&&window.__TAURI__.webviewWindow.WebviewWindow)||(window.__TAURI__&&window.__TAURI__.window&&window.__TAURI__.window.WebviewWindow))){
    if(popOutItem(item, mode, nav)) return;
  }
  const it=isNew?Object.assign({id:crypto.randomUUID(),upc:"",desc:"",vendor:"HYVEE DISTRIBUTION",condition:"New",section:(DB.sections[1]||DB.sections[0]||""),
    unitCost:"0.000",retail:"0.00",onHand:"1",groups:[],category:"FRUIT",subCategory:"",image:"",slot:"",placement:null,sku:"",
    manualSlot:false,sold:false,createdAt:null,soldAt:null,soldBy:null,caseCost:"0.00",casePack:"",base:"0.00",mixMatch:"None - 0",
    posDesc:"",size:"1",sizeUnit:"Pound",posDept:DB.posDepts[0],orderCode:""}, item||{}):item;

function deleteItems(units,userId){ // soft-delete: out of active, reversible from Records
  const lines=[];
  units.forEach(it=>{ it.sold=true; it.soldAt=new Date().toISOString(); it.soldBy=userId; it.outType="Deleted"; addHistory(it,"Deleted (SKU "+it.sku+")");

  const rec=makeRecord("Delete",lines,userId); save(); return rec;
}
function openDeleteDialog(it, after){

      const rec=deleteItems([it], SESSION.user.id); if(after) after(); uiAlert("Deleted. Record #"+rec.num+" created (reversible)."); }, {title:"Delete item",yes:"Delete"});
    return;
  }

function reactivateItem(it, closeCatalog){
  const histSku=it.sku, histSlot=it.slot, histPlace=it.placement;
  const conflict = histSlot && histPlace && activeItems().some(o=>o.slot===histSlot&&o.placement===histPlace);
  function reviveTo(slot,placement,manual){
    it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1";
    it.manualSlot=!!manual; it.slot=slot||""; it.placement=placement||null; it.sku=(slot&&placement)?skuOf(slot,placement):"";
    addHistory(it,"Reactivated from catalog (SKU "+(it.sku||"unassigned")+")");
    recordAdds([it], SESSION.user.id, "Add");
    save(); refreshSearchWindows(); refreshInvoices();
    if(closeCatalog) closeCatalog();
    openItemDetail(it,"edit");
  }
  if(!conflict && histSlot && slotById(histSlot)){ reviveTo(histSlot, histPlace, it.manualSlot); return; }
  if(!histSlot){ // had no slot historically — auto-assign by category
    const r=autoSlot(it.id,it.section); if(r){ reviveTo(r.slot,r.placement,false); } else { uiAlert("No slot is available for this item's Category. Add one in Warehouse Maintenance first."); }
    return;
  }
  // conflict: ask the user
  const id="react-"+it.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body,close}=buildWindow({id,title:"Reactivate — SKU unavailable",width:520,height:300,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Historic Warehouse SKU is in use</span>`});
  body.innerHTML=`<div style="padding:16px;font-size:12.5px;">

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <button class="btn primary" id="rx-gen">Generate SKU</button>
        <button class="btn" id="rx-man">Manually Enter</button>
        <button class="btn" id="rx-cancel">Cancel</button></div></div>`;
  body.querySelector("#rx-gen").onclick=()=>{ const r=autoSlot(it.id,it.section); if(!r){ uiAlert("No slot is available for this item's Category. Add one in Warehouse Maintenance first."); return; } close(); reviveTo(r.slot,r.placement,false); };
  body.querySelector("#rx-man").onclick=()=>{ it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1"; it.manualSlot=true; it.slot=""; it.placement=null; it.sku=""; addHistory(it,"Reactivated from catalog (manual slotting)"); recordAdds([it],SESSION.user.id,"Add"); save(); refreshSearchWindows(); refreshInvoices(); close(); if(closeCatalog) closeCatalog(); openItemDetail(it,"edit"); };
  body.querySelector("#rx-cancel").onclick=close;
}

  function resolve(token){ const t=token.trim().toLowerCase(); if(!t) return null;
    const pool=activeItems();
    return pool.find(i=>(i.sku||"").toLowerCase()===t) || pool.find(i=>(i.upc||"").trim().toLowerCase()===t)
        || pool.find(i=>(i.desc||"").toLowerCase()===t) || pool.find(i=>(i.desc||"").toLowerCase().includes(t)) || null;

    body.querySelector("#bs-hint").textContent = total? ("Staged "+total+" unit(s) across "+staged.length+" item(s).") : "Nothing staged yet.";

function openAdjust(){
  if(openWindows["adjust"]){ focusWin(openWindows["adjust"].el); return; }
  const {body}=buildWindow({id:"adjust",title:"Adjust Inventory",width:920,height:640,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Pull active stock out for a reason (not a sale)</span>`});
  const qtyByKey={}; let results=[];
  body.innerHTML=`
    <div class="searchform" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="ff"><label>Item Number / SKU</label><input class="txt" id="aj-q"></div>
      <div class="ff"><label>Description</label><input class="txt" id="aj-desc"></div>
      <div class="ff"><label>Adjustment Type</label><select class="cmb" id="aj-type">${DB.adjustmentTypes.map(t=>`<option>${esc(t)}</option>`).join("")}</select></div>
    </div>
    <div style="padding:0 14px 8px;display:flex;gap:8px;align-items:center;"><button class="btn primary" id="aj-go">Search</button><button class="btn" id="aj-clear">Clear</button>
      <span class="smallhint">Adjustment types decrease quantity and move items to the Catalog.</span></div>
    <div class="resultwrap"><table class="res"><thead><tr><th>Item Number</th><th>Description</th><th>Warehouse SKU</th><th>Category</th><th>On Hand</th><th style="width:120px;">Adjust Qty</th></tr></thead><tbody id="aj-tb"></tbody></table></div>
    <div class="statusbar"><span id="aj-status">Search active inventory, set quantities, choose a type, then Apply.</span><span><button class="btn primary" id="aj-apply" disabled>Apply Adjustments</button></span></div>`;
  const g=id=>{ const e=body.querySelector("#"+id); return e?e.value:""; };
  function run(){ const q=g("aj-q").trim().toLowerCase(), d=g("aj-desc").trim().toLowerCase();
    let units=activeItems().filter(it=>{ if(q&&!((it.upc||"").toLowerCase().includes(q)||(it.sku||"").toLowerCase().includes(q))) return false; if(d&&!(it.desc||"").toLowerCase().includes(d)) return false; return true; });
    const seen={}; results=[]; units.forEach(u=>{ const k=groupKey(u); if(!seen[k]){ seen[k]=1; results.push(firstUnit(u)); } });
    render(); body.querySelector("#aj-status").textContent=results.length?("Found "+results.length+" item(s)."):"No active items matched."; }
  function render(){ const tb=body.querySelector("#aj-tb"); tb.innerHTML="";
    results.forEach(it=>{ const k=groupKey(it); const onHand=groupQty(it); const tr=document.createElement("tr");
      tr.innerHTML=`<td>${esc(it.upc)}</td><td>${esc(it.desc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td><td class="cc">${onHand}</td>`;
      const td=document.createElement("td"); const inp=document.createElement("input"); inp.className="txt"; inp.style.width="80px"; inp.type="number"; inp.min="0"; inp.max=String(onHand); inp.value=String(qtyByKey[k]||0);
      inp.oninput=()=>{ let v=Math.max(0,Math.min(onHand,parseInt(inp.value,10)||0)); qtyByKey[k]=v; inp.value=String(v); updateApply(); }; td.appendChild(inp); tr.appendChild(td); tb.appendChild(tr); });
    updateApply();
  }
  function totalQty(){ return results.reduce((n,it)=>n+(qtyByKey[groupKey(it)]||0),0); }
  function updateApply(){ body.querySelector("#aj-apply").disabled = totalQty()===0; }
  body.querySelector("#aj-go").onclick=run;
  body.querySelector("#aj-clear").onclick=()=>{ body.querySelector("#aj-q").value=""; body.querySelector("#aj-desc").value=""; results=[]; Object.keys(qtyByKey).forEach(k=>delete qtyByKey[k]); render(); body.querySelector("#aj-status").textContent="Search active inventory, set quantities, choose a type, then Apply."; };
  body.querySelectorAll(".searchform input").forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") run(); }));
  body.querySelector("#aj-apply").onclick=()=>{ const reason=g("aj-type"); const total=totalQty(); if(!total) return;
    uiConfirm("Apply "+total+" "+reason+" adjustment(s)? This removes the units from active inventory and creates a record.",()=>{
      const toAdjust=[];
      results.forEach(it=>{ const k=groupKey(it); const n=qtyByKey[k]||0; if(n>0){ const units=unitsOf(it).slice(0,n); units.forEach(u=>toAdjust.push(u)); } });
      if(!toAdjust.length) return;
      const rec=adjustItems(toAdjust, SESSION.user.id, reason); Object.keys(qtyByKey).forEach(k=>delete qtyByKey[k]);
      refreshSearchWindows(); refreshInvoices(); run();
      body.querySelector("#aj-status").textContent="Record #"+rec.num+" created — "+toAdjust.length+" unit(s) adjusted ("+reason+")."; }); };
}

function openActiveSummary(){
  const id="rep-summary"; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body}=buildWindow({id,title:"Active Summary",width:760,height:600,
    toolbar:`${tbtn(I.print,'Print')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Inventory movement by type over a date range</span>`});
  const today=new Date(), first=new Date(today.getFullYear(),today.getMonth(),1);
  const iso=d=>d.toISOString().slice(0,10);
  body.innerHTML=`<div class="searchform" style="grid-template-columns:1fr 1fr;padding:12px 14px 4px;">
      <div class="ff"><label>From</label><input class="txt" id="su-from" type="date" value="${iso(first)}"></div>
      <div class="ff"><label>To</label><input class="txt" id="su-to" type="date" value="${iso(today)}"></div></div>
    <div style="padding:0 14px 8px;"><button class="btn primary" id="su-go">Run</button></div>
    <div id="su-out" style="padding:0 14px 14px;overflow:auto;flex:1;"></div>`;
  function run(){
    const from=body.querySelector("#su-from").value, to=body.querySelector("#su-to").value;
    const inRange=r=>{ const d=(r.createdAt||"").slice(0,10); return (!from||d>=from)&&(!to||d<=to); };
    const recs=DB.invoices.filter(inRange);
    const costOf=id=>{ const it=DB.items.find(x=>x.id===id); return it?(parseFloat(it.unitCost)||0):0; };
    const agg={}; // type -> {units, value}
    recs.forEach(r=>{ r.lines.forEach(l=>{ if(l.reversed) return; const t=r.type||"Sell"; agg[t]=agg[t]||{units:0,value:0}; agg[t].units+=1; agg[t].value+=costOf(l.itemId); }); });
    const order=["Add","Bulk Add","Sell","Bulk Sell","Delete",...DB.adjustmentTypes];
    const types=Object.keys(agg).sort((a,b)=>{ const ia=order.indexOf(a), ib=order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });
    const activeUnits=activeItems().length;
    const activeValue=activeItems().reduce((s,it)=>s+(parseFloat(it.unitCost)||0),0);
    let html=`<div style="display:flex;gap:18px;margin:10px 0;">
        <div class="gb" style="padding:10px 16px;"><div class="smallhint">Active units now</div><div style="font-size:22px;font-weight:700;">${activeUnits}</div></div>
        <div class="gb" style="padding:10px 16px;"><div class="smallhint">Active inventory value (at cost)</div><div style="font-size:22px;font-weight:700;">$${activeValue.toFixed(2)}</div></div></div>
      <div class="col-title" style="text-align:left;">Movement ${esc(from||"…")} → ${esc(to||"…")}</div>
      <div class="resultwrap" style="margin-top:6px;"><table class="res"><thead><tr><th>Record Type</th><th>Units</th><th>Value (at cost)</th></tr></thead><tbody>`;
    if(!types.length) html+=`<tr><td colspan="3" style="color:#888;">No activity in this range.</td></tr>`;
    let tu=0,tv=0; types.forEach(t=>{ tu+=agg[t].units; tv+=agg[t].value; html+=`<tr><td>${esc(t)}</td><td class="cc">${agg[t].units}</td><td class="cc">$${agg[t].value.toFixed(2)}</td></tr>`; });
    if(types.length) html+=`<tr style="font-weight:700;"><td>Total</td><td class="cc">${tu}</td><td class="cc">$${tv.toFixed(2)}</td></tr>`;
    html+=`</tbody></table></div>`;
    body.querySelector("#su-out").innerHTML=html;
    body._print=()=>printTable("WIM Active Summary "+(from||"")+" to "+(to||""), ["Record Type","Units","Value (at cost)"], types.map(t=>[t,agg[t].units,"$"+agg[t].value.toFixed(2)]));
  }
  body.querySelector("#su-go").onclick=run;
  const pb=openWindows[id].el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>{ if(body._print) body._print(); };
  run();
}

// Early test screen for the cloud sync work — lets us actually exercise the real
// login -> fetch items pipeline from inside WIM, not just the Supabase SQL editor.
// This is NOT the final UI; it's scaffolding to prove the pieces work before the
// real migration (every screen moving from local-only to networked) begins.
let cloudSession=null; // {session_token, staff_id, staff_name, role, team_id, team_name}
// The one-time, admin-only step that connects THIS DEVICE to your team's cloud
// database. Once this succeeds, DB.cloud.teamCode is saved locally and the
// regular User Login screen quietly starts checking the cloud instead of the
// local user list — staff never see a team code, ever, after this one step.
function openCloudSyncSetup(){
  const id="cloud-sync-setup"; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body}=buildWindow({id,title:"Cloud Sync Setup",width:600,height:480,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">One-time, per device — admin only</span>`});
  function render(){
    const connected=!!(DB.cloud&&DB.cloud.teamCode);
    const teamPaused=connected&&CLOUD_SYNC_PAUSED;
    const devPaused=connected&&DEVICE_SYNC_PAUSED;
    body.innerHTML=`<div style="padding:16px;">
      ${connected
        ? `<div class="note" style="margin-bottom:12px;">This device is connected to <b>${esc(DB.cloud.teamName||"your team")}</b>. Staff sign in here using the regular User Login screen — name and PIN only, no team code needed.</div>
           ${teamPaused?`<div class="note" style="margin-bottom:10px;background:#fff7e0;border-color:#e6c200;color:#6b5400;"><b>Cloud sync is paused for everyone, on every device.</b> Use this when something risky is happening (a migration, a schema change) and nobody anywhere should sync right now.</div>`:``}
           ${devPaused?`<div class="note" style="margin-bottom:10px;background:#eef1f4;border-color:#cdd6df;color:#555;"><b>Cloud sync is paused on this device only.</b> Other devices keep syncing normally — useful for testing/dev work on this one machine without filling the shared database.</div>`:``}
           <fieldset class="gb" style="margin-bottom:10px;"><legend>This device only</legend>
             <div class="smallhint" style="margin-bottom:8px;">Stops just this computer from syncing — nobody else is affected. Stored centrally (not just on this machine), so an admin can also pause or resume this exact device from the Manage Devices screen, without needing to be sitting at it.</div>
             <button class="btn ${devPaused?'primary':''}" id="cs-devtoggle">${devPaused?"Resume This Device":"Pause This Device"}</button></fieldset>
           <fieldset class="gb" style="margin-bottom:12px;"><legend>Everyone, everywhere</legend>
             <div class="smallhint" style="margin-bottom:8px;">Stops every device on the team from syncing — for when something bigger is going on, not routine dev work on one machine.</div>
             <button class="btn ${teamPaused?'primary':''}" id="cs-pausetoggle">${teamPaused?"Resume Cloud Sync (All Devices)":"Pause Cloud Sync (All Devices)"}</button></fieldset>
           <button class="btn" id="cs-disconnect">Disconnect this device</button>`
        : `<div class="note" style="margin-bottom:12px;">Connect this device to your team's cloud database, once. After this, the regular User Login screen handles everything — no team code is ever shown to staff.</div>
           <fieldset class="gb"><legend>Connect this device</legend>
             <div class="ff" style="grid-template-columns:110px 1fr;margin-bottom:6px;"><label class="fld">Team Code</label><input class="txt" id="cs-team"></div>
             <div class="ff" style="grid-template-columns:110px 1fr;margin-bottom:6px;"><label class="fld">Device Name</label><input class="txt" id="cs-devname" placeholder="e.g. Tyler's Laptop, Warehouse PC"></div>
             <div class="ff" style="grid-template-columns:110px 1fr;margin-bottom:6px;"><label class="fld">Your Name</label><input class="txt" id="cs-name"></div>
             <div class="ff" style="grid-template-columns:110px 1fr;"><label class="fld">Your PIN</label><input class="txt" id="cs-pin" type="password"></div>
             <div style="margin-top:10px;display:flex;gap:8px;align-items:center;"><button class="btn primary" id="cs-connect">Connect This Device</button><span class="smallhint" id="cs-msg"></span></div></fieldset>`}
      </div>`;
    if(connected){
      const devBtn=body.querySelector("#cs-devtoggle");
      devBtn.onclick=async ()=>{
        if(!cloudSession){ alert("You need to be logged in through the cloud (not just connected locally) to change this — log out and back in with your cloud account first."); return; }
        devBtn.disabled=true;
        try{
          const r=await Cloud.setDevicePaused(cloudSession.session_token,thisDeviceKey(),!devPaused);
          if(!r.ok){ alert("Couldn't change this (HTTP "+r.status+"): "+(r.body||"").slice(0,200)); devBtn.disabled=false; return; }
          await refreshSyncPausedState();
          render();
        }catch(e){ alert("Could not reach the server: "+(e&&e.message?e.message:e)); devBtn.disabled=false; }
      };
      const ptBtn=body.querySelector("#cs-pausetoggle");
      ptBtn.onclick=async ()=>{
        if(!cloudSession){ alert("You need to be logged in through the cloud (not just connected locally) to change this — log out and back in with your cloud account first."); return; }
        ptBtn.disabled=true;
        try{
          const r=await Cloud.setSyncPaused(cloudSession.session_token,!teamPaused);
          if(!r.ok){ alert("Couldn't change this (HTTP "+r.status+"): "+(r.body||"").slice(0,200)); ptBtn.disabled=false; return; }
          await refreshSyncPausedState();
          render();
        }catch(e){ alert("Could not reach the server: "+(e&&e.message?e.message:e)); ptBtn.disabled=false; }
      };
      body.querySelector("#cs-disconnect").onclick=()=>{
      if(!confirm("Disconnect this device from "+(DB.cloud.teamName||"your team")+"? Staff logins on this device will go back to the local-only list until it's reconnected.")) return;
      DB.cloud={}; save(); render(); try{ paintCloudBadge(); }catch(e){} }; return; }
    body.querySelector("#cs-connect").onclick=async ()=>{
      const team=body.querySelector("#cs-team").value.trim(), devName=body.querySelector("#cs-devname").value.trim(), name=body.querySelector("#cs-name").value.trim(), pin=body.querySelector("#cs-pin").value.trim();
      const msg=body.querySelector("#cs-msg");
      if(!team||!devName||!name||!pin){ msg.style.color="#c0392b"; msg.textContent="Fill in all four fields."; return; }
      msg.style.color="#555"; msg.textContent="Connecting…";
      try{
        const r=await Cloud.login(team,name,pin);
        if(!r.ok){ msg.style.color="#c0392b"; msg.textContent="Couldn't connect (HTTP "+r.status+"): "+(r.body||"").slice(0,200); return; }
        let rows=[]; try{ rows=JSON.parse(r.body); }catch(e){}
        const row=rows&&rows[0];
        if(!row){ msg.style.color="#c0392b"; msg.textContent="Team code, name, or PIN not recognized."; return; }
        DB.cloud={ teamCode:team, teamId:row.team_id, teamName:row.team_name, deviceName:devName, connectedAt:new Date().toISOString() };
        cloudSession=row; save();
        await Cloud.registerDevice(cloudSession.session_token, thisDeviceKey(), devName);
        msg.style.color="#1f7244"; msg.textContent="Connected!";
        setTimeout(render,400);
      }catch(e){ msg.style.color="#c0392b"; msg.textContent="Could not reach the server: "+(e&&e.message?e.message:e); }
    };
  }
  render();
}
// Lets an admin see every device connected to the team, and pause/resume any of them

function openManageDevices(){

// Admin-only. Read-only audit trail of every eBay account-deletion notification WIM has
// processed — purging happens automatically (checkEbayDeletionRequests), this screen is
// purely for visibility/proof that it's actually working, not a place to trigger it
// manually. A manual "Check Now" button is included for testing without waiting for the
// next automatic cycle.
const SIM_FAKE_BUYERS=["test_buyer_amy","test_buyer_jordan","test_buyer_sam","test_buyer_priya","test_buyer_chen"];
// Admin-only, fully local. Nothing created here is real eBay data — items are tagged
// simulated:true and the real eBay-calling buttons elsewhere (Mark Shipped, List Item)
// already check that flag and skip the real API call for them. Per the original
// requirement this data should never reach the cloud — since the per-screen cloud
// migration hasn't happened yet, regular saves are already local-only today; the
// simulated flag is here so that future cloud-sync work can filter it out once that
// migration exists.
// Admin-only, one-time-per-team tool: pushes this device's current local inventory into the
// cloud database for real. Genuinely safe to explore — Preview (Dry Run) shows exactly what
// would happen without sending anything, and the real upload uses upsertItem (the same
// conflict-checked function every other cloud write already goes through), so it can be
// safely re-run if interrupted partway — already-migrated items are detected and skipped on
// a second pass, not duplicated. Simulated items (Simulation Mode) are deliberately excluded.
function openCloudDataMigration(){
  if(openWindows["cloud-data-migration"]){ focusWin(openWindows["cloud-data-migration"].el); return; }
  const {body}=buildWindow({id:"cloud-data-migration",title:"Cloud Data Migration",width:760,height:600});
  let lastPreview=null;
  function localItemToCloudData(it){
    return { sku: it.sku||"", description: it.desc||"", condition: it.condition||"", section: it.section||"", sub_category: it.subCategory||"",
      on_hand: parseFloat(it.onHand)||0, cost: parseFloat(it.unitCost)||0, retail: parseFloat(it.retail)||0, vendor: it.vendor||"",
      location_slot: it.slot||"", location_placement: it.placement!=null?String(it.placement):"",
      image: it.image||"", images: it.images||[], aspects: it.aspects||{}, listing: it.listing||{},
      item_number: it.upc||"", status: itemStatus(it), fulfillment: it.fulfillment||{}, simulated: false, sold: !!it.sold };
  }
  function eligibleItems(){ return DB.items.filter(it=>!it.simulated && !it.deleted); }
  function render(){
    const connected = !!(DB.cloud&&DB.cloud.teamCode);
    body.innerHTML=`<div style="padding:16px;overflow:auto;">
      <div class="note" style="margin-bottom:12px;">Pushes this device's current inventory into the cloud database for the first time. Safe to preview as many times as you like before actually running it — Preview never sends anything. Simulated items are automatically excluded.</div>
      ${!connected?`<div class="note" style="background:#fde8e8;border-color:#e0a0a0;color:#7a2020;">This device isn't connected to the cloud yet — set that up first in Cloud Sync Setup.</div>`:``}
      ${connected?`
      <fieldset class="gb" style="margin-bottom:12px;"><legend>This device's data</legend>
        <div class="smallhint">${eligibleItems().length} eligible item(s) locally (${DB.items.length-eligibleItems().length} simulated/deleted item(s) excluded).</div></fieldset>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn" id="cdm-preview">Preview (Dry Run)</button>
        <button class="btn primary" id="cdm-run" ${lastPreview?"":"disabled"}>Run Migration${lastPreview?(" ("+lastPreview.toMigrate.length+")"):""}</button></div>
      <div id="cdm-result"></div>
      `:``}
      </div>`;
    if(!connected) return;
    body.querySelector("#cdm-preview").onclick=()=>runPreview();
    if(lastPreview) body.querySelector("#cdm-run").onclick=()=>runMigration();
  }
  async function runPreview(){
    body.querySelector("#cdm-result").innerHTML=`<div class="smallhint">Checking what's already in the cloud…</div>`;
    if(!cloudSession){ body.querySelector("#cdm-result").innerHTML=`<div style="color:#c0392b;">Log in through the cloud first (the regular User Login screen, not just connected locally).</div>`; return; }
    try{
      const r=await Cloud.getItems(cloudSession.session_token);
      if(!r.ok){ body.querySelector("#cdm-result").innerHTML=`<div style="color:#c0392b;">Couldn't read the cloud's current items (HTTP ${r.status}).</div>`; return; }
      let cloudItems=[]; try{ cloudItems=JSON.parse(r.body)||[]; }catch(e){}
      const cloudSkus=new Set(cloudItems.map(c=>c.sku).filter(Boolean));
      const local=eligibleItems();
      const toMigrate=local.filter(it=>!it.sku || !cloudSkus.has(it.sku));
      const alreadyThere=local.filter(it=>it.sku && cloudSkus.has(it.sku));
      lastPreview={ toMigrate, alreadyThere, cloudCountBefore: cloudItems.length };
      render(); // re-render to enable the Run button now that lastPreview is set
      body.querySelector("#cdm-result").innerHTML=`<fieldset class="gb"><legend>Preview result</legend>
        <div class="smallhint">${toMigrate.length} item(s) would be uploaded.<br>${alreadyThere.length} item(s) already appear to exist in the cloud (matched by Warehouse SKU) and would be skipped.<br>Cloud currently has ${cloudItems.length} item(s) total before this runs.</div></fieldset>`;
    }catch(e){ body.querySelector("#cdm-result").innerHTML=`<div style="color:#c0392b;">Could not reach the cloud: ${esc(e&&e.message?e.message:String(e))}</div>`; }
  }
  async function runMigration(){
    if(!lastPreview||!lastPreview.toMigrate.length){ uiAlert("Nothing to migrate — run Preview first, or everything's already there."); return; }
    if(!cloudSession){ uiAlert("Log in through the cloud first."); return; }
    if(!confirm("Upload "+lastPreview.toMigrate.length+" item(s) to the cloud now? This writes real data — safe to re-run later if interrupted, already-migrated items won't be duplicated.")) return;
    const resultEl=body.querySelector("#cdm-result");
    let done=0, failed=0; const errors=[];
    for(const it of lastPreview.toMigrate){
      resultEl.innerHTML=`<div class="smallhint">Uploading ${done+failed+1} of ${lastPreview.toMigrate.length}…</div>`;
      try{
        const r=await Cloud.upsertItem(cloudSession.session_token, null, null, localItemToCloudData(it));
        if(r&&r.ok) done++; else { failed++; errors.push((it.desc||it.sku||"item")+": HTTP "+(r&&r.status)); }
      }catch(e){ failed++; errors.push((it.desc||it.sku||"item")+": "+(e&&e.message||e)); }
    }
    lastPreview=null;
    resultEl.innerHTML=`<fieldset class="gb"><legend>Migration complete</legend>
      <div class="smallhint" style="color:${failed?'#c0392b':'#1f7244'};">${done} item(s) uploaded successfully.${failed?(" "+failed+" failed."):""}</div>
      ${errors.length?`<div class="smallhint" style="margin-top:6px;color:#c0392b;">${errors.slice(0,10).map(esc).join("<br>")}${errors.length>10?"<br>…and "+(errors.length-10)+" more.":""}</div>`:``}
      </fieldset>`;
    render();
  }
  render();
}

    body.querySelector("#sim-addmsg").onclick=()=>{

        DB.items=DB.items.filter(i=>!i.simulated); DB.simulatedConversations=[];
        save(); refreshMessageUnreadCache(); wimRefreshAll(); render();
      });
