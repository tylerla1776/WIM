  function render(){ tb.innerHTML="";
    staged.forEach((s,i)=>{ const onHand=groupQty(s.units[0]); const tr=document.createElement("tr");
      const firstSku=s.units.slice().sort((a,b)=>skuCmp(a.sku,b.sku))[0].sku;
      tr.innerHTML=`<td>${esc(s.num)||'<span class="smallhint">(blank)</span>'}</td><td>${esc(s.desc)}</td><td><b>${esc(firstSku)}</b>${s.units.length>1?` <span class="smallhint">+${s.units.length-1} more</span>`:''}</td><td class="cc">${onHand}</td><td class="cc">${s.units.length}</td>`;
      const tdPlus=document.createElement("td"); tdPlus.className="cc";
      if(onHand>1){ const plus=document.createElement("button"); plus.className="tbtn plus"; plus.style.cssText="width:24px;height:22px;display:inline-flex;"; plus.innerHTML=I.plus; plus.title="Add the next SKU of this item";
        plus.onclick=()=>{ const used=stagedIds(); const u=nextUnit(s.key,used); if(!u){ msg.style.color="#c0392b"; msg.textContent="No more available units of "+(s.num||s.desc)+"."; return; } s.units.push(u); render(); }; tdPlus.appendChild(plus); }
      tr.appendChild(tdPlus);
      const tdX=document.createElement("td"); tdX.className="cc"; const x=document.createElement("button"); x.className="btn sm"; x.textContent="✕"; x.title="Remove"; x.onclick=()=>{ staged.splice(i,1); render(); }; tdX.appendChild(x); tr.appendChild(tdX);
      tb.appendChild(tr); });
    const total=staged.reduce((n,s)=>n+s.units.length,0);
    body.querySelector("#bs-hint").textContent = total? ("Staged "+total+" unit(s) across "+staged.length+" item(s).") : "Nothing staged yet.";
    body.querySelector("#bs-sell").disabled = total===0;
  }
  const doAdd=()=>{ if(add(q.value)){ q.value=""; } q.focus(); };
  body.querySelector("#bs-find").onclick=doAdd;
  q.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doAdd(); } });
  body.querySelector("#bs-sell").onclick=()=>{ const units=staged.flatMap(s=>s.units).filter(u=>!u.sold); if(!units.length) return;
    openSellReview(units, "Bulk Sell", ()=>{ staged=[]; render(); msg.style.color="#1f7244"; msg.textContent="Sold. Press Cancel to close, or scan more."; }); };
  body.querySelector("#bs-okay").onclick=close;
  setTimeout(()=>q.focus(),0); render();
}

function openAdjust(){
  if(openWindows["adjust"]){ focusWin(openWindows["adjust"].el); return; }
  const {body}=buildWindow({id:"adjust",title:"Adjust Inventory",width:920,height:640,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Pull active stock out for a reason (not a sale)</span>`});
  const qtyByKey={}; let results=[];
  body.innerHTML=`
    <div class="searchform" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="ff"><label>Item Number / SKU</label><input class="txt" id="aj-q"></div>
      <div class="ff"><label>Description</label><input class="txt" id="aj-desc"></div>
      <div class="ff"><label>Adjustment Type</label><select class="cmb" id="aj-type">${DB.adjustmentTypes.map(t=>`<option>${esc(t)}</option>`).join("")}</select></div>
    </div>
    <div style="padding:0 14px 8px;display:flex;gap:8px;align-items:center;"><button class="btn primary" id="aj-go">Search</button><button class="btn" id="aj-clear">Clear</button>
      <span class="smallhint">Adjustment types decrease quantity and move items to the Catalog.</span></div>
    <div class="resultwrap"><table class="res"><thead><tr><th>Item Number</th><th>Description</th><th>Warehouse SKU</th><th>Category</th><th>On Hand</th><th style="width:120px;">Adjust Qty</th></tr></thead><tbody id="aj-tb"></tbody></table></div>
    <div class="statusbar"><span id="aj-status">Search active inventory, set quantities, choose a type, then Apply.</span><span><button class="btn primary" id="aj-apply" disabled>Apply Adjustments</button></span></div>`;
  const g=id=>{ const e=body.querySelector("#"+id); return e?e.value:""; };
  function run(){ const q=g("aj-q").trim().toLowerCase(), d=g("aj-desc").trim().toLowerCase();
    let units=activeItems().filter(it=>{ if(q&&!((it.upc||"").toLowerCase().includes(q)||(it.sku||"").toLowerCase().includes(q))) return false; if(d&&!(it.desc||"").toLowerCase().includes(d)) return false; return true; });
    const seen={}; results=[]; units.forEach(u=>{ const k=groupKey(u); if(!seen[k]){ seen[k]=1; results.push(firstUnit(u)); } });
    render(); body.querySelector("#aj-status").textContent=results.length?("Found "+results.length+" item(s)."):"No active items matched."; }
  function render(){ const tb=body.querySelector("#aj-tb"); tb.innerHTML="";
    results.forEach(it=>{ const k=groupKey(it); const onHand=groupQty(it); const tr=document.createElement("tr");
      tr.innerHTML=`<td>${esc(it.upc)}</td><td>${esc(it.desc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td><td class="cc">${onHand}</td>`;
      const td=document.createElement("td"); const inp=document.createElement("input"); inp.className="txt"; inp.style.width="80px"; inp.type="number"; inp.min="0"; inp.max=String(onHand); inp.value=String(qtyByKey[k]||0);
      inp.oninput=()=>{ let v=Math.max(0,Math.min(onHand,parseInt(inp.value,10)||0)); qtyByKey[k]=v; inp.value=String(v); updateApply(); }; td.appendChild(inp); tr.appendChild(td); tb.appendChild(tr); });
    updateApply();
  }
  function totalQty(){ return results.reduce((n,it)=>n+(qtyByKey[groupKey(it)]||0),0); }
  function updateApply(){ body.querySelector("#aj-apply").disabled = totalQty()===0; }
  body.querySelector("#aj-go").onclick=run;
  body.querySelector("#aj-clear").onclick=()=>{ body.querySelector("#aj-q").value=""; body.querySelector("#aj-desc").value=""; results=[]; Object.keys(qtyByKey).forEach(k=>delete qtyByKey[k]); render(); body.querySelector("#aj-status").textContent="Search active inventory, set quantities, choose a type, then Apply."; };
  body.querySelectorAll(".searchform input").forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") run(); }));
  body.querySelector("#aj-apply").onclick=()=>{ const reason=g("aj-type"); const total=totalQty(); if(!total) return;
    uiConfirm("Apply "+total+" "+reason+" adjustment(s)? This removes the units from active inventory and creates a record.",()=>{
      const toAdjust=[];
      results.forEach(it=>{ const k=groupKey(it); const n=qtyByKey[k]||0; if(n>0){ const units=unitsOf(it).slice(0,n); units.forEach(u=>toAdjust.push(u)); } });
      if(!toAdjust.length) return;
      const rec=adjustItems(toAdjust, SESSION.user.id, reason); Object.keys(qtyByKey).forEach(k=>delete qtyByKey[k]);
      refreshSearchWindows(); refreshInvoices(); run();
      body.querySelector("#aj-status").textContent="Record #"+rec.num+" created — "+toAdjust.length+" unit(s) adjusted ("+reason+")."; }); };
}

function openActiveSummary(){
  const id="rep-summary"; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body}=buildWindow({id,title:"Active Summary",width:760,height:600,
    toolbar:`${tbtn(I.print,'Print')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Inventory movement by type over a date range</span>`});
  const today=new Date(), first=new Date(today.getFullYear(),today.getMonth(),1);
  const iso=d=>d.toISOString().slice(0,10);
  body.innerHTML=`<div class="searchform" style="grid-template-columns:1fr 1fr;padding:12px 14px 4px;">
      <div class="ff"><label>From</label><input class="txt" id="su-from" type="date" value="${iso(first)}"></div>
      <div class="ff"><label>To</label><input class="txt" id="su-to" type="date" value="${iso(today)}"></div></div>
    <div style="padding:0 14px 8px;"><button class="btn primary" id="su-go">Run</button></div>
    <div id="su-out" style="padding:0 14px 14px;overflow:auto;flex:1;"></div>`;
  function run(){
    const from=body.querySelector("#su-from").value, to=body.querySelector("#su-to").value;
    const inRange=r=>{ const d=(r.createdAt||"").slice(0,10); return (!from||d>=from)&&(!to||d<=to); };
    const recs=DB.invoices.filter(inRange);
    const costOf=id=>{ const it=DB.items.find(x=>x.id===id); return it?(parseFloat(it.unitCost)||0):0; };
    const agg={}; // type -> {units, value}
    recs.forEach(r=>{ r.lines.forEach(l=>{ if(l.reversed) return; const t=r.type||"Sell"; agg[t]=agg[t]||{units:0,value:0}; agg[t].units+=1; agg[t].value+=costOf(l.itemId); }); });
    const order=["Add","Bulk Add","Sell","Bulk Sell","Delete",...DB.adjustmentTypes];
    const types=Object.keys(agg).sort((a,b)=>{ const ia=order.indexOf(a), ib=order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });
    const activeUnits=activeItems().length;
    const activeValue=activeItems().reduce((s,it)=>s+(parseFloat(it.unitCost)||0),0);
    let html=`<div style="display:flex;gap:18px;margin:10px 0;">
        <div class="gb" style="padding:10px 16px;"><div class="smallhint">Active units now</div><div style="font-size:22px;font-weight:700;">${activeUnits}</div></div>
        <div class="gb" style="padding:10px 16px;"><div class="smallhint">Active inventory value (at cost)</div><div style="font-size:22px;font-weight:700;">$${activeValue.toFixed(2)}</div></div></div>
      <div class="col-title" style="text-align:left;">Movement ${esc(from||"…")} → ${esc(to||"…")}</div>
      <div class="resultwrap" style="margin-top:6px;"><table class="res"><thead><tr><th>Record Type</th><th>Units</th><th>Value (at cost)</th></tr></thead><tbody>`;
    if(!types.length) html+=`<tr><td colspan="3" style="color:#888;">No activity in this range.</td></tr>`;
    let tu=0,tv=0; types.forEach(t=>{ tu+=agg[t].units; tv+=agg[t].value; html+=`<tr><td>${esc(t)}</td><td class="cc">${agg[t].units}</td><td class="cc">$${agg[t].value.toFixed(2)}</td></tr>`; });
    if(types.length) html+=`<tr style="font-weight:700;"><td>Total</td><td class="cc">${tu}</td><td class="cc">$${tv.toFixed(2)}</td></tr>`;
    html+=`</tbody></table></div>`;
    body.querySelector("#su-out").innerHTML=html;
    body._print=()=>printTable("WIM Active Summary "+(from||"")+" to "+(to||""), ["Record Type","Units","Value (at cost)"], types.map(t=>[t,agg[t].units,"$"+agg[t].value.toFixed(2)]));
  }
  body.querySelector("#su-go").onclick=run;
  const pb=openWindows[id].el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>{ if(body._print) body._print(); };
  run();
}

/* ============================================================ SUB-CATEGORY MANAGER ============================================================ */
function openSubcatManager(cat){
  const id="subcat-"+cat; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  if(!DB.subcats[cat]) DB.subcats[cat]=[{name:cat,ebayId:"",ebayName:"",aspects:[]}];
  const {body,close}=buildWindow({id,title:"Sub Categories — "+cat,width:680,height:560,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Sub categories carry the eBay mapping &amp; listing fields for ${esc(cat)}</span>`});
  let sel=null;
  function render(){
    body.innerHTML=`<div style="display:flex;height:100%;">
      <div style="width:230px;border-right:1px solid #d8d8d8;display:flex;flex-direction:column;">
        <div class="col-title" style="text-align:left;">Sub categories</div>
        <div class="listbox" id="sc-list" style="flex:1;"></div>
        <div style="padding:8px;display:flex;gap:6px;"><input class="txt" id="sc-new" placeholder="New sub category" style="flex:1;"><button class="btn sm" id="sc-add">Add</button></div>
      </div>
      <div style="flex:1;padding:12px 14px;overflow:auto;" id="sc-detail"></div></div>`;
    const list=body.querySelector("#sc-list");
    DB.subcats[cat].forEach(sc=>{ const li=document.createElement("div"); li.className="li"+(sel===sc.name?" sel":"");
      li.innerHTML=`${esc(sc.name)}${sc.name===cat?' <span class="smallhint">(default)</span>':''}${sc.ebayName?` <span class="badge ok">eBay</span>`:''}`;
      li.onclick=()=>{ sel=sc.name; render(); }; list.appendChild(li); });
    const det=body.querySelector("#sc-detail");
    if(!sel){ det.innerHTML=`<div class="smallhint">Select a sub category, or add one. Each sub category maps to one eBay category and defines the listing fields items in it will show.</div>`; }
    else { const sc=subcatObj(cat,sel); if(!sc){ sel=null; return render(); }
      det.innerHTML=`<div style="font-size:14px;font-weight:600;margin-bottom:10px;">${esc(sc.name)}</div>
        <div class="ff" style="grid-template-columns:130px 1fr;margin-bottom:8px;"><label class="fld">eBay category name</label><input class="txt" id="sc-ename" value="${esc(sc.ebayName||"")}" placeholder="e.g. Movies & TV > DVDs"></div>
        <div class="ff" style="grid-template-columns:130px 1fr;margin-bottom:8px;"><label class="fld">eBay category ID</label><input class="txt" id="sc-eid" value="${esc(sc.ebayId||"")}" placeholder="filled automatically in a later update"></div>
        <div class="col-title" style="text-align:left;margin-top:10px;">Listing fields (aspects)</div>
        <div class="smallhint" style="margin-bottom:6px;">These show on the item's landing page for this sub category. In a later update the magnifying-glass search fills these from eBay automatically.</div>
        <div id="sc-aspects"></div>
        <div style="display:flex;gap:6px;margin-top:6px;"><input class="txt" id="sc-aname" placeholder="Add a field (e.g. Genre)" style="flex:1;"><label class="chkrow" style="white-space:nowrap;"><span class="chk" id="sc-areq"></span> required</label><button class="btn sm" id="sc-aadd">Add field</button></div>
        <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn primary" id="sc-save">Save</button>${sc.name!==cat?'<button class="btn" id="sc-del">Delete sub category</button>':''}</div>
        <div class="err" id="sc-msg"></div>`;
      const aw=det.querySelector("#sc-aspects"); (sc.aspects||[]).forEach((a,i)=>{ const r=document.createElement("div"); r.style.cssText="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;";
        r.innerHTML=`<span style="flex:1;">${esc(a.name)} ${a.required?'<span class="badge warn">required</span>':''}</span>`;
        const x=document.createElement("button"); x.className="btn sm"; x.textContent="✕"; x.onclick=()=>{ sc.aspects.splice(i,1); save(); render(); }; r.appendChild(x); aw.appendChild(r); });
      if(!sc.aspects||!sc.aspects.length) aw.innerHTML=`<div class="smallhint">No fields yet.</div>`;
      const req=det.querySelector("#sc-areq"); req.onclick=()=>req.classList.toggle("on");
      det.querySelector("#sc-aadd").onclick=()=>{ const n=det.querySelector("#sc-aname").value.trim(); if(!n) return; if(!sc.aspects)sc.aspects=[];
        if(sc.aspects.some(a=>a.name.toLowerCase()===n.toLowerCase())){ det.querySelector("#sc-msg").textContent="That field already exists."; return; }
        sc.aspects.push({name:n,required:req.classList.contains("on"),type:"text"}); save(); render(); };
      det.querySelector("#sc-save").onclick=()=>{ sc.ebayName=det.querySelector("#sc-ename").value.trim(); sc.ebayId=det.querySelector("#sc-eid").value.trim(); save(); det.querySelector("#sc-msg").style.color="#1f7244"; det.querySelector("#sc-msg").textContent="Saved."; render(); };
      const del=det.querySelector("#sc-del"); if(del) del.onclick=()=>{ uiConfirm('Delete sub category "'+sc.name+'"? Items using it will fall back to the default.',()=>{
        DB.items.forEach(it=>{ if(it.section===cat&&it.subCategory===sc.name) it.subCategory=cat; });
        DB.subcats[cat]=DB.subcats[cat].filter(x=>x.name!==sc.name); sel=null; save(); render(); }); };
    }
    body.querySelector("#sc-add").onclick=()=>{ const n=body.querySelector("#sc-new").value.trim(); if(!n) return;
      if(DB.subcats[cat].some(s=>s.name.toLowerCase()===n.toLowerCase())){ return; }
      DB.subcats[cat].push({name:n,ebayId:"",ebayName:"",aspects:[]}); sel=n; save(); render(); };
  }
  render();
}

/* ============================================================ DESCRIPTION MANAGER ============================================================ */
function openDescriptionManager(){
  if(openWindows["desc-mgr"]){ focusWin(openWindows["desc-mgr"].el); return; }
  const {body}=buildWindow({id:"desc-mgr",title:"Description Manager",width:860,height:620,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Reusable listing descriptions, filtered by category</span>`});
  let sel=null, sortAsc=true;
  function render(){
    body.innerHTML=`<div style="display:flex;height:100%;">
      <div style="width:260px;border-right:1px solid #d8d8d8;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;gap:6px;padding:8px;"><b style="font-size:12.5px;flex:1;">Descriptions</b><button class="btn sm" id="dm-sort">Sort ${sortAsc?'A→Z':'Z→A'}</button><button class="btn sm" id="dm-new">+ New</button></div>
        <div class="listbox" id="dm-list" style="flex:1;"></div>
      </div>
      <div style="flex:1;padding:12px 14px;overflow:auto;" id="dm-detail"></div></div>`;
    const list=body.querySelector("#dm-list"); const arr=[...DB.descriptions].sort((a,b)=> sortAsc? a.title.localeCompare(b.title): b.title.localeCompare(a.title));
    if(!arr.length) list.innerHTML=`<div class="li" style="color:#888;">No descriptions yet. Click + New.</div>`;
    arr.forEach(d=>{ const li=document.createElement("div"); li.className="li"+(sel===d.id?" sel":"");
      const cats=(d.categories||[]).includes("*ALL*")?"All categories":(d.categories||[]).join(", ")||"—";
      li.innerHTML=`<b>${esc(d.title)}</b><br><span class="smallhint">${esc(cats)}</span>`; li.onclick=()=>{ sel=d.id; render(); }; list.appendChild(li); });
    body.querySelector("#dm-sort").onclick=()=>{ sortAsc=!sortAsc; render(); };
    body.querySelector("#dm-new").onclick=()=>{ const d={id:crypto.randomUUID(),title:"Untitled",body:"",categories:[],createdAt:new Date().toISOString()}; DB.descriptions.push(d); sel=d.id; save(); render(); };
    const det=body.querySelector("#dm-detail");
    if(!sel){ det.innerHTML=`<div class="smallhint">Select a description to edit, or create one. A description can appear under any categories you tick (or all of them), and you'll pick from them when listing an item.</div>`; return; }
    const d=DB.descriptions.find(x=>x.id===sel); if(!d){ sel=null; return render(); }
    const allOn=(d.categories||[]).includes("*ALL*");
    det.innerHTML=`<div class="ff" style="grid-template-columns:90px 1fr;margin-bottom:8px;"><label class="fld">Title</label><input class="txt" id="dm-title" value="${esc(d.title)}"></div>
      <div class="col-title" style="text-align:left;">Description text</div>
      <textarea id="dm-body" style="width:100%;height:170px;font-family:inherit;font-size:13px;padding:8px;border-top:1px solid #848484;border-left:1px solid #848484;border-right:1px solid #e9e9e9;border-bottom:1px solid #e9e9e9;">${esc(d.body)}</textarea>
      <div class="col-title" style="text-align:left;margin-top:10px;">Show under categories</div>
      <label class="chkrow"><span class="chk ${allOn?'on':''}" id="dm-all"></span> <b>Select All categories</b></label>
      <div id="dm-cats" style="columns:2;margin-top:4px;${allOn?'opacity:.45;pointer-events:none;':''}"></div>
      <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn primary" id="dm-save">Save</button><button class="btn" id="dm-del">Delete</button><span class="err" id="dm-msg" style="align-self:center;"></span></div>`;
    const catsHost=det.querySelector("#dm-cats");
    DB.sections.forEach(c=>{ const lab=document.createElement("label"); lab.className="chkrow"; lab.style.breakInside="avoid";
      const on=(d.categories||[]).includes(c); lab.innerHTML=`<span class="chk ${on?'on':''}"></span> ${esc(c)}`;
      lab.querySelector(".chk").onclick=()=>lab.querySelector(".chk").classList.toggle("on"); lab.dataset.cat=c; catsHost.appendChild(lab); });
    const allChk=det.querySelector("#dm-all"); allChk.onclick=()=>{ allChk.classList.toggle("on"); render2KeepSel(d.id); };
    function render2KeepSel(id){ // re-render keeping selection (toggle All affects layout)
      d.categories = allChk.classList.contains("on") ? ["*ALL*"] : collectCats(); d.title=det.querySelector("#dm-title").value; d.body=det.querySelector("#dm-body").value; save(); sel=id; render(); }
    function collectCats(){ return [...catsHost.querySelectorAll("label")].filter(l=>l.querySelector(".chk").classList.contains("on")).map(l=>l.dataset.cat); }
    det.querySelector("#dm-save").onclick=()=>{ const newBody=det.querySelector("#dm-body").value; const changed = newBody!==d.body;
      d.title=det.querySelector("#dm-title").value.trim()||"Untitled"; d.body=newBody;
      d.categories = allChk.classList.contains("on") ? ["*ALL*"] : collectCats();
      const affected = changed ? DB.items.filter(it=>it.listing&&it.listing.status==="listed"&&it.listing.descriptionId===d.id) : [];
      const finish=()=>{ save(); det.querySelector("#dm-msg").style.color="#1f7244"; det.querySelector("#dm-msg").textContent="Saved."; render(); };
      if(affected.length){ uiChoose("This description is on "+affected.length+" active listing(s). What would you like to do?",
        [ {label:"View affected listings",onClick:()=>{ openManageListings(); finish(); }},
          {label:"Push through to live listings",primary:true,onClick:()=>{ affected.forEach(it=>addHistory(it,"Listing description updated (pushed): "+d.title)); finish(); uiAlert("Marked "+affected.length+" listing(s) to update. The actual eBay revise call runs in the publishing update."); }},
          {label:"Just save",onClick:finish} ]); }
      else finish(); };
    det.querySelector("#dm-del").onclick=()=>{ uiConfirm('Delete description "'+d.title+'"?',()=>{ DB.descriptions=DB.descriptions.filter(x=>x.id!==d.id); sel=null; save(); render(); }); };
  }
  render();
}

/* ============================================================ LIVE: READY TO LIST ============================================================ */
function openReadyToList(){
  if(openWindows["ready-list"]){ focusWin(openWindows["ready-list"].el); return; }
  const {body}=buildWindow({id:"ready-list",title:"Ready to List",width:900,height:560,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Items sent from Warehouse mode to be listed here</span>`});
  function render(){
    const rows=activeItems().filter(i=>i.listing&&i.listing.readyToList&&i.listing.status!=="listed").sort((a,b)=>skuCmp(a.sku,b.sku));
    body.innerHTML=`<div style="padding:10px 14px;font-size:12.5px;">${rows.length} item(s) waiting to be listed.</div>
      <div class="resultwrap" style="margin:0 14px 14px;"><table class="res"><thead><tr><th>Item Number</th><th>Description</th><th>Warehouse SKU</th><th>Category</th><th>Sub Category</th><th></th><th></th></tr></thead><tbody id="rl-tb"></tbody></table></div>`;
    const tb=body.querySelector("#rl-tb");
    if(!rows.length){ tb.innerHTML=`<tr><td colspan="7" style="color:#888;">Nothing here yet. In Warehouse mode, open an item and click “Send to Listing.”</td></tr>`; return; }
    rows.forEach(it=>{ const tr=document.createElement("tr");
      tr.innerHTML=`<td>${esc(it.upc)}</td><td>${esc(it.desc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td><td>${esc(it.subCategory||"")}</td>`;
      const tdL=document.createElement("td"); tdL.className="cc"; const b=document.createElement("button"); b.className="btn sm"; b.textContent="List"; b.onclick=()=>openItemDetail(it,"edit"); tdL.appendChild(b); tr.appendChild(tdL);
      const tdR=document.createElement("td"); tdR.className="cc"; const x=document.createElement("button"); x.className="btn sm"; x.textContent="Remove"; x.onclick=()=>{ it.listing.readyToList=false; addHistory(it,"Removed from Ready to List"); save(); render(); }; tdR.appendChild(x); tr.appendChild(tdR);
      tr.ondblclick=()=>openItemDetail(it,"edit"); tb.appendChild(tr); });
  }
  render();
}

}

/* ============================================================ eBay READ API (v2.2.4) ============================================================ */
const EBAY_SCOPE_APP="https://api.ebay.com/oauth/api_scope";
const EBAY_SCOPE_INV="https://api.ebay.com/oauth/api_scope/sell.inventory";
const EBAY={
  ready(){ return WIM_IS_DESKTOP && DB.ebay && DB.ebay.appId && DB.ebay.certId && DB.ebay.refreshToken; },
  mkt(){ return (DB.ebay&&DB.ebay.marketplace)||"EBAY_US"; },
  app(path,scope){ return wimDesktop.invoke("ebay_get_app",{env:(DB.ebay.env||"sandbox"),appId:DB.ebay.appId,certId:DB.ebay.certId,scope:scope||EBAY_SCOPE_APP,marketplace:this.mkt(),path}); },
  user(path,scope){ return wimDesktop.invoke("ebay_get_user",{env:(DB.ebay.env||"sandbox"),appId:DB.ebay.appId,certId:DB.ebay.certId,refreshToken:DB.ebay.refreshToken,scope:scope||EBAY_SCOPE_INV,marketplace:this.mkt(),path}); },
  async treeId(){ if(DB.ebay.categoryTreeId) return DB.ebay.categoryTreeId;
    const r=await this.app("/commerce/taxonomy/v1/get_default_category_tree_id?marketplace_id="+this.mkt());
    if(!r.ok) throw new Error("category tree (HTTP "+r.status+"): "+(r.body||"").slice(0,200));
    const j=JSON.parse(r.body); DB.ebay.categoryTreeId=j.categoryTreeId; save(); return j.categoryTreeId; }
};
function openEbayFind(it, onDone){
  if(!EBAY.ready()){ uiAlert("Set up your eBay keys first: Configuration → eBay Connection (and press Test)."); return; }
  const id="ebay-find-"+it.id; if(openWindows[id]){ openWindows[id].el.remove(); delete openWindows[id]; if(typeof renderTaskbar==="function") renderTaskbar(); }
  const {body,close}=buildWindow({id,title:"Find on eBay — "+(it.desc||""),width:700,height:640,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Search eBay, pick the category, then edit &amp; accept</span>`});
  let chosen=null;            // {id, leaf, path} of the picked eBay category
  let foundTitle="";          // suggested listing title from Browse
  function searchScreen(){
    body.innerHTML=`<div style="padding:14px;overflow:auto;height:100%;">
      <div class="ff" style="grid-template-columns:90px 1fr auto;gap:8px;align-items:center;">
        <label class="fld">Search</label><input class="txt" id="ef-q" value="${esc(it.desc||"")}"><button class="btn primary" id="ef-go">Search eBay</button></div>
      <div class="smallhint" style="margin-top:6px;">Type what the item is (e.g. its title). eBay suggests the best category and its listing fields.</div>
      <div id="ef-result" style="margin-top:12px;"></div>
      <div id="ef-msg" class="err" style="margin-top:8px;"></div></div>`;
    const q=body.querySelector("#ef-q");
    body.querySelector("#ef-go").onclick=()=>doSearch(q.value.trim());
    q.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doSearch(q.value.trim()); } });
    q.focus();
  }
  const setMsg=(t,ok)=>{ const m=body.querySelector("#ef-msg"); if(m){ m.style.color=ok?"#1f7244":"#c0392b"; m.textContent=t||""; } };
  async function doSearch(q){ if(!q){ setMsg("Type something to search for first."); return; }
    setMsg("Asking eBay for the best category…");
    try{
      const tree=await EBAY.treeId();
      const r=await EBAY.app(`/commerce/taxonomy/v1/category_tree/${tree}/get_category_suggestions?q=`+encodeURIComponent(q));
      if(!r.ok){ setMsg("Category lookup failed (HTTP "+r.status+"): "+(r.body||"").slice(0,200)); return; }
      const j=JSON.parse(r.body); const sugg=(j.categorySuggestions||[]).slice(0,8);
      if(!sugg.length){ setMsg("eBay returned no category suggestions for that text. Try different words."); return; }
      // try Browse for a representative listing title (best-effort)
      foundTitle=q;
      try{ const b=await EBAY.app("/buy/browse/v1/item_summary/search?limit=1&q="+encodeURIComponent(q));
        if(b.ok){ const bj=JSON.parse(b.body); const t=(bj.itemSummaries&&bj.itemSummaries[0]&&bj.itemSummaries[0].title)||""; if(t) foundTitle=t; } }catch(e){}
      setMsg("");
      const result=body.querySelector("#ef-result");
      result.innerHTML=`<div class="col-title" style="text-align:left;">Pick the eBay category</div>`;
      sugg.forEach(s=>{ const c=s.category||{}; const path=(s.categoryTreeNodeAncestors||[]).map(a=>a.categoryName).reverse().concat(c.categoryName).join(" › ");
        const row=document.createElement("div"); row.className="action"; row.innerHTML=`${esc(c.categoryName)} <span class="smallhint">${esc(path)}</span>`;
        row.onclick=()=>{ chosen={id:c.categoryId, leaf:c.categoryName, path}; loadAspects(); }; result.appendChild(row); });
    }catch(e){ setMsg("Could not reach eBay: "+(e&&e.message?e.message:e)); }
  }
  async function loadAspects(){ if(!chosen){ searchScreen(); return; }
    setMsg("Loading eBay's fields for this category…");
    let aspects=[];
    try{ const tree=await EBAY.treeId();
      const r=await EBAY.app(`/commerce/taxonomy/v1/category_tree/${tree}/get_item_aspects_for_category?category_id=`+encodeURIComponent(chosen.id));
      if(!r.ok){ setMsg("Field lookup failed (HTTP "+r.status+"): "+(r.body||"").slice(0,200)); return; }
      aspects=(JSON.parse(r.body).aspects)||[];
    }catch(e){ setMsg("Could not reach eBay: "+(e&&e.message?e.message:e)); return; }
    body.innerHTML=`<div style="padding:14px;overflow:auto;height:100%;">
      <div style="font-size:12.5px;color:#555;">eBay category: <b>${esc(chosen.path)}</b> <a href="#" id="ef-change">change</a></div>
      <div class="col-title" style="text-align:left;margin-top:8px;">Listing title</div>
      <input class="txt" id="ef-title" value="${esc(foundTitle||it.desc||"")}" style="width:100%;">
      <div class="smallhint" style="margin:4px 0 10px;">This flows into the item's Description. ${aspects.length} eBay field(s) below; required ones are marked *.</div>
      <div id="ef-fields"></div>
      <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn primary" id="ef-accept">Accept</button><button class="btn" id="ef-cancel">Cancel</button></div>
      <div id="ef-msg" class="err" style="margin-top:8px;"></div></div>`;
    const fh=body.querySelector("#ef-fields");
    aspects.forEach((a,i)=>{ const name=a.localizedAspectName, req=!!(a.aspectConstraint&&a.aspectConstraint.aspectRequired), vals=(a.aspectValues||[]).map(v=>v.localizedValue).slice(0,60);
      const dlId="efd-"+i; const wrap=document.createElement("div"); wrap.className="ff"; wrap.style.cssText="grid-template-columns:170px 1fr;margin-bottom:6px;";
      wrap.innerHTML=`<label class="fld">${esc(name)}${req?' <span class="req">*</span>':''}</label>
        <input class="txt ef-val" data-name="${esc(name)}" data-req="${req?1:0}" value="${esc(it.aspects[name]||"")}" list="${dlId}">
        <datalist id="${dlId}">${vals.map(v=>`<option value="${esc(v)}">`).join("")}</datalist>`;
      fh.appendChild(wrap); });
    body.querySelector("#ef-change").onclick=(e)=>{ e.preventDefault(); chosen=null; searchScreen(); };
    body.querySelector("#ef-cancel").onclick=close;
    body.querySelector("#ef-accept").onclick=()=>{
      // create / assign a sub category named after the eBay leaf, under the item's category
      const cat=it.section; if(!DB.subcats[cat]) DB.subcats[cat]=[];
      let sc=DB.subcats[cat].find(s=>s.name.toLowerCase()===chosen.leaf.toLowerCase());
      if(!sc){ sc={name:chosen.leaf,ebayId:"",ebayName:"",aspects:[],_new:true}; DB.subcats[cat].push(sc); }
      sc.ebayId=chosen.id; sc.ebayName=chosen.path;
      sc.aspects=aspects.map(a=>({name:a.localizedAspectName,required:!!(a.aspectConstraint&&a.aspectConstraint.aspectRequired),values:(a.aspectValues||[]).map(v=>v.localizedValue).slice(0,60)}));
      it.subCategory=sc.name;
      body.querySelectorAll(".ef-val").forEach(inp=>{ const v=inp.value.trim(); if(v) it.aspects[inp.dataset.name]=v; else delete it.aspects[inp.dataset.name]; });
      const title=body.querySelector("#ef-title").value.trim();
      if(title){ if(!it.listing) it.listing={}; it.listing.title=title; it.desc=it.desc||title; if(!it.listing.descBody) it.listing.descBody=title; }
      addHistory(it,"eBay category set: "+chosen.path);
      save(); if(onDone) onDone(); close();
      uiAlert('Applied. Sub category "'+sc.name+'" now carries these eBay fields.');
    };
  }
  searchScreen();
}

async function pullActiveListings(after){
  if(!EBAY.ready()){ uiAlert("Set up your eBay keys first: Configuration → eBay Connection (and press Test)."); return; }
  const prog=uiModal("Pulling from eBay",`<div id="pull-prog" style="font-size:13px;">Contacting eBay…</div>`,[]);
  const set=t=>{ const e=document.getElementById("pull-prog"); if(e) e.textContent=t; };
  try{
    const inv=await EBAY.user("/sell/inventory/v1/inventory_item?limit=100&offset=0", EBAY_SCOPE_INV);
    if(!inv.ok){ closeAllModals(); uiAlert("eBay inventory read failed (HTTP "+inv.status+"): "+(inv.body||"").slice(0,300)); return; }
    const ij=JSON.parse(inv.body); const items=ij.inventoryItems||[];
    let updated=0, unmatched=[];
    for(let n=0;n<items.length;n++){ const ei=items[n]; const sku=ei.sku; set("Reconciling "+(n+1)+" of "+items.length+" ("+sku+")…");
      let price="", qty="", status="listed", offerId=null;
      try{ const off=await EBAY.user("/sell/inventory/v1/offer?sku="+encodeURIComponent(sku), EBAY_SCOPE_INV);
        if(off.ok){ const oj=JSON.parse(off.body); const o=(oj.offers||[])[0]; if(o){ offerId=o.offerId; price=(o.pricingSummary&&o.pricingSummary.price&&o.pricingSummary.price.value)||""; qty=(o.availableQuantity!=null?String(o.availableQuantity):""); if(o.listing&&o.listing.listingStatus&&o.listing.listingStatus!=="ACTIVE") status="delisted"; } } }catch(e){}
      const wim=DB.items.find(x=> (x.listing&&x.listing.ebaySku===sku) || x.sku===sku || x.upc===sku );
      if(wim){ if(!wim.listing) wim.listing={}; wim.listing.ebaySku=sku; if(offerId) wim.listing.ebayOfferId=offerId;
        wim.listing.title=(ei.product&&ei.product.title)||wim.listing.title||wim.desc; if(price) wim.listing.price=price; if(qty) wim.listing.qty=qty;
        wim.listing.status=status; addHistory(wim,"Pulled from eBay (SKU "+sku+")"); updated++; }
      else unmatched.push(sku);
    }
    save(); if(typeof refreshSearchWindows==="function") refreshSearchWindows();
    closeAllModals();
    let m="Pulled "+items.length+" eBay inventory item(s).\nUpdated "+updated+" matching WIM item(s).";
    if(unmatched.length) m+="\n"+unmatched.length+" eBay SKU(s) had no WIM match: "+unmatched.slice(0,12).join(", ")+(unmatched.length>12?"…":"");
    uiAlert(m); if(after) after();
  }catch(e){ closeAllModals(); uiAlert("Could not pull listings: "+(e&&e.message?e.message:e)); }
}

/* ============================================================ LIVE: VIEW LIVE INVENTORY ============================================================ */
function openLiveInventory(){
  if(openWindows["live-inv"]){ focusWin(openWindows["live-inv"].el); return; }
  const {body}=buildWindow({id:"live-inv",title:"Live Inventory",width:960,height:620,
    toolbar:`${tbtn(I.print,'Print')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">All active live listings</span>`});
  function render(){
    const rows=listedItems().sort((a,b)=>skuCmp(a.sku,b.sku));
    body.innerHTML=`<div class="searchform" style="grid-template-columns:1fr 1fr;padding:10px 14px 4px;">
        <div class="ff"><label>Search title / SKU / item #</label><input class="txt" id="li-q"></div>
        <div class="ff"><label>Category</label><input class="txt" id="li-cat" list="li-cat-dl"></div>
      </div><datalist id="li-cat-dl">${DB.sections.map(s=>`<option value="${esc(s)}">`).join("")}</datalist>
      <div style="padding:0 14px 6px;display:flex;align-items:center;gap:10px;"><span class="smallhint" id="li-count"></span><span style="flex:1;"></span>${WIM_IS_DESKTOP?'<button class="btn sm" id="li-pull">Pull Active Listings from eBay</button>':''}</div>
      <div class="resultwrap" style="margin:0 14px 14px;"><table class="res"><thead><tr><th>Title</th><th>Item #</th><th>Warehouse SKU</th><th>Category</th><th>Sub Category</th><th>Price</th><th>Qty</th></tr></thead><tbody id="li-tb"></tbody></table></div>`;
    const tb=body.querySelector("#li-tb"), q=body.querySelector("#li-q"), cat=body.querySelector("#li-cat");
    function paint(){ const t=(q.value||"").toLowerCase(), c=(cat.value||"").toLowerCase();
      const list=rows.filter(it=>{ const L=it.listing||{}; if(t && !((L.title||it.desc||"").toLowerCase().includes(t)||(it.sku||"").toLowerCase().includes(t)||(it.upc||"").toLowerCase().includes(t))) return false; if(c && (it.section||"").toLowerCase()!==c) return false; return true; });
      tb.innerHTML=""; body.querySelector("#li-count").textContent=list.length+" active listing(s).";
      if(!list.length){ tb.innerHTML=`<tr><td colspan="7" style="color:#888;">No active listings${rows.length?" match.":". Mark items as Listed from an item page or Discrepancies."}</td></tr>`; return; }
      list.forEach(it=>{ const L=it.listing||{}; const tr=document.createElement("tr");
        tr.innerHTML=`<td>${esc(L.title||it.desc)}</td><td>${esc(it.upc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td><td>${esc(it.subCategory||"")}</td><td>${L.price?("$"+esc(L.price)):"—"}</td><td class="cc">${esc(L.qty||"1")}</td>`;
        tr.ondblclick=()=>openItemDetail(it,"edit"); tb.appendChild(tr); });
    }
    q.addEventListener("input",paint); cat.addEventListener("input",paint); paint();
    const pull=body.querySelector("#li-pull"); if(pull) pull.onclick=()=>pullActiveListings(()=>render());
    const pb=openWindows["live-inv"].el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>printTable("WIM Live Inventory", ["Title","Item #","Warehouse SKU","Category","Sub Category","Price","Qty"], rows.map(it=>{const L=it.listing||{};return [L.title||it.desc,it.upc,it.sku,it.section,it.subCategory||"",L.price||"",L.qty||"1"];}));
  }
  render();
}

/* ============================================================ LIVE: MANAGE LISTINGS ============================================================ */
function openManageListings(){
  if(openWindows["manage-listings"]){ focusWin(openWindows["manage-listings"].el); return; }
  const {body}=buildWindow({id:"manage-listings",title:"Manage Listings",width:920,height:600,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Edit live listings, or delist without removing the warehouse SKU</span>`});
  function render(){
    const rows=DB.items.filter(i=>i.listing && (i.listing.status==="listed"||i.listing.status==="delisted")).sort((a,b)=>skuCmp(a.sku,b.sku));
    body.innerHTML=`<div style="padding:10px 14px;font-size:12.5px;display:flex;align-items:center;gap:10px;"><span>${rows.length} listing(s).</span><span style="flex:1;"></span>${WIM_IS_DESKTOP?'<button class="btn sm" id="ml-pull">Pull Active Listings from eBay</button>':''}</div>
      <div class="resultwrap" style="margin:0 14px 14px;"><table class="res"><thead><tr><th>Title</th><th>Warehouse SKU</th><th>Category</th><th>Price</th><th>Status</th><th></th><th></th></tr></thead><tbody id="ml-tb"></tbody></table></div>`;
    const pull=body.querySelector("#ml-pull"); if(pull) pull.onclick=()=>pullActiveListings(()=>render());
    const tb=body.querySelector("#ml-tb");
    if(!rows.length){ tb.innerHTML=`<tr><td colspan="7" style="color:#888;">No listings yet. Use Discrepancies or Add Items to create one.</td></tr>`; return; }
    rows.forEach(it=>{ const L=it.listing; const tr=document.createElement("tr");
      tr.innerHTML=`<td>${esc(L.title||it.desc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td><td>${L.price?("$"+esc(L.price)):"—"}</td><td><span class="badge ${L.status==='listed'?'ok':'warn'}">${L.status}</span></td>`;
      const tdEdit=document.createElement("td"); tdEdit.className="cc"; const e=document.createElement("button"); e.className="btn sm"; e.textContent="Edit"; e.onclick=()=>openItemDetail(it,"edit"); tdEdit.appendChild(e); tr.appendChild(tdEdit);
      const tdDel=document.createElement("td"); tdDel.className="cc"; const d=document.createElement("button"); d.className="btn sm"; d.textContent=L.status==="listed"?"Delist":"Relist";
      d.onclick=()=>{ if(L.status==="listed"){ L.status="delisted"; L.delistedAt=new Date().toISOString(); addHistory(it,"Delisted from eBay (SKU kept)"); } else { L.status="listed"; L.delistedAt=null; addHistory(it,"Relisted"); } save(); render(); };
      tdDel.appendChild(d); tr.appendChild(tdDel); tr.ondblclick=()=>openItemDetail(it,"edit"); tb.appendChild(tr); });
  }
  render();
}

/* ============================================================ LIVE: COMMUNICATION (view/launch) ============================================================ */
function openCommunication(){
  if(openWindows["comm"]){ focusWin(openWindows["comm"].el); return; }
  const {body}=buildWindow({id:"comm",title:"Communication",width:620,height:420,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Buyer messages open on eBay</span>`});
  const url = (DB.ebay&&DB.ebay.env==="production") ? "https://mesg.ebay.com/mesgweb/ViewMessages/0" : "https://mesg.sandbox.ebay.com/mesgweb/ViewMessages/0";
  body.innerHTML=`<div style="padding:18px;font-size:13px;line-height:1.6;">
    <p>eBay restricts automated buyer–seller messaging, so WIM opens your eBay message center directly rather than embedding it.</p>
    <button class="btn primary" id="cm-open">Open eBay Messages</button>
    <p class="smallhint" style="margin-top:14px;">Environment: <b>${esc((DB.ebay&&DB.ebay.env)||"sandbox")}</b>. A future update can surface message counts here once eBay grants the needed access.</p></div>`;
  body.querySelector("#cm-open").onclick=()=>{ if(WIM_IS_DESKTOP && window.__TAURI__ && window.__TAURI__.opener){ try{ window.__TAURI__.opener.openUrl(url); return; }catch(e){} } window.open(url,"_blank"); };
}

/* ============================================================ LIVE: LISTING REPORT ============================================================ */
function openListingReport(){
  if(openWindows["listing-report"]){ focusWin(openWindows["listing-report"].el); return; }
  const {body}=buildWindow({id:"listing-report",title:"Listing Report",width:680,height:460,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Snapshot of your Live inventory</span>`});
  const listed=listedItems().length, delisted=delistedItems().length, unlisted=unlistedActive().length;
  const value=listedItems().reduce((s,it)=>s+(parseFloat(it.listing.price)||0),0);
  body.innerHTML=`<div style="padding:18px;">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:420px;">
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Listed</div><div style="font-size:22px;font-weight:600;">${listed}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Delisted</div><div style="font-size:22px;font-weight:600;">${delisted}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Active, not listed</div><div style="font-size:22px;font-weight:600;">${unlisted}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Listed price total</div><div style="font-size:22px;font-weight:600;">$${value.toFixed(2)}</div></div>
    </div>
    <p class="smallhint" style="margin-top:16px;">Sales/fulfillment figures appear here once the publishing &amp; fulfillment update is in.</p></div>`;
}

/* ---------- clock & boot ---------- */
function tick(){ const d=new Date(); const c=document.getElementById("clock"); if(c) c.innerHTML=`${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}<br>${d.toLocaleDateString()}`; }
setInterval(tick,1000); tick();
boot();
</script>
