/* ---------- persistence (IndexedDB, with localStorage fallback) ---------- */
let MEM=null;
const IDB_NAME="WIM_DB", IDB_STORE="state", IDB_KEY="db";
function idbOpen(){ return new Promise((res,rej)=>{ if(!window.indexedDB){ rej(new Error("no idb")); return; }
  const r=indexedDB.open(IDB_NAME,1);
  r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
  r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); }); }
function idbGet(){ return idbOpen().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readonly"); const rq=tx.objectStore(IDB_STORE).get(IDB_KEY); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); })); }
function idbPut(val){ return idbOpen().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readwrite"); tx.objectStore(IDB_STORE).put(val,IDB_KEY); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); })); }
function save(){ MEM=DB; idbPut(DB).catch(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){ console.warn("WIM: could not persist data",e); } }); }

function migrate(d){
  if(!d.meta) d.meta={schemaVersion:1,createdAt:new Date().toISOString()};
  if(d.meta.invoiceSeq==null) d.meta.invoiceSeq=1000;
  if(!d.invoices) d.invoices=[];
  if(!d.sections)d.sections=[]; if(!d.groups)d.groups=[]; if(!d.users)d.users=[];
  if(!d.sections.includes("General")) d.sections.unshift("General");
  (d.slots||[]).forEach(s=>{ if(s.skuLimit==null)s.skuLimit=99; if(s.manualOnly==null)s.manualOnly=false; if(s.id&&s.id.endsWith("."))s.id=s.id.slice(0,-1);
    if(s.section==null||s.section==="")s.section="General"; });
  (d.items||[]).forEach(it=>{ if(it.sold==null)it.sold=false; if(it.createdAt==null)it.createdAt=new Date().toISOString();
    if(!("soldAt" in it))it.soldAt=null; if(!("soldBy" in it))it.soldBy=null; if(it.image==null)it.image="";
    if(it.unitCost==null)it.unitCost=it.netUnitCost||"0.000"; if(it.onHand==null||it.onHand==="")it.onHand="1";
    if(it.manualSlot==null)it.manualSlot=false; if(it.slot&&it.slot.endsWith("."))it.slot=it.slot.slice(0,-1);
    if(it.placement==null){ const m=(it.sku||"").match(/\.(\d+)$/); it.placement=m?parseInt(m[1],10):null; }
    if(it.condition==null)it.condition=""; if(!Array.isArray(it.history)) it.history=[{at:it.createdAt||new Date().toISOString(),desc:"Item created",by:"system"}]; });
  if(!d.vendors){ d.vendors=[...new Set((d.items||[]).map(i=>i.vendor).filter(Boolean))]; if(!d.vendors.length) d.vendors=["HYVEE DISTRIBUTION","LOCAL FARM"]; }
  if(!d.conditions) d.conditions=STATIC.conditions.slice();
  if(!d.adjustmentTypes) d.adjustmentTypes=STATIC.adjustmentTypes.slice();
  if(!d.conditionsByCat || typeof d.conditionsByCat!=="object"){ d.conditionsByCat={}; }
  d.sections.forEach(s=>{ if(!Array.isArray(d.conditionsByCat[s])) d.conditionsByCat[s]=d.conditions.slice(); });
  if(!d.printTemplate) d.printTemplate={ fields:["sku","desc","condition"], size:"medium", showTitle:true, title:"WIM" };
  if(!d.ebay) d.ebay={ env:"sandbox", appId:"", certId:"", refreshToken:"", marketplace:"EBAY_US", connected:false };
  // ---- V2.2.2: eBay-aware categories, sub-categories, listing + description model ----
  if(!d.sections.includes("NONE")) d.sections.unshift("NONE");
  if(!d.subcats || typeof d.subcats!=="object") d.subcats={};
  d.sections.forEach(cat=>{ if(!Array.isArray(d.subcats[cat])) d.subcats[cat]=[]; 
    if(!d.subcats[cat].some(s=>s.name===cat)) d.subcats[cat].unshift({name:cat,ebayId:"",ebayName:"",aspects:[]}); });
  if(!Array.isArray(d.descriptions)) d.descriptions=[];
  // ---- V2.2.6: make sure General, NONE, Bulk exist (additive, non-destructive) ----
  if(!d.subcats || typeof d.subcats!=="object") d.subcats={};
  ["General","NONE","Bulk"].forEach(c=>{
    if(!Array.isArray(d.sections)) d.sections=[];
    if(!d.sections.includes(c)) d.sections.push(c);
    if(!Array.isArray(d.subcats[c])) d.subcats[c]=[];
    if(!d.subcats[c].some(s=>s&&s.name===c)) d.subcats[c].unshift({name:c,ebayId:"",ebayName:"",aspects:[]});
    if(d.conditionsByCat && !d.conditionsByCat[c]) d.conditionsByCat[c]=(d.conditions||STATIC.conditions).slice();
  });
  (d.items||[]).forEach(it=>{
    if(it.subCategory==null||it.subCategory==="") it.subCategory = (d.subcats[it.section] ? it.section : "NONE");
    if(!Array.isArray(it.images)) it.images = it.image ? [it.image] : [];
    if(it.imageFeatured==null) it.imageFeatured = 0;
    if(!it.aspects || typeof it.aspects!=="object") it.aspects={};
    if(!it.listing || typeof it.listing!=="object") it.listing={ status:"none", title:"", price:"", qty:"1", descriptionId:null, ebayOfferId:null, ebaySku:null, listedAt:null, delistedAt:null };
  });
  (d.invoices||[]).forEach(r=>{ if(!r.type) r.type="Sell"; (r.lines||[]).forEach(l=>{ if(!l.mode) l.mode="sold"; }); });
  d.users.forEach(u=>{ if(!u.role){ u.role=(u.id===ADMIN_ID||u.isAdmin)?"admin":"user"; } u.isAdmin=(u.role==="admin"); });
  const a=d.users.find(u=>u.id===ADMIN_ID); if(a){ a.role="admin"; a.isAdmin=true; }
  d.meta.schemaVersion=SCHEMA_VERSION; return d;
}

async function boot(){
  try{
    let stored=null;
    try{ stored=await idbGet(); }catch(e){}
    if(!stored){ try{ const ls=localStorage.getItem(KEY); if(ls) stored=JSON.parse(ls); }catch(e){} }
    try{ DB = migrate(stored || seed()); }
    catch(mErr){ // migration failed — fall back to raw stored data so the app still opens
      console.error("WIM migrate() failed:", mErr);
      DB = stored || seed();
      if(!Array.isArray(DB.sections)) DB.sections=["General","NONE","Bulk"];
      if(!DB.subcats||typeof DB.subcats!=="object") DB.subcats={};
      if(!Array.isArray(DB.descriptions)) DB.descriptions=[];
      if(!DB.meta) DB.meta={schemaVersion:SCHEMA_VERSION};
      setTimeout(()=>{ try{ uiAlert("WIM loaded in recovery mode (a data-upgrade step was skipped, your data is intact). Details: "+(mErr&&mErr.message?mErr.message:mErr)); }catch(_){} }, 600);
    }
    DB.posDepts=STATIC.posDepts; DB.sizeUnits=STATIC.sizeUnits;
    if(!DB.conditions) DB.conditions=STATIC.conditions.slice();
    try{ await idbPut(DB); }catch(e){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(_){} }
    showLogin();
  }catch(fatal){
    console.error("WIM boot failed:", fatal);
    try{ document.body.innerHTML='<div style="font-family:Segoe UI,sans-serif;padding:40px;max-width:640px;margin:auto;">'
      +'<h2 style="color:#b1342a;">WIM couldn\'t start</h2>'
      +'<p style="font-size:14px;line-height:1.6;">Something went wrong loading your data, but it is still saved. Please send this message to support:</p>'
      +'<pre style="background:#f4f4f4;border:1px solid #ccc;padding:12px;white-space:pre-wrap;font-size:12px;">'+String(fatal&&fatal.stack||fatal)+'</pre>'
      +'<p style="font-size:13px;color:#555;">You can also reinstall the previous version from your Releases page while this is fixed.</p></div>'; }catch(_){}
  }
}

/* ============================================================ slotting ============================================================ */
function pad2(n){ return String(n).padStart(2,"0"); }
function slotById(id){ return DB.slots.find(s=>s.id===id); }
function activeItems(){ return DB.items.filter(i=>!i.sold); }
function soldItems(){ return DB.items.filter(i=>i.sold); }
function activeInSlot(slotId,ex){ return activeItems().filter(i=>i.slot===slotId&&i.id!==ex); }
function takenPlacements(slotId,ex){ return new Set(activeInSlot(slotId,ex).map(i=>i.placement)); }
function lowestPlacement(slotId,ex){ const s=slotById(slotId); if(!s) return null; const t=takenPlacements(slotId,ex);
  for(let p=1;p<=s.skuLimit;p++){ if(!t.has(p)) return p; } return null; }
function autoSlot(ex,category){ const c=DB.slots.filter(s=>!s.manualOnly&&(category==null||s.section===category)&&activeInSlot(s.id,ex).length<s.skuLimit);
  if(!c.length) return null; c.sort((a,b)=>{ const ca=activeInSlot(a.id,ex).length,cb=activeInSlot(b.id,ex).length;
    if(ca!==cb)return ca-cb; return a.id.localeCompare(b.id,undefined,{numeric:true}); });
  const s=c[0],p=lowestPlacement(s.id,ex); if(p===null) return null; return {slot:s.id,placement:p}; }
function skuOf(slotId,p){ return slotId+"."+pad2(p); }
function lowestRun(free,len){ // free = sorted ascending placement numbers; return first run of consecutive numbers of given length, or null
  for(let i=0;i+len<=free.length;i++){ let ok=true; for(let k=1;k<len;k++){ if(free[i+k]!==free[i]+k){ ok=false; break; } } if(ok) return free.slice(i,i+len); }
  return null;
}
function freeIn(slotId,ex,sim){ const s=slotById(slotId); if(!s) return []; const t=sim&&sim[slotId]?sim[slotId]:takenPlacements(slotId,ex); const out=[]; for(let p=1;p<=s.skuLimit;p++){ if(!t.has(p)) out.push(p); } return out; }
// Allocate n placements within slots of the given Category, keeping them together & consecutive
// when possible; prefers a single slot that fits all n, otherwise spills into the roomiest slots.
function allocateMulti(n,ex,category){
  const slotsOf=()=>DB.slots.filter(s=>!s.manualOnly&&(category==null||s.section===category));
  const sim={}; const t=id=>{ if(!sim[id]) sim[id]=new Set(takenPlacements(id,ex)); return sim[id]; };
  const result=[];
  const single=slotsOf().map(s=>({s,free:freeIn(s.id,ex)})).filter(c=>c.free.length>=n);
  if(single.length){
    single.forEach(c=>{ c.run=lowestRun(c.free,n); });
    single.sort((a,b)=> (b.run?1:0)-(a.run?1:0)
      || (activeInSlot(a.s.id,ex).length-activeInSlot(b.s.id,ex).length)
      || a.s.id.localeCompare(b.s.id,undefined,{numeric:true}));
    const c=single[0]; const spots=c.run?c.run:c.free.slice(0,n);
    spots.forEach(p=>result.push({slot:c.s.id,placement:p}));
    return result;
  }
  let remaining=n;
  while(remaining>0){
    const cands=slotsOf().map(s=>({s,free:freeIn(s.id,ex,sim)})).filter(c=>c.free.length>0);
    if(!cands.length) break;
    cands.sort((a,b)=> b.free.length-a.free.length || a.s.id.localeCompare(b.s.id,undefined,{numeric:true}));
    const c=cands[0], take=Math.min(c.free.length,remaining);
    c.free.slice(0,take).forEach(p=>{ result.push({slot:c.s.id,placement:p}); t(c.s.id).add(p); });
    remaining-=take;
  }
  return result; // length may be < n if there isn't room in this Category
}
function allocateInSlot(slotId,n,ex){ // manual slot: place n together in this slot, consecutive if possible
  const free=freeIn(slotId,ex); if(free.length<n) return null;
  const run=lowestRun(free,n); return (run||free.slice(0,n)).map(p=>({slot:slotId,placement:p}));
}
function restoreSlot(it){
  if(!it.slot||!slotById(it.slot)){ const r=autoSlot(it.id,it.section); if(r){ it.slot=r.slot;it.placement=r.placement;it.sku=skuOf(r.slot,r.placement);} else {it.slot="";it.placement=null;it.sku="";} return; }
  const slot=slotById(it.slot), taken=takenPlacements(it.slot,it.id);
  if(it.placement&&!taken.has(it.placement)&&it.placement<=slot.skuLimit){ it.sku=skuOf(it.slot,it.placement); return; }
  const lp=lowestPlacement(it.slot,it.id);
  if(lp!=null){ it.placement=lp; it.sku=skuOf(it.slot,lp); }
  else { const r=autoSlot(it.id,it.section); if(r){it.slot=r.slot;it.placement=r.placement;it.sku=skuOf(r.slot,r.placement);} else {it.slot="";it.placement=null;it.sku="";} }
}
function fmtDate(iso){ if(!iso)return "—"; const d=new Date(iso); return d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

/* ---- item-number grouping (same Item Number = quantity of one item) ---- */
function skuCmp(a,b){ const sa=a||"\uffff", sb=b||"\uffff"; return sa.localeCompare(sb,undefined,{numeric:true}); }
function groupKey(it){ const n=(it.upc||"").trim(); return n?("#"+n):("@"+it.id); } // blank item numbers stay individual
function unitsOf(it){ // active units sharing this item number, ordered by SKU (closest to A.1.01 first)
  const k=groupKey(it); return activeItems().filter(x=>groupKey(x)===k).sort((a,b)=>skuCmp(a.sku,b.sku)); }
function groupQty(it){ return unitsOf(it).reduce((n,u)=>n+(parseFloat(u.onHand)||1),0); }
function firstUnit(it){ const u=unitsOf(it); return u[0]||it; }
function groupActive(){ // one representative per item-number group, rep = lowest SKU
  const seen={}, out=[];
  activeItems().slice().sort((a,b)=>skuCmp(a.sku,b.sku)).forEach(it=>{ const k=groupKey(it); if(!seen[k]){ seen[k]=1; out.push(it); } });
  return out;
}
function addHistory(it,desc){ if(!Array.isArray(it.history)) it.history=[]; it.history.push({at:new Date().toISOString(),desc,by:(SESSION.user?userLabel(SESSION.user.id):"system")}); }

function nextInvoiceNum(){ DB.meta.invoiceSeq=(DB.meta.invoiceSeq||1000)+1; return DB.meta.invoiceSeq; }
function makeRecord(type,lines,userId){ const rec={ id:crypto.randomUUID(), num:nextInvoiceNum(), createdAt:new Date().toISOString(), soldBy:userId, type, lines }; DB.invoices.push(rec); return rec; }
function sellItems(items,userId,type){
  const lines=[];
  items.forEach(it=>{ const q=parseFloat(it.onHand);
    if(!isNaN(q)&&q>1){ it.onHand=String(q-1); addHistory(it,"Sold 1 (qty now "+it.onHand+")"); lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'decrement',reversed:false}); }
    else { it.sold=true; it.soldAt=new Date().toISOString(); it.soldBy=userId; it.outType="Sell"; addHistory(it,"Sold (SKU "+it.sku+")"); lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'sold',reversed:false}); } });
  const rec=makeRecord(type||"Sell",lines,userId); save(); return rec;
}
function adjustItems(items,userId,reason){

    lines.push({itemId:it.id,upc:it.upc,desc:it.desc,sku:it.sku,section:it.section,qty:1,mode:'adjust',reversed:false}); });

}
function recordAdds(items,userId,type){ // type = "Add" or "Bulk Add"

function reverseLines(inv,idxs){
  idxs.forEach(i=>{ const ln=inv.lines[i]; if(!ln||ln.reversed) return; const it=DB.items.find(x=>x.id===ln.itemId);
    if(ln.mode==='add'){ if(it && !it.sold){ DB.items=DB.items.filter(x=>x.id!==it.id); } }
    else if(it){ if(ln.mode==='decrement'){ it.onHand=String((parseFloat(it.onHand)||0)+ln.qty); }
      else { it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1"; restoreSlot(it); addHistory(it,"Reactivated (record #"+inv.num+" reversed)"); } }
    ln.reversed=true; });

}

let zTop=50;

function makeDraggable(win,h){ let sx,sy,ox,oy,drag=false;
  h.addEventListener("mousedown",(e)=>{ if(e.target.closest(".winbtn"))return; drag=true;sx=e.clientX;sy=e.clientY;const r=win.getBoundingClientRect();ox=r.left;oy=r.top;win.style.zIndex=++zTop;e.preventDefault(); });
  window.addEventListener("mousemove",(e)=>{ if(!drag)return; let nl=ox+(e.clientX-sx),nt=oy+(e.clientY-sy); nt=Math.max(0,Math.min(nt,window.innerHeight-50)); nl=Math.max(-200,Math.min(nl,window.innerWidth-120)); win.style.left=nl+"px";win.style.top=nt+"px";win.style.transform="none"; });
  window.addEventListener("mouseup",()=>{drag=false;}); }
function focusWin(win){ win.style.zIndex=++zTop; }
function userLabel(id){ const u=DB.users.find(x=>x.id===id); return u?(u.longName||u.shortName||u.id):(id||"—"); }
function buildWindow({id,title,width,height,toolbar,onClose,center=true,left,top}){
  const win=document.createElement("div"); win.className="window"; win.dataset.wid=id;
  // fit requested size to the available screen (leave room for the taskbar)
  const availW=window.innerWidth-16, availH=window.innerHeight-16;
  const w=Math.min(width||availW, availW), h=Math.min(height||availH, availH);
  win.style.width=w+"px"; win.style.height=h+"px";
  if(center){ win.style.left=Math.max(8,(window.innerWidth-w)/2)+"px"; win.style.top=Math.max(8,(window.innerHeight-h)/2)+"px"; }
  else { win.style.left=Math.max(8,Math.min(left||120, window.innerWidth-w-8))+"px"; win.style.top=Math.max(8,Math.min(top||80, window.innerHeight-h-8))+"px"; }
  win.style.transform="none"; win.style.zIndex=++zTop;
  const tb=document.createElement("div"); tb.className="titlebar"; tb.innerHTML=`<span class="appicon"></span><span class="ttl">${title}</span>`;
  const ctr=document.createElement("div"); ctr.className="winbtns"; ctr.innerHTML=`<button class="winbtn" title="Minimize">&#8211;</button><button class="winbtn" title="Maximize">&#9633;</button><button class="winbtn close" title="Close">&#10005;</button>`;
  tb.appendChild(ctr); win.appendChild(tb);
  if(toolbar){ const t=document.createElement("div"); t.className="toolbar"; t.innerHTML=toolbar; win.appendChild(t); }
  const body=document.createElement("div"); body.className="body"; win.appendChild(body);
  const [minB,maxB,closeB]=ctr.querySelectorAll(".winbtn");
  const doClose=()=>{ win.remove(); delete openWindows[id]; renderTaskbar(); if(onClose)onClose(); };
  let prev=null;
  const toggleMax=()=>{ if(win.dataset.max==="1"){ Object.assign(win.style, prev); win.dataset.max="0"; }
    else { prev={left:win.style.left,top:win.style.top,width:win.style.width,height:win.style.height};
      win.style.left="0px"; win.style.top="0px"; win.style.width=window.innerWidth+"px"; win.style.height=(window.innerHeight-42)+"px"; win.dataset.max="1"; focusWin(win); } };
  closeB.onclick=doClose; minB.onclick=()=>win.classList.toggle("hidden"); maxB.onclick=toggleMax;
  tb.addEventListener("dblclick",(e)=>{ if(!e.target.closest(".winbtn")) toggleMax(); });
  win.addEventListener("mousedown",()=>focusWin(win)); makeDraggable(win,tb);
  modalsEl.appendChild(win); openWindows[id]={el:win,title:title.replace(/<[^>]+>/g,"")}; renderTaskbar();
  return {win,body,close:doClose};
}
function renderTaskbar(){ tbWindows.innerHTML="";
  Object.entries(openWindows).forEach(([id,w])=>{ const b=document.createElement("div"); b.className="tb-item";
    b.innerHTML=`<div class="tb-logo"></div> ${w.title}`; b.onclick=()=>{ w.el.classList.remove("hidden"); focusWin(w.el); }; tbWindows.appendChild(b); }); }

function uiModal(title, bodyHTML, buttons){

function attachAutofill(input, getOptions){
  input.addEventListener("input",()=>{
    const len=input.value.length;
    if(input._afLen!=null && len<input._afLen){ input._afLen=len; return; } // deleting — don't autofill
    input._afLen=len;
    const v=input.value; if(!v) return;
    const opts=getOptions()||[];
    const m=opts.find(o=>o&&o.toLowerCase().startsWith(v.toLowerCase()));
    if(m && m.length>v.length){ input.value=m; try{ input.setSelectionRange(v.length, m.length); }catch(e){} input._afLen=m.length; }
  });
}
function compressImage(file,maxDim=480,q=0.65){ return new Promise((res,rej)=>{ const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; const s=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement("canvas"); c.width=w;c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); res(c.toDataURL("image/jpeg",q)); }; img.onerror=rej; img.src=rd.result; }; rd.onerror=rej; rd.readAsDataURL(file); }); }
function printTable(title, headers, rows){
  const w=window.open("","_blank"); if(!w){ uiAlert("Pop-up blocked. Allow pop-ups to print/save PDF."); return; }
  const thead=headers.map(h=>`<th>${esc(h)}</th>`).join("");
  const tbody=rows.map(r=>"<tr>"+r.map(c=>`<td>${esc(c)}</td>`).join("")+"</tr>").join("");
  w.document.write(`<html><head><title>${esc(title)}</title><style>body{font-family:Segoe UI,Arial,sans-serif;margin:24px;}h2{margin:0 0 4px;}table{border-collapse:collapse;width:100%;font-size:12px;margin-top:10px;}th,td{border:1px solid #999;padding:5px 8px;text-align:left;}th{background:#eee;}</style></head><body><h2>${esc(title)}</h2><div>${new Date().toLocaleString()} &middot; ${rows.length} records</div><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),350);
}
function downloadCSV(filename, headers, rows){
  const esc2=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
  const csv=[headers.map(esc2).join(",")].concat(rows.map(r=>r.map(esc2).join(","))).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}

        <div class="ff" style="grid-template-columns:auto 70px;"><label class="fld">Column (#)</label><input class="txt" id="ws-col" placeholder="6" inputmode="numeric"></div>

  const rowI=body.querySelector("#ws-row"),colI=body.querySelector("#ws-col"),limI=body.querySelector("#ws-lim"),prev=body.querySelector("#ws-prev"),err=body.querySelector("#ws-err"),manC=body.querySelector("#ws-man");
  manC.onclick=()=>manC.classList.toggle("on");
  const upPrev=()=>{ const r=(rowI.value||"A").toUpperCase().replace(/[^A-Z]/g,""); const c=(colI.value||"6").replace(/[^0-9]/g,""); prev.textContent=(r||"A")+"."+(c||"6"); };
  rowI.oninput=colI.oninput=upPrev;
  body.querySelector("#ws-type").onchange=()=>renderSlots(body);
  body.querySelector("#ws-zone").onchange=()=>renderSlots(body);
  body.querySelector("#ws-add").onclick=()=>{ const r=(rowI.value||"").toUpperCase().replace(/[^A-Z]/g,""); const c=(colI.value||"").replace(/[^0-9]/g,""); let lim=parseInt(limI.value,10); err.style.color="#c0392b";
    if(!r){err.textContent="Row must be a letter (A–Z).";return;} if(!c){err.textContent="Column must be a number.";return;} if(!lim||lim<1)lim=99;
    const id=r+"."+c; if(slotById(id)){err.textContent="Slot "+id+" already exists.";return;}
    const cat=body.querySelector("#ws-cat").value||"General";
    DB.slots.push({id,row:r,col:c,skuLimit:lim,manualOnly:manC.classList.contains("on"),section:cat}); save();
    err.textContent="";rowI.value="";colI.value="";limI.value="99";manC.classList.remove("on");upPrev(); mapState.selSlot=id; renderSlots(body); };
  renderSlots(body);
}
function renderSlots(body){
  const zoneSel=body.querySelector("#ws-zone"), typeSel=body.querySelector("#ws-type");
  const rows=[...new Set(DB.slots.map(s=>s.row))].sort();
  const curZone=zoneSel.value||"all";
  zoneSel.innerHTML=`<option value="all">All Zones</option>`+rows.map(r=>`<option value="${r}" ${r===curZone?'selected':''}>Row ${r}</option>`).join("");
  const type=typeSel.value||"map";
  let list=DB.slots.filter(s=>curZone==="all"||s.row===curZone);
  if(type==="map") list.sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
  else if(type==="cat") list.sort((a,b)=> (a.section||"General").localeCompare(b.section||"General") || a.id.localeCompare(b.id,undefined,{numeric:true}));
  else if(type==="cap-asc") list.sort((a,b)=> a.skuLimit-b.skuLimit || a.id.localeCompare(b.id,undefined,{numeric:true}));
  else list.sort((a,b)=> b.skuLimit-a.skuLimit || a.id.localeCompare(b.id,undefined,{numeric:true}));
  const lb=body.querySelector("#ws-slots"); lb.innerHTML="";
  list.forEach(s=>{ const cnt=activeInSlot(s.id).length; const full=cnt>=s.skuLimit;
    const li=document.createElement("div"); li.className="li"+(mapState.selSlot===s.id?" sel":"");
    li.innerHTML=`<b>${s.id}</b> &nbsp; ${cnt}/${s.skuLimit} <span class="badge">${esc(s.section||"General")}</span> ${full?'<span class="badge warn">FULL</span>':''} ${s.manualOnly?'<span class="badge">manual</span>':''}`;
    li.onclick=()=>{ mapState.selSlot=s.id; renderSlots(body); }; lb.appendChild(li); });
  const det=body.querySelector("#ws-detail"); det.innerHTML="";
  if(!mapState.selSlot){ det.innerHTML=`<div class="li" style="color:#888;">Select a slot.</div>`; return; }
  const s=slotById(mapState.selSlot); if(!s){ mapState.selSlot=null; return; }
  const cnt=activeInSlot(s.id).length;
  const head=document.createElement("div"); head.style.padding="10px"; head.style.borderBottom="1px solid #e2e2e2";
  head.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><b style="font-size:14px;">Slot ${s.id}</b> <span class="badge ${cnt>=s.skuLimit?'warn':'ok'}">${cnt}/${s.skuLimit} active</span></div>
    <div class="inline-add" style="gap:10px;"><div class="ff" style="grid-template-columns:auto 70px;"><label class="fld">SKU Limit</label><input class="txt" id="sd-lim" value="${s.skuLimit}" inputmode="numeric"></div>
    <div class="ff" style="grid-template-columns:auto 160px;"><label class="fld">Category</label><select class="cmb" id="sd-cat">${DB.sections.map(x=>`<option ${x===(s.section||"General")?'selected':''}>${esc(x)}</option>`).join("")}</select></div>
    <label class="chkrow"><span class="chk ${s.manualOnly?'on':''}" id="sd-man"></span> Manually slot only</label>
    <button class="btn sm" id="sd-save">Save</button><button class="btn sm" id="sd-del">Delete Slot</button></div><div class="err" id="sd-err"></div>`;
  det.appendChild(head);
  const man=head.querySelector("#sd-man"); man.onclick=()=>man.classList.toggle("on");
  head.querySelector("#sd-save").onclick=()=>{ const e=head.querySelector("#sd-err"); let lim=parseInt(head.querySelector("#sd-lim").value,10);
    if(!lim||lim<1){e.style.color="#c0392b";e.textContent="Limit must be 1 or more.";return;}
    if(lim<cnt){e.style.color="#c0392b";e.textContent="Limit can't be below current active count ("+cnt+").";return;}
    const newCat=head.querySelector("#sd-cat").value||"General";
    const oldCat=s.section||"General";
    s.skuLimit=lim; s.manualOnly=man.classList.contains("on"); s.section=newCat;
    if(newCat!==oldCat){ activeInSlot(s.id).forEach(it=>{ if(it.section!==newCat){ it.section=newCat; addHistory(it,"Category changed to "+newCat+" (slot re-categorized)"); } }); }
    save(); renderSlots(body); refreshSearchWindows(); };
  head.querySelector("#sd-del").onclick=()=>{ if(cnt>0){uiAlert("Cannot delete slot "+s.id+": it has active inventory.");return;}
    uiConfirm("Delete slot "+s.id+"?",()=>{ DB.slots=DB.slots.filter(x=>x.id!==s.id); save(); mapState.selSlot=null; renderSlots(body); }); };
  activeInSlot(s.id).sort((a,b)=>a.placement-b.placement).forEach(it=>{ const li=document.createElement("div"); li.className="li";
    li.innerHTML=`<b>${it.sku}</b> &mdash; ${esc(it.desc)} <span style="color:#777;">(Item # ${esc(it.upc)})</span>`; li.ondblclick=()=>openItemDetail(it,"edit"); det.appendChild(li); });
}

/* ============================================================ MODIFY USERS ============================================================ */
const ROLE_LABEL={admin:"System Administrator",leadership:"Leadership",user:"User"};
function rolesAssignableBy(actor){ return actor==="admin"?["user","leadership","admin"]:actor==="leadership"?["user","leadership"]:[]; }
function openModifyUsers(){
  if(openWindows["sec-users"]){ focusWin(openWindows["sec-users"].el); return; }
  const {body}=buildWindow({id:"sec-users",title:"Modify Users",width:760,height:580,
    toolbar:`${tbtn(I.plus,'',' plus static')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Add, remove, and set privileges for users</span>`});
  const myRole=role();
  const addRoles=rolesAssignableBy(myRole);
  body.innerHTML=`<fieldset class="gb" style="margin:14px;"><legend>Add User</legend>
      <div class="inline-add"><div class="ff" style="grid-template-columns:auto 90px;"><label class="fld">User ID (#)</label><input class="txt" id="mu-id" inputmode="numeric"></div>
        <div class="ff" style="grid-template-columns:auto 90px;"><label class="fld">Short Name</label><input class="txt" id="mu-short" maxlength="2" placeholder="2 ltrs"></div>
        <div class="ff" style="grid-template-columns:auto 1fr;flex:1;"><label class="fld">Long Name</label><input class="txt" id="mu-long"></div>
        <div class="ff" style="grid-template-columns:auto 150px;"><label class="fld">Privilege</label><select class="cmb" id="mu-role">${addRoles.map(r=>`<option value="${r}">${ROLE_LABEL[r]}</option>`).join("")}</select></div>
        <button class="btn sm" id="mu-add">Add</button></div>
      <div class="note">New users start with default password <b>1234</b> and must change it at first login.</div><div class="err" id="mu-err"></div></fieldset>
    <div style="padding:0 14px;flex:1;display:flex;flex-direction:column;min-height:0;"><div class="col-title" style="text-align:left;">Users</div><div class="listbox" id="mu-list"></div></div>`;
  const err=body.querySelector("#mu-err");
  const shortI=body.querySelector("#mu-short"); shortI.oninput=()=>{ shortI.value=shortI.value.replace(/[^A-Za-z]/g,"").slice(0,2).toUpperCase(); };
  const badge=r=>`<span class="badge ${r==='admin'?'ok':(r==='leadership'?'rev':'')}">${ROLE_LABEL[r]}</span>`;
  const render=()=>{ const l=body.querySelector("#mu-list"); l.innerHTML="";
    DB.users.forEach(u=>{ const li=document.createElement("div"); li.className="li"; li.style.display="flex"; li.style.justifyContent="space-between"; li.style.alignItems="center";
      li.innerHTML=`<span><b>${u.id}</b> &mdash; ${esc(u.longName||u.shortName||"(no name)")} ${badge(u.role||"user")} ${u.mustChange?'<span class="badge">must change pw</span>':''}</span>`;
      const wrap=document.createElement("div"); wrap.style.display="flex"; wrap.style.gap="6px";
      const mod=document.createElement("button"); mod.className="btn sm"; mod.textContent="Modify";
      const isSelf=u.id===SESSION.user.id;
      // who can change this user's privileges
      const canModify = !isSelf && ( myRole==="admin" || (myRole==="leadership" && (u.role!=="admin")) );
      if(!canModify){ mod.disabled=true; mod.title=isSelf?"You cannot change your own privileges.":"You don't have permission to change this user's privileges."; }
      mod.onclick=()=>openUserPrivileges(u, render);
      const reset=document.createElement("button"); reset.className="btn sm"; reset.textContent="Reset PW";
      if(u.role==="admin" && myRole!=="admin"){ reset.disabled=true; reset.title="Only a System Administrator can reset the administrator password."; }
      reset.onclick=()=>{ if(u.role==="admin" && myRole!=="admin"){ uiAlert("Only a System Administrator can reset the administrator password."); return; }
        u.password="1234"; u.mustChange=true; save(); render(); uiAlert("Password for "+u.id+" reset to 1234."); };
      const del=document.createElement("button"); del.className="btn sm"; del.textContent="Delete";
      if(u.id===ADMIN_ID){ del.disabled=true; del.title="The administrator cannot be deleted."; }
      else if(u.role==="admin" && myRole!=="admin"){ del.disabled=true; del.title="Only a System Administrator can remove an administrator."; }
      del.onclick=()=>{ if(u.id===ADMIN_ID){uiAlert("The administrator (user 64) cannot be deleted.");return;}
        if(u.id===SESSION.user.id){uiAlert("You cannot delete the account you are logged in with.");return;}
        uiConfirm("Delete user "+u.id+"?",()=>{ DB.users=DB.users.filter(x=>x.id!==u.id); save(); render(); }); };
      wrap.appendChild(mod); wrap.appendChild(reset); wrap.appendChild(del); li.appendChild(wrap); l.appendChild(li); }); };
  const add=()=>{ const id=body.querySelector("#mu-id").value.trim(); err.style.color="#c0392b";
    if(!/^\d+$/.test(id)){err.textContent="User ID must be numerical.";return;} if(DB.users.some(u=>u.id===id)){err.textContent="User ID "+id+" already exists.";return;}
    let r=body.querySelector("#mu-role").value; if(!addRoles.includes(r)) r="user";
    DB.users.push({id,password:"1234",mustChange:true,role:r,isAdmin:r==="admin",shortName:shortI.value.trim(),longName:body.querySelector("#mu-long").value.trim()}); save();
    body.querySelector("#mu-id").value="";shortI.value="";body.querySelector("#mu-long").value="";
    err.style.color="#1f7244"; err.textContent="User "+id+" added as "+ROLE_LABEL[r]+" (default password 1234)."; render(); };
  body.querySelector("#mu-add").onclick=add;
  render();
}
function openUserPrivileges(u, after){
  const id="priv-"+u.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const myRole=role();
  const choices=rolesAssignableBy(myRole).filter(r=> r!=="admin" || myRole==="admin"); // only admin can grant admin
  const {body,close}=buildWindow({id,title:"Privileges — "+(u.longName||u.id),width:460,height:300,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Set this user's privilege level</span>`});
  body.innerHTML=`<div style="padding:16px;">
      <div style="font-size:12.5px;margin-bottom:10px;">User <b>${u.id}</b> &mdash; ${esc(u.longName||u.shortName||"")}<br><span class="smallhint">Current: ${ROLE_LABEL[u.role||"user"]}</span></div>
      <div class="ff" style="grid-template-columns:auto 1fr;"><label class="fld">Privilege</label>
        <select class="cmb" id="pv-role">${choices.map(r=>`<option value="${r}" ${ (u.role||"user")===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join("")}</select></div>
      <div class="note" style="margin-top:10px;">System Administrator: full access. Leadership: everything except Backup &amp; Updates. User: no Security tab and no Backup &amp; Updates.</div>
      <div class="err" id="pv-err"></div>
      <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn primary" id="pv-save">Save</button><button class="btn" id="pv-cancel">Cancel</button></div></div>`;
  body.querySelector("#pv-cancel").onclick=close;
  body.querySelector("#pv-save").onclick=()=>{ const e=body.querySelector("#pv-err"); e.style.color="#c0392b";
    const r=body.querySelector("#pv-role").value;
    if(r==="admin" && myRole!=="admin"){ e.textContent="Only a System Administrator can grant System Administrator."; return; }
    if(u.id===SESSION.user.id){ e.textContent="You cannot change your own privileges."; return; }
    u.role=r; u.isAdmin=(r==="admin"); save(); if(after) after(); close(); };
}

function openListMaintenance(kind){
  const cfg={ section:{id:"cat-maint",title:"Category Maintenance",one:"Category",many:"categories",ph:"e.g. 31010 - Produce: Pears",arr:()=>DB.sections},
              group:{id:"grp-maint",title:"Group Maintenance",one:"Group",many:"groups",ph:"e.g. Holiday Sale",arr:()=>DB.groups},
              vendor:{id:"ven-maint",title:"Vendor Management",one:"Vendor",many:"vendors",ph:"e.g. SYSCO",arr:()=>DB.vendors},
              condition:{id:"con-maint",title:"Condition Maintenance",one:"Condition",many:"conditions",ph:"e.g. Like New",arr:()=>DB.conditions},
              adjustment:{id:"adj-maint",title:"Adjustment Configuration",one:"Adjustment Type",many:"adjustment types",ph:"e.g. Donation",arr:()=>DB.adjustmentTypes} }[kind];
  const id=cfg.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const arr=cfg.arr; const canOpen=(kind==="section"||kind==="group");
  const {body,close}=buildWindow({id,title:cfg.title,width:620,height:560,toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Add, modify, or delete ${cfg.many}${canOpen?" — double-click to see items":""} — changes save automatically</span>`});
  body.innerHTML=`<fieldset class="gb" style="margin:14px;"><legend>Add ${cfg.one}</legend>
      <div class="inline-add"><div class="ff" style="grid-template-columns:auto 1fr;flex:1;"><label class="fld">Name</label><input class="txt" id="lm-name" placeholder="${cfg.ph}"></div>
        <button class="btn sm" id="lm-add">Add</button></div><div class="err" id="lm-err"></div></fieldset>
    <div style="padding:0 14px;flex:1;display:flex;flex-direction:column;min-height:0;"><div class="col-title" style="text-align:left;">${cfg.many.charAt(0).toUpperCase()+cfg.many.slice(1)}</div><div class="listbox" id="lm-list"></div></div>
    <div style="padding:8px 14px;display:flex;gap:8px;align-items:center;justify-content:flex-end;"><button class="btn primary" id="lm-okay">Okay</button></div>`;
  const err=body.querySelector("#lm-err");
  const usageCount=(name)=> kind==="section"? DB.items.filter(i=>i.section===name).length
    : kind==="group"? DB.items.filter(i=>(i.groups||[]).includes(name)).length
    : kind==="vendor"? DB.items.filter(i=>i.vendor===name).length
    : kind==="adjustment"? DB.invoices.filter(r=>r.type===name).length
    : DB.items.filter(i=>i.condition===name).length;
  const unit = kind==="adjustment"?"records":"items";
  let editing=null;
  const render=()=>{ const l=body.querySelector("#lm-list"); l.innerHTML="";
    arr().slice().forEach(name=>{ const li=document.createElement("div"); li.className="li"; li.style.display="flex"; li.style.justifyContent="space-between"; li.style.alignItems="center"; li.style.gap="8px";
      const left=document.createElement("div"); left.style.flex="1"; left.style.display="flex"; left.style.alignItems="center"; left.style.gap="8px";
      if(editing===name){ const inp=document.createElement("input"); inp.className="txt"; inp.style.flex="1"; inp.value=name;
        const commit=()=>{ const nn=inp.value.trim(); if(nn && nn!==name){ if(arr().some(x=>x.toLowerCase()===nn.toLowerCase())){ err.style.color="#c0392b"; err.textContent="That name already exists."; return; } applyRename(kind,name,nn); save(); refreshSearchWindows(); } editing=null; err.textContent=""; render(); };
        inp.addEventListener("keydown",e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape"){ editing=null; render(); } });
        inp.addEventListener("blur",commit); left.appendChild(inp); setTimeout(()=>inp.focus(),0); }
      else { const span=document.createElement("span"); span.style.flex="1"; span.innerHTML=`${esc(name)} <span class="smallhint">(${usageCount(name)} ${unit})</span>`;
        if(canOpen){ span.style.cursor="pointer"; span.title="Double-click to see items"; span.ondblclick=()=>openListItems(kind,name); } left.appendChild(span); }
      const wrap=document.createElement("div"); wrap.style.display="flex"; wrap.style.gap="6px";
      if(kind==="section"){ const subs=document.createElement("button"); subs.className="btn sm"; subs.textContent="Sub Categories"; subs.onclick=()=>openSubcatManager(name); wrap.appendChild(subs); }
      const mod=document.createElement("button"); mod.className="btn sm"; mod.textContent=editing===name?"OK":"Modify";
      mod.onclick=()=>{ if(editing===name){ const inp=left.querySelector("input"); if(inp) inp.blur(); } else { editing=name; render(); } };
      const del=document.createElement("button"); del.className="btn sm"; del.textContent="Delete";
      del.onclick=()=>{ const n=usageCount(name);
        const msg = kind==="condition" ? (n>0?name+" is used by "+n+" item(s); their Condition will be cleared. Delete?":"Delete "+name+"?")
                  : kind==="adjustment" ? "Delete adjustment type "+name+"? Existing records keep their type." 
                  : (n>0?name+" is used by "+n+" item(s). Delete anyway? Those items keep the text but it won't be selectable.":"Delete "+name+"?");
        uiConfirm(msg,()=>{ applyDelete(kind,name); save(); refreshSearchWindows(); render(); }); };
      wrap.appendChild(mod); wrap.appendChild(del); li.appendChild(left); li.appendChild(wrap); l.appendChild(li); });
  };
  const addNow=()=>{ const v=body.querySelector("#lm-name").value.trim(); err.style.color="#c0392b";
    if(!v){ err.textContent="Enter a name."; return; }
    if(arr().some(x=>x.toLowerCase()===v.toLowerCase())){ err.textContent="That name already exists."; return; }
    arr().push(v); if(kind==="section"){ if(!DB.conditionsByCat) DB.conditionsByCat={}; if(!DB.conditionsByCat[v]) DB.conditionsByCat[v]=DB.conditions.slice(); if(!DB.subcats) DB.subcats={}; if(!DB.subcats[v]) DB.subcats[v]=[{name:v,ebayId:"",ebayName:"",aspects:[]}]; } save(); refreshSearchWindows(); body.querySelector("#lm-name").value=""; err.style.color="#1f7244"; err.textContent='Added "'+v+'".'; render(); body.querySelector("#lm-name").focus(); };
  body.querySelector("#lm-add").onclick=addNow;
  body.querySelector("#lm-name").addEventListener("keydown",e=>{ if(e.key==="Enter") addNow(); });
  body.querySelector("#lm-okay").onclick=close;
  render();
}

  body.querySelector("#cm-cat").onchange=(e)=>{ cat=e.target.value; editing=null; err.textContent=""; render(); };
  body.querySelector("#cm-add").onclick=addNow;
  body.querySelector("#cm-name").addEventListener("keydown",e=>{ if(e.key==="Enter") addNow(); });

function applyRename(kind,oldN,newN){
  if(kind==="section"){ DB.items.forEach(i=>{ if(i.section===oldN) i.section=newN; }); DB.slots.forEach(s=>{ if(s.section===oldN) s.section=newN; });
    if(DB.conditionsByCat && DB.conditionsByCat[oldN]){ DB.conditionsByCat[newN]=DB.conditionsByCat[oldN]; delete DB.conditionsByCat[oldN]; } }
  else if(kind==="group"){ DB.items.forEach(i=>{ if(i.groups){ i.groups=i.groups.map(g=>g===oldN?newN:g); } }); }
  else if(kind==="vendor"){ DB.items.forEach(i=>{ if(i.vendor===oldN) i.vendor=newN; }); }
  else if(kind==="condition"){ DB.items.forEach(i=>{ if(i.condition===oldN) i.condition=newN; }); }
  else if(kind==="adjustment"){ DB.invoices.forEach(r=>{ if(r.type===oldN) r.type=newN; }); }
  const a=kind==="section"?DB.sections:kind==="group"?DB.groups:kind==="vendor"?DB.vendors:kind==="adjustment"?DB.adjustmentTypes:DB.conditions;
  const idx=a.indexOf(oldN); if(idx>=0) a[idx]=newN;
}
function applyDelete(kind,name){
  if(kind==="condition"){ DB.items.forEach(i=>{ if(i.condition===name) i.condition=""; }); DB.conditions=DB.conditions.filter(x=>x!==name); }
  else if(kind==="section"){ DB.sections=DB.sections.filter(x=>x!==name); if(DB.conditionsByCat) delete DB.conditionsByCat[name]; }
  else if(kind==="group"){ DB.groups=DB.groups.filter(x=>x!==name); }
  else if(kind==="vendor"){ DB.vendors=DB.vendors.filter(x=>x!==name); }
  else if(kind==="adjustment"){ DB.adjustmentTypes=DB.adjustmentTypes.filter(x=>x!==name); }
}

  body._state=st;
  const dlSec=`<datalist id="dl-sec-${winId}"><option value="None"></option>`+DB.sections.map(s=>`<option value="${esc(s)}"></option>`).join("")+`</datalist>`;
  const dlSlot=`<datalist id="dl-slot-${winId}">`+[...DB.slots].sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true})).map(s=>`<option value="${s.id}"></option>`).join("")+`</datalist>`;
  const dlGrp=`<datalist id="dl-grp-${winId}"><option value="None"></option>`+DB.groups.map(g=>`<option value="${esc(g)}"></option>`).join("")+`</datalist>`;
  const dlCon=`<datalist id="dl-con-${winId}"><option value="None"></option>`+allConditions().map(c=>`<option value="${esc(c)}"></option>`).join("")+`</datalist>`;
  body.innerHTML=`
    <div class="topbar"><span style="font-size:12.5px;">Search <b>${isCat?'Catalog (sold)':'Active inventory'}</b></span><span style="font-size:12.5px;">Location <b>Main Warehouse</b></span></div>
    ${dlSec}${dlSlot}${dlGrp}${dlCon}
    <div class="searchform">
      <div class="ff"><label>Item Number</label><input class="txt" id="s-upc"></div>
      <div class="ff"><label>Warehouse SKU</label><input class="txt" id="s-sku"></div>
      <div class="ff"><label>Slot</label><input class="txt" id="s-slot" list="dl-slot-${winId}" placeholder="(any)"></div>
      <div class="ff"><label>Description</label><input class="txt" id="s-desc"></div>
      <div class="ff"><label>Category</label><input class="txt" id="s-sec" list="dl-sec-${winId}" placeholder="(any) — type None for blank"></div>
      <div class="ff"><label>Group</label><input class="txt" id="s-grp" list="dl-grp-${winId}" placeholder="(any) — type None for blank"></div>
      <div class="ff"><label>Condition</label><input class="txt" id="s-con" list="dl-con-${winId}" placeholder="(any) — type None for blank"></div>
      ${isCat?`<div class="ff"><label>Added on/after</label><input class="txt" id="s-added" type="date"></div>
      <div class="ff"><label>Sold on/after</label><input class="txt" id="s-soldon" type="date"></div>`:'<div></div>'}
    </div>
    <div style="padding:0 14px 10px;display:flex;gap:8px;align-items:center;">
      <button class="btn primary" id="s-go">Search</button><button class="btn" id="s-clear">Clear</button>
      ${isCat?'':`<button class="btn" id="s-add">+ Add Item</button><button class="btn" id="s-soldbtn" disabled>Items Sold (0)</button>`}
    </div>
    <div class="resultwrap"><table class="res"><thead><tr id="s-head"></tr></thead><tbody id="s-tbody"></tbody></table></div>
    <div class="statusbar"><span id="s-status">Enter search criteria, then press Search.</span><span id="s-count">Records: 0</span></div>`;

  const pool=()=> isCat?soldItems():activeItems();
  function run(){
    const g=id=>{ const e=body.querySelector("#"+id); return e?e.value:""; };
    const upc=g("s-upc").trim().toLowerCase(), sku=g("s-sku").trim().toLowerCase(), slot=g("s-slot").trim(), desc=g("s-desc").trim().toLowerCase();
    const sec=g("s-sec").trim(), grp=g("s-grp").trim(), con=g("s-con").trim();
    const addedAfter=isCat?g("s-added"):"", soldAfter=isCat?g("s-soldon"):"";
    const eqi=(a,b)=>String(a||"").trim().toLowerCase()===String(b||"").trim().toLowerCase();
    st.results=pool().filter(it=>{
      if(upc&&!it.upc.toLowerCase().includes(upc)) return false;
      if(sku&&!(it.sku||"").toLowerCase().includes(sku)) return false;
      if(slot){ if(slot.toLowerCase()==="none"){ if(it.slot) return false; } else if(!eqi(it.slot,slot)) return false; }
      if(desc&&!(it.desc.toLowerCase().includes(desc))) return false;
      if(sec){ if(sec.toLowerCase()==="none"){ if(it.section) return false; } else if(!eqi(it.section,sec)) return false; }
      if(grp){ if(grp.toLowerCase()==="none"){ if((it.groups||[]).length) return false; } else if(!(it.groups||[]).some(x=>eqi(x,grp))) return false; }
      if(con){ if(con.toLowerCase()==="none"){ if(it.condition) return false; } else if(!eqi(it.condition,con)) return false; }
      if(addedAfter&&(!it.createdAt||it.createdAt.slice(0,10)<addedAfter)) return false;
      if(soldAfter&&(!it.soldAt||it.soldAt.slice(0,10)<soldAfter)) return false;
      return true;
    });
    if(!isCat){ const seen={}, groups=[]; st.results.forEach(u=>{ const k=groupKey(u); if(!seen[k]){ seen[k]=1; groups.push(firstUnit(u)); } }); st.results=groups; }
    st.searched=true; sortAndRender();
    body.querySelector("#s-status").textContent=st.results.length?("Found "+st.results.length+(isCat?" record(s).":" item(s).")):"No records matched your search.";
  }
  function sortAndRender(){
    if(st.sort.key){ const col=cols.find(c=>c.key===st.sort.key);
      st.results.sort((a,b)=>{ let r; if(col.type==="check"){ r=(st.pending.has(a.id)?1:0)-(st.pending.has(b.id)?1:0); } else { r=cmpVal(col.get(a),col.get(b),col.type); } return r*st.sort.dir; }); }
    renderHead(); renderRows();
  }
  function renderHead(){ const h=body.querySelector("#s-head"); h.innerHTML="";
    cols.forEach(c=>{ const th=document.createElement("th"); const arrow=st.sort.key===c.key?`<span class="arr">${st.sort.dir>0?'▲':'▼'}</span>`:"";
      th.innerHTML=esc(c.label)+arrow; th.onclick=()=>{ if(st.sort.key===c.key) st.sort.dir*=-1; else { st.sort.key=c.key; st.sort.dir=1; } sortAndRender(); }; h.appendChild(th); });
  }
  function renderRows(){ const tb=body.querySelector("#s-tbody"); tb.innerHTML="";
    st.results.forEach(it=>{ const tr=document.createElement("tr");
      cols.forEach(c=>{ const td=document.createElement("td");
        if(c.key==="sold"&&c.type==="check"){ td.className="cc"; const cb=document.createElement("span"); cb.className="chk"+(st.pending.has(it.id)?" on":"");
          cb.onclick=(e)=>{ e.stopPropagation(); if(st.pending.has(it.id)) st.pending.delete(it.id); else st.pending.add(it.id); cb.classList.toggle("on"); updateSoldBtn(); };
          td.appendChild(cb); }
        else { td.textContent = c.type==="date"? fmtDay(c.get(it)) : (c.get(it)||""); }
        tr.appendChild(td); });
      tr.ondblclick=()=>openItemDetail(it,isCat?"catalog":"edit"); tb.appendChild(tr); });
    body.querySelector("#s-count").textContent="Records: "+st.results.length;
  }
  function updateSoldBtn(){ const b=body.querySelector("#s-soldbtn"); if(!b) return; const n=st.pending.size; b.textContent="Items Sold ("+n+")"; b.disabled=n===0; }
  body._refresh=()=>{
    [...st.pending].forEach(id=>{ if(!DB.items.find(x=>x.id===id&&!x.sold)) st.pending.delete(id); });
    if(st.searched){ run(); } updateSoldBtn(); };

  body.querySelector("#s-go").onclick=run;
  body.querySelector("#s-clear").onclick=()=>{ body.querySelectorAll(".searchform input").forEach(i=>i.value="");
    st.results=[]; st.searched=false; st.pending.clear(); body.querySelector("#s-tbody").innerHTML=""; renderHead(); body.querySelector("#s-count").textContent="Records: 0"; body.querySelector("#s-status").textContent="Enter search criteria, then press Search."; updateSoldBtn(); };
  body.querySelectorAll(".searchform input").forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") run(); }));
  attachAutofill(body.querySelector("#s-sec"), ()=>["None",...DB.sections]);
  attachAutofill(body.querySelector("#s-grp"), ()=>["None",...DB.groups]);
  attachAutofill(body.querySelector("#s-con"), ()=>["None",...allConditions()]);
  const w=openWindows[winId];
  if(w){ const rb=w.el.querySelector('[data-act="Run Search"]'); if(rb) rb.onclick=run;
    const nb=w.el.querySelector('[data-act="New Search"]'); if(nb) nb.onclick=()=>body.querySelector("#s-clear").click();
    const stopBtn=w.el.querySelector('[data-act="Stop"]'); if(stopBtn) stopBtn.onclick=()=>{ st.results=[]; st.searched=false; body.querySelector("#s-tbody").innerHTML=""; body.querySelector("#s-count").textContent="Records: 0"; body.querySelector("#s-status").textContent="Search stopped."; };
    const pb=w.el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>{ if(!st.results.length){ uiAlert("Run a search first."); return; }
      const pcols=cols.filter(c=>!(c.key==="sold"&&c.type==="check"));
      const heads=pcols.map(c=>c.label);
      const rows=st.results.map(it=>pcols.map(c=> c.type==="date"?fmtDay(c.get(it)):(c.get(it)||"") ));
      printTable(isCat?"WIM Catalog — Search Results":"WIM Item Maintenance — Search Results", heads, rows); }; }
  if(!isCat){ body.querySelector("#s-add").onclick=()=>openItemDetail(null,"new");
    body.querySelector("#s-soldbtn").onclick=()=>{ if(st.pending.size) openItemsSold(st, body); }; }
  renderHead();      // headers visible immediately; rows wait for Search
  updateSoldBtn();
}

/* Items Sold review modal */
function openItemsSold(st, searchBody){
  if(openWindows["items-sold"]){ focusWin(openWindows["items-sold"].el); return; }
  const {body,close}=buildWindow({id:"items-sold",title:"Items Sold — Review Order",width:680,height:560,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Review, then Sell to generate an invoice</span>`});
  function items(){ return [...st.pending].map(id=>DB.items.find(x=>x.id===id&&!x.sold)).filter(Boolean); }
  function render(){
    const list=items();
    body.innerHTML=`<div style="padding:12px 14px 4px;font-size:12.5px;color:#333;">${list.length} item(s) selected to sell &middot; user <b>${SESSION.user.id}</b></div>
      <div class="resultwrap" style="margin:6px 14px;flex:none;max-height:330px;"><table class="res"><thead><tr><th>Description</th><th>Warehouse SKU</th><th>Category</th><th></th></tr></thead><tbody id="is-tb"></tbody></table></div>
      <div style="padding:8px 14px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" id="is-dl">Download</button><button class="btn" id="is-print">Print</button>
        <span style="flex:1;"></span>
        <button class="btn primary" id="is-sell" ${list.length?'':'disabled'}>Sell</button><button class="btn" id="is-cancel">Cancel</button></div>
      <div class="err" id="is-msg" style="padding:0 14px;"></div>`;
    const tb=body.querySelector("#is-tb");
    list.forEach(it=>{ const tr=document.createElement("tr");
      tr.innerHTML=`<td>${esc(it.desc)}</td><td>${esc(it.sku)}</td><td>${esc(it.section)}</td>`;
      const td=document.createElement("td"); td.className="cc"; const x=document.createElement("button"); x.className="btn sm"; x.textContent="Remove";
      x.onclick=()=>{ st.pending.delete(it.id); render(); if(searchBody._refresh) searchBody._refresh(); }; td.appendChild(x); tr.appendChild(td); tb.appendChild(tr); });
    body.querySelector("#is-dl").onclick=()=>{ const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
      downloadCSV("WIM-order-"+ts+".csv",["Description","Warehouse SKU","Section"], list.map(it=>[it.desc,it.sku,it.section])); };
    body.querySelector("#is-print").onclick=()=>printTable("WIM Sell Order — user "+SESSION.user.id, ["Description","Warehouse SKU","Section"], list.map(it=>[it.desc,it.sku,it.section]));
    body.querySelector("#is-cancel").onclick=close;
    body.querySelector("#is-sell").onclick=()=>{ const sell=items(); if(!sell.length) return;
      uiConfirm("Sell "+sell.length+" item(s)? This creates a record and removes the items from active inventory.",()=>{
        const inv=sellItems(sell, SESSION.user.id); st.pending.clear();
        refreshSearchWindows(); refreshInvoices();
        uiAlert("Record #"+inv.num+" created with "+sell.length+" item(s)."); close(); }); };
  }
  render();
}

function refreshSearchWindows(){ ["item-search","catalog"].forEach(id=>{ const w=openWindows[id]; if(w){ const b=w.el.querySelector(".body"); if(b._refresh)b._refresh(); } });
  const mw=openWindows["wh-map"]; if(mw) renderSlots(mw.el.querySelector(".body")); }

/* ============================================================ INVOICES ============================================================ */
function openInvoices(){
  if(openWindows["invoices"]){ focusWin(openWindows["invoices"].el); return; }
  const {body}=buildWindow({id:"invoices",title:"Records",width:980,height:640,
    toolbar:`${tbtn(I.bolt,'Refresh')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Records of adds, sells &amp; adjustments &mdash; open one to reverse</span>`});
  const typeOpts=`<option value="">(any)</option>`+["Add","Bulk Add","Sell","Bulk Sell",...DB.adjustmentTypes].map(t=>`<option>${esc(t)}</option>`).join("");
  body.innerHTML=`
    <div class="searchform" style="grid-template-columns:repeat(3,1fr);padding:12px 14px 4px;">
      <div class="ff"><label>Record #</label><input class="txt" id="rs-num"></div>
      <div class="ff"><label>Type</label><select class="cmb" id="rs-type">${typeOpts}</select></div>
      <div class="ff"><label>Status</label><select class="cmb" id="rs-status"><option value="">(any)</option><option>Active</option><option>Reversed</option></select></div>
      <div class="ff"><label>User</label><input class="txt" id="rs-user"></div>
      <div class="ff"><label>Category</label><input class="txt" id="rs-cat" list="rs-cat-dl"></div>
      <div class="ff"><label>Date (on/after)</label><input class="txt" id="rs-date" type="date"></div>
    </div>
    <datalist id="rs-cat-dl">${DB.sections.map(s=>`<option value="${esc(s)}"></option>`).join("")}</datalist>
    <div style="padding:0 14px 8px;display:flex;gap:8px;"><button class="btn primary" id="rs-go">Search</button><button class="btn" id="rs-clear">Clear</button></div>
    <div class="resultwrap" style="margin:0 14px 14px;"><table class="res"><thead><tr><th>Record</th><th>Date / Time</th><th>Type</th><th>Categories</th><th>Total Items</th><th>User</th><th>Status</th></tr></thead><tbody id="inv-tb"></tbody></table></div>`;
  const g=id=>{ const e=body.querySelector("#"+id); return e?e.value.trim():""; };
  const render=()=>{ const tb=body.querySelector("#inv-tb"); tb.innerHTML="";
    const fNum=g("rs-num").toLowerCase(), fType=g("rs-type"), fStatus=g("rs-status"), fUser=g("rs-user").toLowerCase(), fCat=g("rs-cat").toLowerCase(), fDate=g("rs-date");
    let list=[...DB.invoices].sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
    list=list.filter(inv=>{ const stt=invStatus(inv);
      if(fNum && !String(inv.num).includes(fNum)) return false;
      if(fType && (inv.type||"")!==fType) return false;
      if(fStatus){ if(fStatus==="Reversed"){ if(stt!=="Reversed") return false; } else { if(stt==="Reversed") return false; } }
      if(fUser && !userLabel(inv.soldBy).toLowerCase().includes(fUser)) return false;
      if(fCat && !invSections(inv).some(s=>s.toLowerCase().includes(fCat))) return false;
      if(fDate && (!inv.createdAt || inv.createdAt.slice(0,10)<fDate)) return false;
      return true; });
    list.forEach(inv=>{ const tr=document.createElement("tr"); const stt=invStatus(inv);
      tr.innerHTML=`<td><b>#${inv.num}</b></td><td>${fmtDate(inv.createdAt)}</td><td>${esc(inv.type||"Sell")}</td><td>${esc(invSections(inv).join(", "))}</td><td class="cc">${invTotalItems(inv)}</td><td>${esc(userLabel(inv.soldBy))}</td><td><span class="badge ${stt==='Active'?'ok':(stt==='Reversed'?'rev':'')}">${stt}</span></td>`;
      tr.ondblclick=()=>openInvoiceDetail(inv); tb.appendChild(tr); });
    if(!list.length){ tb.innerHTML=`<tr><td colspan="7" style="color:#888;">No records match.</td></tr>`; }
  };
  body.querySelector("#rs-go").onclick=render;
  body.querySelector("#rs-clear").onclick=()=>{ body.querySelectorAll(".searchform input,.searchform select").forEach(e=>e.value=""); render(); };
  body.querySelectorAll(".searchform input").forEach(el=>el.addEventListener("keydown",e=>{ if(e.key==="Enter") render(); }));
  body._render=render; render();
}
function openInvoiceDetail(inv){
  const id="inv-"+inv.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body,close}=buildWindow({id,title:"Record #"+inv.num,width:700,height:560,
    toolbar:`${tbtn(I.print,'Print')}<span class="tbar-sep"></span><span style="font-size:12px;color:#555;">Reverse this record</span>`});
  const sel=new Set();
  const stateLabel=(ln)=> ln.reversed?"reversed":(ln.mode==="add"?"added":(ln.mode==="adjust"?"adjusted":"sold"));
  function render(){
    body.innerHTML=`<div style="padding:12px 14px 4px;font-size:12.5px;">Record <b>#${inv.num}</b> &middot; ${fmtDate(inv.createdAt)} &middot; type <b>${esc(inv.type||"Sell")}</b> &middot; user <b>${esc(userLabel(inv.soldBy))}</b> &middot; status <b>${invStatus(inv)}</b></div>
      <div class="resultwrap" style="margin:6px 14px;flex:none;max-height:330px;"><table class="res"><thead><tr><th></th><th>Description</th><th>Warehouse SKU</th><th>Category</th><th>Qty</th><th>State</th></tr></thead><tbody id="id-tb"></tbody></table></div>
      <div style="padding:8px 14px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" id="id-rev">Reverse Selected</button>
        <button class="btn danger" id="id-revall">Reverse All</button>
        <span style="flex:1;"></span><button class="btn" id="id-close">Close</button></div>
      <div class="err" id="id-msg" style="padding:0 14px;color:#1f7244;"></div>`;
    const tb=body.querySelector("#id-tb");
    inv.lines.forEach((ln,i)=>{ const tr=document.createElement("tr");
      const td0=document.createElement("td"); td0.className="cc";
      if(!ln.reversed){ const cb=document.createElement("span"); cb.className="chk"+(sel.has(i)?" on":""); cb.onclick=()=>{ if(sel.has(i))sel.delete(i); else sel.add(i); cb.classList.toggle("on"); }; td0.appendChild(cb); }
      tr.appendChild(td0);
      const a1=document.createElement("td"); a1.textContent=ln.desc; tr.appendChild(a1);
      const a2=document.createElement("td"); a2.textContent=ln.sku; tr.appendChild(a2);
      const a3=document.createElement("td"); a3.textContent=ln.section; tr.appendChild(a3);
      const a4=document.createElement("td"); a4.className="cc"; a4.textContent=ln.qty; tr.appendChild(a4);
      const a5=document.createElement("td"); a5.innerHTML=ln.reversed?'<span class="badge rev">reversed</span>':'<span class="badge ok">'+stateLabel(ln)+'</span>'; tr.appendChild(a5);
      tb.appendChild(tr); });
    const revWord = (inv.lines[0]&&inv.lines[0].mode==="add")?"remove the added item(s)":"return the item(s) to inventory";
    body.querySelector("#id-rev").onclick=()=>{ if(!sel.size){ body.querySelector("#id-msg").textContent="Tick the lines you want to reverse first."; return; }
      uiConfirm("Reverse "+sel.size+" line(s)? This will "+revWord+".",()=>{ reverseLines(inv,[...sel]); sel.clear(); refreshSearchWindows(); refreshInvoices(); render(); body.querySelector("#id-msg").textContent="Reversed."; }); };
    body.querySelector("#id-revall").onclick=()=>{ const open=inv.lines.map((l,i)=>i).filter(i=>!inv.lines[i].reversed); if(!open.length){ body.querySelector("#id-msg").textContent="Nothing left to reverse."; return; }
      uiConfirm("Fully reverse this record ("+open.length+" line(s))?",()=>{ reverseLines(inv,open); sel.clear(); refreshSearchWindows(); refreshInvoices(); render(); body.querySelector("#id-msg").textContent="Record fully reversed."; }); };
    body.querySelector("#id-close").onclick=close;
    const pb=openWindows[id].el.querySelector('[data-act="Print"]'); if(pb) pb.onclick=()=>printTable("WIM Record #"+inv.num+" — "+(inv.type||"Sell")+" (user "+userLabel(inv.soldBy)+")",["Description","Warehouse SKU","Category","Qty","State"], inv.lines.map(l=>[l.desc,l.sku,l.section,l.qty,stateLabel(l)]));
  }
  render();
}

  function fillSubcats(){ const cat=(secSel&&secSel.value)||it.section; let subs=subcatsOf(cat); if(!subs.length) subs=[{name:cat}];

  function renderListing(){ const cat=(secSel&&secSel.value)||it.section; const asp=aspectsFor({section:cat,subCategory:it.subCategory});

        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;"><button class="btn" id="l-toggle">${it.listing.status==="listed"?"Delist (keep SKU)":"Mark as Listed"}</button><span class="smallhint">Real eBay publish/delist arrives in the publishing update; this sets the status so Discrepancies &amp; Manage Listings work now.</span></div>
      </fieldset>`;
    }
    lwrap.innerHTML=html;
    lwrap.querySelectorAll(".af-asp").forEach(inp=>inp.oninput=()=>{ it.aspects[inp.dataset.asp]=inp.value; markDirty&&markDirty(); });
    const ebtn=lwrap.querySelector("#d-ebayfind"); if(ebtn) ebtn.onclick=()=>openEbayFind(it, ()=>renderListing());
    if(isLive() && !ro){
      const t=lwrap.querySelector("#l-title"), pr=lwrap.querySelector("#l-price"), q=lwrap.querySelector("#l-qty"), dsel=lwrap.querySelector("#l-desc"), dbody=lwrap.querySelector("#l-descbody");
      t.oninput=()=>{ it.listing.title=t.value; markDirty&&markDirty(); };
      pr.oninput=()=>{ it.listing.price=pr.value; markDirty&&markDirty(); };
      q.oninput=()=>{ it.listing.qty=q.value; markDirty&&markDirty(); };
      dsel.onchange=()=>{ it.listing.descriptionId=dsel.value||null; const d=DB.descriptions.find(x=>x.id===dsel.value); if(d) dbody.value=d.body; markDirty&&markDirty(); };
      dbody.oninput=()=>{ it.listing.descBody=dbody.value; markDirty&&markDirty(); };
      const tog=lwrap.querySelector("#l-toggle"); if(tog) tog.onclick=()=>{ if(it.listing.status==="listed"){ it.listing.status="delisted"; it.listing.delistedAt=new Date().toISOString(); addHistory(it,"Delisted from eBay (SKU kept)"); } else { if(!it.listing.title) it.listing.title=it.desc; it.listing.status="listed"; it.listing.listedAt=new Date().toISOString(); addHistory(it,"Marked as Listed"); } save(); refreshSearchWindows&&refreshSearchWindows(); renderListing(); };
      const pf=lwrap.querySelector("#l-photofile");
      lwrap.querySelector("#l-photoadd").onclick=()=>pf.click();
      pf.onchange=async ()=>{ if(pf.files[0]){ try{ const d=await compressImage(pf.files[0]); it.images.push(d); markDirty&&markDirty(); paintPhotos(); }catch(e){ uiAlert("Could not read image."); } } };
      paintPhotos();
      function paintPhotos(){ const host=lwrap.querySelector("#l-photos"); if(!host) return; host.innerHTML="";
        it.images.forEach((src,i)=>{ const cell=document.createElement("div"); cell.style.cssText="position:relative;width:54px;height:54px;border:1px solid #bbb;background:#fff center/cover no-repeat;"; cell.style.backgroundImage=`url(${src})`;
          if(i===it.imageFeatured){ const star=document.createElement("span"); star.textContent="\u2605"; star.title="Featured"; star.style.cssText="position:absolute;left:1px;top:0;color:#e6a200;font-size:13px;"; cell.appendChild(star); }
          const x=document.createElement("span"); x.textContent="\u2715"; x.style.cssText="position:absolute;right:1px;top:0;cursor:pointer;color:#b1342a;font-size:12px;background:rgba(255,255,255,.8);padding:0 2px;"; x.onclick=(ev)=>{ ev.stopPropagation(); it.images.splice(i,1); if(it.imageFeatured>=it.images.length) it.imageFeatured=0; if(it.images[it.imageFeatured]) it.image=it.images[it.imageFeatured]; markDirty&&markDirty(); paintPhotos(); }; cell.appendChild(x);
          cell.title="Click to make featured"; cell.onclick=()=>{ it.imageFeatured=i; if(it.images[i]) it.image=it.images[i]; markDirty&&markDirty(); paintPhotos(); };
          host.appendChild(cell); });
        if(!it.images.length) host.innerHTML=`<span class="smallhint">No photos yet. The main photo above becomes the featured image.</span>`;
      }
    }
  }
  if(secSel) secSel.addEventListener("change",()=>{ it.subCategory=null; fillSubcats(); renderListing(); markDirty&&markDirty(); });
  if(subSel) subSel.addEventListener("change",()=>{ it.subCategory=subSel.value; renderListing(); markDirty&&markDirty(); });

  function historyTab(){
    const hist=(it.history||[]).slice().sort((a,b)=> new Date(b.at)-new Date(a.at));
    tabbody.innerHTML=`<div class="resultwrap" style="margin:0;border:1px solid #b5b5b5;max-height:200px;"><table class="res"><thead><tr><th style="width:110px;">Date</th><th>Change</th><th style="width:160px;">User</th><th style="width:90px;">Time</th></tr></thead><tbody id="d-hist-tb"></tbody></table></div>`;
    const tb=tabbody.querySelector("#d-hist-tb");
    if(!hist.length){ tb.innerHTML=`<tr><td colspan="4" style="color:#888;">No history yet.</td></tr>`; return; }
    hist.forEach(h=>{ const d=new Date(h.at); const tr=document.createElement("tr");
      tr.innerHTML=`<td>${d.toLocaleDateString()}</td><td>${esc(h.desc)}</td><td>${esc(h.by||"—")}</td><td>${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>`; tb.appendChild(tr); });
  }
  function groupsTab(){ const avail=DB.groups.filter(g=>!assigned.includes(g));
    tabbody.innerHTML=`<div class="groups3">
      <div><div class="grp-h">Can be assigned to these groups</div><div class="listbox" id="g-avail" style="min-height:170px;"></div></div>
      <div class="mid-btns"><button class="btn sm" id="g-add" ${ro?'disabled':''}>&#9654;</button><button class="btn sm" id="g-rem" ${ro?'disabled':''}>&#9664;</button></div>
      <div><div class="grp-h">Assigned to these groups</div><div class="listbox" id="g-assigned" style="min-height:170px;"></div></div></div>`;
    const av=tabbody.querySelector("#g-avail"),asg=tabbody.querySelector("#g-assigned"); let selA=null,selB=null;
    avail.forEach(g=>{ const li=document.createElement("div"); li.className="li"; li.textContent=g; li.onclick=()=>{ av.querySelectorAll(".li").forEach(x=>x.classList.remove("sel")); li.classList.add("sel"); selA=g; }; av.appendChild(li); });
    assigned.forEach(g=>{ const li=document.createElement("div"); li.className="li"; li.textContent=g; li.onclick=()=>{ asg.querySelectorAll(".li").forEach(x=>x.classList.remove("sel")); li.classList.add("sel"); selB=g; }; asg.appendChild(li); });
    if(!ro){ tabbody.querySelector("#g-add").onclick=()=>{ if(selA){ assigned.push(selA); markDirty(); groupsTab(); } };
      tabbody.querySelector("#g-rem").onclick=()=>{ if(selB){ assigned=assigned.filter(x=>x!==selB); markDirty(); groupsTab(); } }; }
  }
  function showTab(t){ curTab=t;
    body.querySelector("#d-tab-groups").classList.toggle("sel",t==="groups");
    body.querySelector("#d-tab-history").classList.toggle("sel",t==="history");
    if(t==="groups") groupsTab(); else historyTab(); }
  body.querySelector("#d-tab-groups").onclick=()=>showTab("groups");
  body.querySelector("#d-tab-history").onclick=()=>showTab("history");
  showTab("groups");
  if(ro){ body.querySelector("#d-close").onclick=close;
    const ract=openWindows[wid].el.querySelector('[data-act="Reactivate"]'); if(ract) ract.onclick=()=>reactivateItem(it, close);
    const rpb=openWindows[wid].el.querySelector('[data-act="Print"]'); if(rpb) rpb.onclick=()=>printLabelsFor([it]);
    return; }

  // Warehouse SKU dropdown (all units of this item number)
  const skuDD=body.querySelector("#d-sku-dd"), skuList=body.querySelector("#d-sku-list");
  if(skuDD){ skuDD.onclick=()=>{ if(skuList.style.display==="none"){ const units=unitsOf(it);
      skuList.innerHTML = units.length? units.map(u=>`<div class="li" style="padding:5px 10px;">${esc(u.sku)} <span class="smallhint">(slot ${esc(u.slot)})</span></div>`).join("") : `<div class="li" style="color:#888;">No active units.</div>`;
      skuList.style.display="block"; } else { skuList.style.display="none"; } }; }

  const manual=body.querySelector("#d-manual"), slotI=body.querySelector("#d-slot"), placeI=body.querySelector("#d-place"), skuI=body.querySelector("#d-sku");
  const catSel=body.querySelector("#d-section");
  attachAutofill(body.querySelector("#d-condition"), ()=>condsFor(catSel.value));
  const conDL=body.querySelector("#con-"+it.id);
  catSel.addEventListener("change",()=>{ if(conDL) conDL.innerHTML=condsFor(catSel.value).map(c=>`<option value="${esc(c)}">`).join(""); });
  function setManualUI(){ const on=manual.classList.contains("on"); slotI.disabled=!on; placeI.disabled=!on;
    if(!isNew) catSel.disabled=!on;   // existing items: Category editable only when manually slotting
    if(!on){ skuI.value = (isNew? "(auto-assigned on save)" : firstUnit(it).sku); } else { updSku(); } }
  function updSku(){ const sl=normSlot(slotI.value); const p=parseInt(placeI.value,10); skuI.value=(sl&&p)?skuOf(sl,p):""; }
  manual.onclick=()=>{ manual.classList.toggle("on"); setManualUI(); };
  slotI.oninput=()=>{ const sl=normSlot(slotI.value); if(sl&&slotById(sl)){ const p=lowestPlacement(sl,it.id); placeI.value=p!=null?p:''; } updSku(); };
  placeI.oninput=updSku;
  setManualUI();

  const saveBtn=body.querySelector("#d-save");
  function doSave(keepOpen){ const status=body.querySelector("#d-status"); status.style.color="#c0392b";
    const upc=body.querySelector("#d-upc").value.trim(), desc=body.querySelector("#d-desc").value.trim();
    if(!desc){ status.textContent="Description is required."; return; }
    const cat=body.querySelector("#d-section").value;
    if(!cat){ status.textContent="Category is required (it determines which slot the item goes in)."; return; }
    if(isNew){ const req=aspectsFor(it).filter(a=>a.required);
      const missing=req.filter(a=>!(it.aspects&&it.aspects[a.name]&&String(it.aspects[a.name]).trim()));
      body.querySelectorAll(".af-asp").forEach(inp=>{ inp.style.borderColor=""; });
      if(missing.length){ body.querySelectorAll(".af-asp").forEach(inp=>{ if(missing.some(a=>a.name===inp.dataset.asp)){ inp.style.borderColor="#c0392b";
          const ff=inp.closest(".ff"), lab=ff&&ff.querySelector("label"); if(lab && !lab.querySelector(".reqx")){ const s=document.createElement("span"); s.className="reqx"; s.style.color="#c0392b"; s.textContent=" *"; lab.appendChild(s); } } });
        status.textContent="Fill the required eBay field(s) marked *: "+missing.map(a=>a.name).join(", "); return; } }
    const condition=(body.querySelector("#d-condition")?body.querySelector("#d-condition").value.trim():(it.condition||""));
    const base={ upc, desc, condition, vendor:body.querySelector("#d-vendor").value, section:cat,
      unitCost:body.querySelector("#d-unitcost").value.trim()||"0.000", retail:body.querySelector("#d-retail").value.trim()||"0.00",
      onHand:body.querySelector("#d-onhand").value.trim()||"1", groups:assigned, image:it.image||"",
      manualSlot:manual.classList.contains("on"),
      category:it.category||"FRUIT", subCategory:it.subCategory||"", caseCost:it.caseCost||"0.00", casePack:it.casePack||"", base:it.base||"0.00", mixMatch:it.mixMatch||"None - 0", orderCode:it.orderCode||"", posDesc:it.posDesc||"", size:it.size||"1", sizeUnit:it.sizeUnit||"Pound", posDept:it.posDept||DB.posDepts[0] };
    const manualOn=manual.classList.contains("on");
    const qty=isNew?Math.max(1,parseInt((body.querySelector("#d-qty")||{}).value,10)||1):1;
    let placements=[];
    if(manualOn){
      const slotV=normSlot(slotI.value);
      if(!slotV){ status.textContent="Manual slot is on — enter a slot (e.g. A.6), or untick Manually slot to auto-assign."; return; }
      if(!slotById(slotV)){ status.textContent="Slot "+slotV+" does not exist. Create it in Warehouse Maintenance first."; return; }
      const slot=slotById(slotV);
      if(isNew&&qty>1){ const a=allocateInSlot(slotV,qty,null); if(!a){ status.textContent="Slot "+slotV+" doesn't have room for "+qty+" units (limit "+slot.skuLimit+")."; return; } placements=a; }
      else { let placeV=parseInt(placeI.value,10);
        if(!placeV){ const lp=lowestPlacement(slotV,it.id); if(lp==null){ status.textContent="Slot "+slotV+" is full (limit "+slot.skuLimit+")."; return; } placeV=lp; }
        if(placeV<1||placeV>slot.skuLimit){ status.textContent="Placement must be between 1 and the slot limit ("+slot.skuLimit+")."; return; }
        if(activeItems().some(o=>o.id!==it.id&&o.slot===slotV&&o.placement===placeV)){ status.textContent="Duplicate Warehouse SKU "+skuOf(slotV,placeV)+" — another active item occupies this spot."; return; }
        placements=[{slot:slotV,placement:placeV}]; }
    } else {
      if(isNew){ const a=allocateMulti(qty,null,cat); if(a.length<qty){ status.textContent="No slot for Category \""+cat+"\" has room for "+qty+" unit(s) (found "+a.length+"). Add a slot of this Category in Warehouse Maintenance."; return; } placements=a; }
      else if(it.slot && slotById(it.slot) && it.placement){ placements=[{slot:it.slot,placement:it.placement}]; }
      else { const r=autoSlot(it.id,cat); if(!r){ status.textContent="No slot for Category \""+cat+"\" is available. Add one in Warehouse Maintenance, or tick Manually slot."; return; } placements=[{slot:r.slot,placement:r.placement}]; }
    }
    if(isNew){
      const created=[];
      placements.forEach((pl,i)=>{ const ni=(i===0)?it:Object.assign({},it,{id:crypto.randomUUID()});
        Object.assign(ni, base, {slot:pl.slot,placement:pl.placement,sku:skuOf(pl.slot,pl.placement),onHand:(qty>1?"1":base.onHand),createdAt:new Date().toISOString(),sold:false,soldAt:null,soldBy:null});
        ni.history=[{at:ni.createdAt,desc:"Item created (SKU "+ni.sku+")",by:(SESSION.user?userLabel(SESSION.user.id):"system")}];
        DB.items.push(ni); created.push(ni); });
      recordAdds(created, SESSION.user.id, "Add");
    } else {
      const pl=placements[0]; const newSku=skuOf(pl.slot,pl.placement); const ch=[];
      if((it.desc||"")!==desc) ch.push('Description changed: "'+(it.desc||"")+'" → "'+desc+'"');
      if((it.upc||"")!==upc) ch.push('Item Number changed: "'+(it.upc||"(blank)")+'" → "'+(upc||"(blank)")+'"');
      if((it.vendor||"")!==base.vendor) ch.push("Vendor changed to "+base.vendor);
      if((it.condition||"")!==condition) ch.push("Condition changed to "+(condition||"(blank)"));
      if((it.section||"")!==cat) ch.push("Category changed to "+cat);
      if(!!it.manualSlot!==manualOn) ch.push(manualOn?"Manually slot checked":"Manually slot unchecked");
      if((it.sku||"")!==newSku) ch.push("Warehouse SKU changed: "+(it.sku||"(none)")+" → "+newSku);
      if(it._photoAdded) ch.push("Photo added"); else if(it._photoRemoved) ch.push("Photo removed");
      Object.assign(it, base, {slot:pl.slot,placement:pl.placement,sku:newSku});
      delete it._photoAdded; delete it._photoRemoved;
      ch.forEach(c=>addHistory(it,c));
    }
    save(); refreshSearchWindows(); refreshInvoices();
    if(isNew || !keepOpen){ close(); }
    else { dirty=false; updateBtn(); status.style.color="#1f7244"; status.textContent="Saved."; showTab(curTab); }
  }
  let dirty=false;

function reactivateItem(it, closeCatalog){
  const histSku=it.sku, histSlot=it.slot, histPlace=it.placement;
  const conflict = histSlot && histPlace && activeItems().some(o=>o.slot===histSlot&&o.placement===histPlace);
  function reviveTo(slot,placement,manual){
    it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1";
    it.manualSlot=!!manual; it.slot=slot||""; it.placement=placement||null; it.sku=(slot&&placement)?skuOf(slot,placement):"";
    addHistory(it,"Reactivated from catalog (SKU "+(it.sku||"unassigned")+")");
    recordAdds([it], SESSION.user.id, "Add");
    save(); refreshSearchWindows(); refreshInvoices();
    if(closeCatalog) closeCatalog();
    openItemDetail(it,"edit");
  }
  if(!conflict && histSlot && slotById(histSlot)){ reviveTo(histSlot, histPlace, it.manualSlot); return; }
  if(!histSlot){ // had no slot historically — auto-assign by category
    const r=autoSlot(it.id,it.section); if(r){ reviveTo(r.slot,r.placement,false); } else { uiAlert("No slot is available for this item's Category. Add one in Warehouse Maintenance first."); }
    return;
  }
  // conflict: ask the user
  const id="react-"+it.id; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body,close}=buildWindow({id,title:"Reactivate — SKU unavailable",width:520,height:300,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Historic Warehouse SKU is in use</span>`});
  body.innerHTML=`<div style="padding:16px;font-size:12.5px;">

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <button class="btn primary" id="rx-gen">Generate SKU</button>
        <button class="btn" id="rx-man">Manually Enter</button>
        <button class="btn" id="rx-cancel">Cancel</button></div></div>`;
  body.querySelector("#rx-gen").onclick=()=>{ const r=autoSlot(it.id,it.section); if(!r){ uiAlert("No slot is available for this item's Category. Add one in Warehouse Maintenance first."); return; } close(); reviveTo(r.slot,r.placement,false); };
  body.querySelector("#rx-man").onclick=()=>{ it.sold=false; it.soldAt=null; it.soldBy=null; it.outType=null; if((parseFloat(it.onHand)||0)<1) it.onHand="1"; it.manualSlot=true; it.slot=""; it.placement=null; it.sku=""; addHistory(it,"Reactivated from catalog (manual slotting)"); recordAdds([it],SESSION.user.id,"Add"); save(); refreshSearchWindows(); refreshInvoices(); close(); if(closeCatalog) closeCatalog(); openItemDetail(it,"edit"); };
  body.querySelector("#rx-cancel").onclick=close;
}
function normSlot(v){ if(!v) return ""; v=v.toUpperCase().trim().replace(/\.+$/,""); const m=v.match(/^([A-Z]+)\.?(\d+)$/); return m?(m[1]+"."+m[2]):""; }

    else { const u=nextUnit(key,used); if(!u){ msg.style.color="#c0392b"; msg.textContent="All available units of "+(hit.upc||hit.desc)+" are already staged."; return false; } entry.units.push(u); }
