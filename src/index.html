// Supervisor+ screen — shows all items with status "Created" (sent for listing review by
// warehouse staff). A supervisor can open any item, approve it, and actually list it to
// eBay from here. Warehouse staff see neither this screen nor the regular "List on eBay"
// button — their Send Listing button is the only path to listing, and it routes here.
// Pulls eBay orders (Fulfillment API), matches each line item back to a local WIM item
// by SKU, and surfaces anything not already pulled in as a new "Recently Sold" row. An
// item that matches gets moved out of active inventory and tagged Sold the moment it's
// pulled in here — that's the actual "sale removes it from inventory" behavior. Condition
// is read from WIM's own local item record, not from the order — eBay's order data
// doesn't carry condition at all, since that's a property of the listing, not the sale.
// Automatically checks for new sales every 5 minutes while WIM is in Live mode — only
// while Live mode is actually open, since checking from a device that isn't monitoring
// eBay at all wouldn't serve any purpose. One real API call every 5 minutes is genuinely
// negligible against eBay's normal allowance for this kind of call, even running all day.
// Silent failures here (network hiccup, not yet connected) don't interrupt anyone — the
// manual Pull Recently Sold button in the screen itself still works as a fallback either way.
let recentlySoldWatcherStarted=false;
function startRecentlySoldWatcher(){
  if(recentlySoldWatcherStarted) return; recentlySoldWatcherStarted=true;
  const tick=async ()=>{
    if(!isLive() || !EBAY.ready()) return; // stop quietly if no longer in Live mode or not connected
    try{ await pullRecentlySold(7); }catch(e){ /* silent — the manual button surfaces real errors when someone's looking */ }
  };
  setInterval(tick, 300000); // every 5 minutes
  setInterval(checkAutoComplete, 300000); // also every 5 minutes — purely local date math, no network call needed
  setInterval(refreshMessageUnreadCache, 300000); // same cadence — one conversation-list pull covers every buyer's envelope state at once
  refreshMessageUnreadCache();
}
// Powers the envelope icons across Recently Sold/Shipping/Completed: a per-buyer cache of
// "does this person have any message thread, and how many are unread" — built from a
// single conversation-list pull rather than one API call per row. Only runs in Live mode,
// same reasoning as the other watchers on this cycle.
function refreshMessageUnreadCache(){
  const cache={};
  if(DB.simulationMode){
    DB.simulatedConversations.forEach(s=>{ if(!s.buyer) return;
      cache[s.buyer]={ hasAny:true, unreadCount: Math.max(cache[s.buyer]?cache[s.buyer].unreadCount||0:0, s.unread?1:0) }; });
  }
  if(!isLive() || !EBAY.ready()){ messageUnreadCache=cache; try{ document.querySelectorAll(".body").forEach(b=>{ if(b._refresh) b._refresh(); }); }catch(e){} return; }
  EBAY.user("/commerce/message/v1/conversation?limit=50", EBAY_SCOPE_MSG).then(r=>{
    if(!r.ok) return;
    let data={}; try{ data=JSON.parse(r.body); }catch(e){ return; }
    const convos=data.conversations||data.conversationSummaries||data.messages||[];
    convos.forEach(c=>{
      if((c.conversationType||"")==="FROM_EBAY") return;
      const uname=c.username||c.buyerUsername||c.otherParty||c.participant||c.sender||c.fromUsername||c.memberUsername;
      if(!uname) return;
      const u=c.unreadCount!=null?c.unreadCount:(c.unread!=null?c.unread:(c.hasUnread?1:0));
      const unreadCount=(u===true)?1:(parseInt(u,10)||0);
      cache[uname]={ hasAny:true, unreadCount: Math.max(cache[uname]?cache[uname].unreadCount||0:0, unreadCount) };
    });
    messageUnreadCache=cache;
    try{ document.querySelectorAll(".body").forEach(b=>{ if(b._refresh) b._refresh(); }); }catch(e){}
  }).catch(()=>{});
}
let messageUnreadCache={};
// Renders one envelope cell's inner HTML based on cached state for that buyer — grey when
// nothing's known yet, dark grey once we know there's a thread with no unread messages,
// bold black with a red unread count when there's something to look at.
function envelopeCellHtml(buyerUsername){
  if(!buyerUsername) return `<span style="color:#ddd;" title="No buyer on record">&#9993;</span>`;
  const c=messageUnreadCache[buyerUsername];
  if(!c||!c.hasAny) return `<span data-buyer="${esc(buyerUsername)}" style="color:#ccc;cursor:pointer;" title="No known messages with ${esc(buyerUsername)} — click to check">&#9993;</span>`;
  if(c.unreadCount>0) return `<span data-buyer="${esc(buyerUsername)}" style="position:relative;color:#222;font-weight:700;cursor:pointer;" title="${c.unreadCount} unread message(s) from ${esc(buyerUsername)}">&#9993;<span style="position:absolute;top:-7px;right:-9px;background:#c0392b;color:#fff;border-radius:8px;font-size:9px;font-weight:700;padding:0 4px;line-height:14px;">${c.unreadCount}</span></span>`;
  return `<span data-buyer="${esc(buyerUsername)}" style="color:#555;cursor:pointer;" title="Messages with ${esc(buyerUsername)}, none unread">&#9993;</span>`;
}
// Moves items from Shipped to Completed once they've sat shipped for the admin-configured
// number of days (default 7). This stands in for real delivery confirmation, which eBay's
// own API genuinely doesn't expose to sellers (only "shipped," not "delivered") — see the
// 3.0.4 changelog entry for the full reasoning.
function checkAutoComplete(){
  const days=(DB.fulfillmentSettings&&DB.fulfillmentSettings.autoCompleteDays)||7;
  const cutoff=Date.now()-days*86400000;
  let moved=0;
  fulfillmentItems("shipped").forEach(it=>{
    const shippedAt=it.fulfillment.shippedAt?new Date(it.fulfillment.shippedAt).getTime():null;
    if(shippedAt && shippedAt<=cutoff){ it.fulfillment.stage="completed"; it.fulfillment.completedAt=new Date().toISOString(); addHistory(it,"Auto-moved to Completed ("+days+" day(s) after shipping)"); moved++; }
  });
  if(moved){ save(); wimRefreshAll(); }
}
// eBay compliance: checks for any pending account-deletion notifications (delivered to the
// Supabase Edge Function, written to ebay_deletion_requests) and actually purges the
// matching buyer's data — username and shipping address — from any item's fulfillment
// record. Runs automatically rather than waiting for someone to click a button, since
// timely deletion is the actual point of this requirement, not just visibility into it.
// A local audit log (DB.deletionAuditLog) keeps a record of what was purged and when, for
// anyone checking later that this is actually working.
let deletionCheckInFlight=false;
async function checkEbayDeletionRequests(){
  if(deletionCheckInFlight) return;
  if(role()!=="admin" || !cloudSession || !CLOUD_ONLINE) return;
  deletionCheckInFlight=true;
  try{
    const r=await Cloud.getPendingDeletionRequests(cloudSession.session_token);
    if(!r.ok) return;
    let rows=[]; try{ rows=JSON.parse(r.body)||[]; }catch(e){}
    if(!rows.length) return;
    if(!Array.isArray(DB.deletionAuditLog)) DB.deletionAuditLog=[];
    for(const req of rows){
      const uname=(req.ebay_username||"").toLowerCase();
      let affected=0;
      if(uname){
        DB.items.forEach(it=>{
          if(it.fulfillment && it.fulfillment.buyer && it.fulfillment.buyer.toLowerCase()===uname){
            it.fulfillment.buyer=null; it.fulfillment.shipTo=null; it.fulfillment.buyerDataPurged=true; it.fulfillment.purgedAt=new Date().toISOString();
            addHistory(it,"Buyer data purged (eBay account deletion notice)"); affected++;
          }
        });
      }
      DB.deletionAuditLog.unshift({ id:req.id, ebayUsername:req.ebay_username, receivedAt:req.received_at, processedAt:new Date().toISOString(), itemsAffected:affected });
      try{ await Cloud.markDeletionProcessed(cloudSession.session_token, req.id); }catch(e){}
    }
    save();
  }catch(e){ /* not worth surfacing a transient network failure here — it'll retry next cycle */ }
  finally{ deletionCheckInFlight=false; }
}
async function pullRecentlySold(daysBack){
  if(!EBAY.ready()) throw new Error("Not connected to eBay.");
  const data=await EBAY.getOrders(daysBack||30);
  const orders=data.orders||[];
  let added=0, skipped=0;
  for(const order of orders){
    for(const li of (order.lineItems||[])){
      const orderLineKey=order.orderId+"::"+li.lineItemId;
      if(DB.pulledOrderIds.includes(orderLineKey)){ skipped++; continue; }
      const sku=li.sku;
      const localItem = sku ? DB.items.find(i=>i.sku===sku && itemStatus(i)!=="inactive" && itemStatus(i)!=="sold") : null;
      if(!localItem){ continue; } // no local match (no SKU, or SKU not found) — nothing to move; left for manual handling
      const f=ensureFulfillment(localItem);
      f.stage="recentlySold";
      f.orderId=order.orderId; f.lineItemId=li.lineItemId;
      f.buyer=order.buyer&&order.buyer.username||null;
      f.shipTo=order.fulfillmentStartInstructions&&order.fulfillmentStartInstructions[0]&&order.fulfillmentStartInstructions[0].shippingStep&&order.fulfillmentStartInstructions[0].shippingStep.shipTo||null;
      f.soldPrice=li.total&&li.total.value||null;
      f.soldAt=order.creationDate||new Date().toISOString();
      setItemStatus(localItem,"sold");
      DB.pulledOrderIds.push(orderLineKey);
      addHistory(localItem,"Sold on eBay (order "+order.orderId+") — moved to Recently Sold");
      added++;
    }
  }
  save(); wimRefreshAll();
  return { added, skipped, totalOrders:orders.length };
}

// Tracking number entry — this is the real, working step. Submitting it calls eBay's
// actual createShippingFulfillment (part of the Fulfillment API we already have access
// to), which marks the real order as shipped. Carrier is a simple text field for now
// rather than eBay's full carrier-code enum, kept deliberately simple for this pass.
function openMarkShippedDialog(items,onDone){
  if(!items.length) return;
  const id="mark-shipped"; if(openWindows[id]){ focusWin(openWindows[id].el); }
  const {body,close}=buildWindow({id,title:"Mark Shipped ("+items.length+")",width:460,height:320});
  body.innerHTML=`<div style="padding:16px;">
    <div class="note" style="margin-bottom:10px;">Updates the real eBay order to Shipped for ${items.length} item(s). The same tracking number and carrier will be applied to all selected — open them individually if they actually shipped separately.</div>
    <div class="ff" style="grid-template-columns:110px 1fr;margin-bottom:8px;"><label class="fld">Carrier</label><input class="txt" id="ms-carrier" placeholder="e.g. USPS, UPS, FedEx"></div>
    <div class="ff" style="grid-template-columns:110px 1fr;"><label class="fld">Tracking #</label><input class="txt" id="ms-tracking"></div>
    <div class="err" id="ms-err"></div>
    <div class="actions" style="margin-top:14px;"><button class="btn primary" id="ms-save">Mark Shipped</button><button class="btn" id="ms-cancel">Cancel</button></div></div>`;
  body.querySelector("#ms-cancel").onclick=close;
  body.querySelector("#ms-save").onclick=async ()=>{
    const carrier=body.querySelector("#ms-carrier").value.trim(), tracking=body.querySelector("#ms-tracking").value.trim();
    const err=body.querySelector("#ms-err"); err.style.color="#c0392b";
    if(!tracking){ err.textContent="Enter a tracking number."; return; }
    const allSimulated=items.every(it=>it.simulated);
    if(!allSimulated && !EBAY.ready()){ err.textContent="Not connected to eBay — can't update the real order right now."; return; }
    err.style.color="#555"; err.textContent="Updating eBay…";
    let okCount=0;
    for(const it of items){
      try{
        const f=it.fulfillment;
        if(!it.simulated) await EBAY.createShippingFulfillment(f.orderId, f.lineItemId, tracking, carrier.toUpperCase().replace(/\s+/g,"_")||"OTHER");
        f.stage="shipped"; f.shippedAt=new Date().toISOString(); f.trackingNumber=tracking;
        addHistory(it,(it.simulated?"[Simulated] ":"")+"Marked shipped (tracking "+tracking+")"); okCount++;
      }catch(e){ addHistory(it,"Failed to mark shipped on eBay: "+(e&&e.message||e)); }
    }
    save(); wimRefreshAll();
    if(okCount===items.length){ close(); if(onDone) onDone(); }
    else { err.style.color="#c0392b"; err.textContent=okCount+" of "+items.length+" updated — check item history for the rest."; }
  };
}

function openListingReview(){
  const id="listing-review"; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  const {body}=buildWindow({id,title:"Listing Review",width:900,height:600,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Items sent for listing review — supervisor and above only</span>`});
  let picked=new Set();
  function render(){
    const items=createdItems().sort((a,b)=>(a.listing&&a.listing.sentForReviewAt?new Date(a.listing.sentForReviewAt):new Date(0))-(b.listing&&b.listing.sentForReviewAt?new Date(b.listing.sentForReviewAt):new Date(0)));
    body.innerHTML=`<div style="padding:14px;display:flex;flex-direction:column;height:100%;box-sizing:border-box;">
      ${!items.length?`<div class="note">No items waiting for review. When a warehouse user clicks "Send Listing" on an item, it appears here.</div>`:``}

        <label class="chkrow"><span class="chk ${picked.size===items.length&&items.length?'on':''}" id="lr-selall"></span> Select All</label>
        <button class="btn primary" id="lr-list" ${!picked.size?"disabled":""}>List Item${picked.size===1?"":"s"} on eBay${picked.size?" ("+picked.size+")":""}</button>
        <button class="btn" id="lr-reject" ${!picked.size?"disabled":""}>Send Back</button>
        <span class="smallhint" id="lr-msg"></span></div>`:``}
      <div class="resultwrap" style="margin:0;flex:1;overflow:auto;"><table class="res"><thead><tr>
        <th style="width:30px;"></th><th>Item</th><th>SKU</th><th>Condition</th><th style="width:80px;">Price</th><th style="width:130px;">Sent for Review</th><th></th>
      </tr></thead><tbody id="lr-tb"></tbody></table></div></div>`;
    const tb=body.querySelector("#lr-tb");
    const selAll=body.querySelector("#lr-selall");
    if(selAll) selAll.onclick=()=>{ if(picked.size===items.length){ picked.clear(); } else { items.forEach(i=>picked.add(i.id)); } render(); };
    if(body.querySelector("#lr-list")) body.querySelector("#lr-list").onclick=async ()=>{
      const targets=items.filter(i=>picked.has(i.id)); if(!targets.length) return;
      const msg=body.querySelector("#lr-msg"); msg.style.color="#555"; msg.textContent="Listing "+targets.length+" item(s)…";
      let ok=0;
      for(const it of targets){
        try{
          // Use the existing eBay listing flow — same as clicking "List on eBay" directly,
          // just called programmatically from here instead of from the item page.
          if(it.simulated){ setItemStatus(it,"listed"); addHistory(it,"[Simulated] Listed (no real eBay call made)"); ok++; }
          else if(EBAY_ONLINE && it.listing && it.listing.ebayOfferId){
            const r=await publishToEbay(it); if(r&&r.ok){ setItemStatus(it,"listed"); addHistory(it,"Listed on eBay via Listing Review"); ok++; }
            else { addHistory(it,"Listing Review: eBay publish failed — left as Created"); }
          } else {
            // eBay not connected or no offer set up yet — still mark it as approved so it
            // doesn't sit in review indefinitely; it'll go through the eBay connection
            // flow next time someone opens it from the Manage Listings screen.
            setItemStatus(it,"listed"); addHistory(it,"Approved for listing (eBay not connected — mark as listed)"); ok++;
          }
        }catch(e){ addHistory(it,"Listing Review: error during publish: "+(e&&e.message||e)); }
      }
      picked.clear(); save(); wimRefreshAll();
      msg.style.color="#1f7244"; msg.textContent=ok+" item(s) listed."; render();
    };
    if(body.querySelector("#lr-reject")) body.querySelector("#lr-reject").onclick=()=>{
      const targets=items.filter(i=>picked.has(i.id)); if(!targets.length) return;
      targets.forEach(it=>{ setItemStatus(it,"active"); if(it.listing){ it.listing.readyToList=false; it.listing.sentForReviewAt=null; } addHistory(it,"Sent back from listing review — returned to Active"); });
      picked.clear(); save(); wimRefreshAll(); render();
    };
    items.forEach(it=>{
      const sentAt=it.listing&&it.listing.sentForReviewAt?new Date(it.listing.sentForReviewAt):null;
      const tr=document.createElement("tr");
      tr.innerHTML=`<td><span class="chk ${picked.has(it.id)?'on':''}" data-id="${esc(it.id)}"></span></td>
        <td style="font-size:12.5px;">${esc(it.desc||it.upc)}</td>

        <td style="font-size:12px;">${esc(it.condition||"—")}</td>

        <td><button class="btn sm" data-open="${esc(it.id)}">Open</button></td>`;
      tr.querySelector(`[data-id="${it.id}"]`).onclick=()=>{ if(picked.has(it.id)) picked.delete(it.id); else picked.add(it.id); render(); };
      tr.querySelector(`[data-open="${it.id}"]`).onclick=()=>openItemDetail(it,"edit");
      tb.appendChild(tr);
    });
  }
  render();

    fetchMsg.style.color="#555"; fetchMsg.textContent=wasFirstSync?"No sync point saved yet — pulling everything once…":"Pulling only what changed since the last sync…";
    const res=await syncDelta();
    if(!res.ok){ fetchMsg.style.color="#c0392b"; fetchMsg.textContent="Sync failed: "+(res.error||"").slice(0,200); return; }
    lastItems=res.rows;
    fetchMsg.style.color="#1f7244";
    fetchMsg.textContent = res.full
      ? (res.rows.length+" item(s) came back (first sync, so this one pulled everything — same as a full fetch)")
      : (res.rows.length+" item(s) changed since last sync — that's the only data this pull actually used");
    resultBox.textContent=JSON.stringify(res.rows,null,2);
    paintSyncPoint();
  };
  resetSyncBtn.onclick=()=>{
    if(!DB.cloud) DB.cloud={};
    DB.cloud.lastSyncedAt=null; save(); paintSyncPoint();
    fetchMsg.style.color="#555"; fetchMsg.textContent="Sync point cleared — next Sync Changes Only will pull everything, like a brand-new device.";
  };
  createBtn.onclick=async ()=>{
    if(!cloudSession) return;
    fetchMsg.style.color="#555"; fetchMsg.textContent="Creating a test item…";
    try{
      const data={ sku:"TEST-"+Math.floor(Math.random()*10000), description:"Test item from WIM", condition:"New", retail:"9.99", on_hand:1 };
      const res=await saveItemSmart(null, null, data);
      if(res.queued){ fetchMsg.style.color="#b07a1e"; fetchMsg.textContent="Couldn't reach the cloud right now — queued instead. It'll send automatically once connected again."; paintQueue(); return; }
      if(!res.ok){ fetchMsg.style.color="#c0392b"; fetchMsg.textContent="Create failed."; resultBox.textContent=(res.result&&res.result.body)||""; return; }
      let rows=[]; try{ rows=JSON.parse(res.result.body); }catch(e){}
      const createdRow=Array.isArray(rows)?rows[0]:rows;
      if(createdRow && createdRow.id) lastCreatedId=createdRow.id;
      claimBtn.disabled=!lastCreatedId;
      fetchMsg.style.color="#1f7244"; fetchMsg.textContent="Created. Click Fetch Items to see it in the list.";
      resultBox.textContent=res.result.body||"";
    }catch(e){ fetchMsg.style.color="#c0392b"; fetchMsg.textContent="Could not reach Supabase: "+(e&&e.message?e.message:e); }
  };
  conflictBtn.onclick=async ()=>{
    if(!cloudSession) return;
    if(!lastItems.length){ fetchMsg.style.color="#c0392b"; fetchMsg.textContent="Click Fetch Items first (need at least one real item to test against)."; return; }
    const target=lastItems[0];
    fetchMsg.style.color="#555"; fetchMsg.textContent="Trying to save an old version of \""+(target.description||target.sku||target.id)+"\" on purpose…";
    try{
      // Deliberately send a stale "expected" timestamp (one second before the real one) to
      // prove the server rejects it instead of silently overwriting — exactly the scenario
      // of two people editing the same item at once.
      const staleTimestamp=new Date(new Date(target.updated_at).getTime()-1000).toISOString();
      const r=await Cloud.upsertItem(cloudSession.session_token, target.id, staleTimestamp, { ...target, description:(target.description||"")+" (conflicting edit)" });
      if(!r.ok){ fetchMsg.style.color="#1f7244"; fetchMsg.textContent="✓ Correctly rejected — the safety check worked."; resultBox.textContent=r.body||""; return; }
      fetchMsg.style.color="#c0392b"; fetchMsg.textContent="⚠ This should have been rejected but wasn't — worth flagging.";
      resultBox.textContent=r.body||"";
    }catch(e){ fetchMsg.style.color="#c0392b"; fetchMsg.textContent="Could not reach Supabase: "+(e&&e.message?e.message:e); }
  };
  flushBtn.onclick=async ()=>{ queueMsg.style.color="#555"; queueMsg.textContent="Flushing…"; await flushCloudQueue(); paintQueue(); };
  claimBtn.onclick=async ()=>{
    if(!cloudSession||!lastCreatedId) return;
    lockMsg.style.color="#555"; lockMsg.textContent="Claiming…";
    try{
      const r=await Cloud.claimItem(cloudSession.session_token, lastCreatedId);
      if(!r.ok){ lockMsg.style.color="#c0392b"; lockMsg.textContent="Claim failed (HTTP "+r.status+")"; return; }
      let rows=[]; try{ rows=JSON.parse(r.body); }catch(e){}
      const row=rows&&rows[0];
      if(row&&row.claimed){ lockMsg.style.color="#1f7244"; lockMsg.textContent="Claimed it. Ping/Release now enabled."; pingBtn.disabled=false; releaseBtn.disabled=false; }
      else { lockMsg.style.color="#c0392b"; lockMsg.textContent="Already claimed by "+(row&&row.held_by)+" — correctly blocked."; }
    }catch(e){ lockMsg.style.color="#c0392b"; lockMsg.textContent="Could not reach Supabase: "+(e&&e.message?e.message:e); }
  };
  pingBtn.onclick=async ()=>{
    if(!cloudSession||!lastCreatedId) return;
    try{ const r=await Cloud.pingItemClaim(cloudSession.session_token,lastCreatedId); lockMsg.style.color=r.ok?"#1f7244":"#c0392b"; lockMsg.textContent=r.ok?"Heartbeat sent.":"Ping failed."; }
    catch(e){ lockMsg.style.color="#c0392b"; lockMsg.textContent="Could not reach Supabase: "+(e&&e.message?e.message:e); }
  };
  releaseBtn.onclick=async ()=>{
    if(!cloudSession||!lastCreatedId) return;
    try{ await Cloud.releaseItem(cloudSession.session_token,lastCreatedId); lockMsg.style.color="#1f7244"; lockMsg.textContent="Released."; pingBtn.disabled=true; releaseBtn.disabled=true; }
    catch(e){ lockMsg.style.color="#c0392b"; lockMsg.textContent="Could not reach Supabase: "+(e&&e.message?e.message:e); }
  };
  testFailsafeBtn.onclick=async ()=>{
    if(!cloudSession) return;
    failsafeMsg.style.color="#555"; failsafeMsg.textContent="Running…";
    try{ await runFailsafeBackup(null); failsafeMsg.style.color="#1f7244"; failsafeMsg.textContent="Done — check your Downloads folder and confirm the alert appeared."; }
    catch(e){ failsafeMsg.style.color="#c0392b"; failsafeMsg.textContent="Failed: "+(e&&e.message?e.message:e); }
  };
}

    <fieldset class="gb" style="margin:0 14px 14px;"><legend>Backup &amp; restore</legend>

      <div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn" id="bk-export">Export Backup</button><button class="btn" id="bk-import">Restore from Backup…</button><input type="file" id="bk-file" accept="application/json,.json" style="display:none;"></div>

  const msg=body.querySelector("#bk-msg");
  body.querySelector("#bk-export").onclick=()=>{ const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="WIM-backup-"+new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")+".json"; a.click(); URL.revokeObjectURL(url);
    DB.meta.lastBackupAt=new Date().toISOString(); save(); if(typeof renderBackupReminder==="function") renderBackupReminder(); msg.style.color="#1f7244"; msg.textContent="Backup downloaded."; };
  const file=body.querySelector("#bk-file"); body.querySelector("#bk-import").onclick=()=>file.click();
  file.onchange=()=>{ const f=file.files[0]; if(!f) return; const rd=new FileReader();
    rd.onload=()=>{ try{ const obj=JSON.parse(rd.result); if(!obj.items||!obj.users) throw new Error("Not a WIM backup file.");
      uiConfirm("Restore this backup? It will REPLACE all current data.",()=>{ DB=migrate(obj); DB.posDepts=STATIC.posDepts; DB.sizeUnits=STATIC.sizeUnits;
        msg.style.color="#1f7244"; msg.textContent="Restored. Reloading…"; idbPut(DB).catch(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(_){} }).then(()=>setTimeout(()=>location.reload(),500)); });
    }catch(e){ msg.style.color="#c0392b"; msg.textContent="Could not restore: "+(e.message||e); } }; rd.readAsText(f); file.value=""; };
}

/* ============================================================ SUB-CATEGORY MANAGER ============================================================ */
function openSubcatManager(cat){
  if(maybePopOutAction("subcatmgr", cat, "Sub Categories — "+cat)) return;
  const id="subcat-"+cat; if(openWindows[id]){ focusWin(openWindows[id].el); return; }
  if(!DB.subcats[cat]) DB.subcats[cat]=[{name:cat,ebayId:"",ebayName:"",aspects:[]}];
  const {body,close}=buildWindow({id,title:"Sub Categories — "+cat,width:680,height:560,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Sub categories carry the eBay mapping &amp; listing fields for ${esc(cat)}</span>`});
  let sel=null;
  function render(){
    body.innerHTML=`<div style="display:flex;height:100%;">
      <div style="width:230px;border-right:1px solid #d8d8d8;display:flex;flex-direction:column;">
        <div class="col-title" style="text-align:left;">Sub categories</div>
        <div class="listbox" id="sc-list" style="flex:1;"></div>
        <div style="padding:8px;display:flex;gap:6px;"><input class="txt" id="sc-new" placeholder="New sub category" style="flex:1;"><button class="btn sm" id="sc-add">Add</button></div>
      </div>
      <div style="flex:1;padding:12px 14px;overflow:auto;" id="sc-detail"></div></div>`;
    const list=body.querySelector("#sc-list");
    DB.subcats[cat].forEach(sc=>{ const li=document.createElement("div"); li.className="li"+(sel===sc.name?" sel":"");
      li.innerHTML=`${esc(sc.name)}${sc.name===cat?' <span class="smallhint">(default)</span>':''}${sc.ebayName?` <span class="badge ok">eBay</span>`:''}`;
      li.onclick=()=>{ sel=sc.name; render(); }; list.appendChild(li); });
    const det=body.querySelector("#sc-detail");
    if(!sel){ det.innerHTML=`<div class="smallhint">Select a sub category, or add one. Each sub category maps to one eBay category and defines the listing fields items in it will show.</div>`; }
    else { const sc=subcatObj(cat,sel); if(!sc){ sel=null; return render(); }
      det.innerHTML=`<div style="font-size:14px;font-weight:600;margin-bottom:10px;">${esc(sc.name)}</div>
        <div class="ff" style="grid-template-columns:130px 1fr;margin-bottom:8px;"><label class="fld">eBay category name</label><input class="txt" id="sc-ename" value="${esc(sc.ebayName||"")}" placeholder="e.g. Movies & TV > DVDs"></div>
        <div class="ff" style="grid-template-columns:130px 1fr;margin-bottom:8px;"><label class="fld">eBay category ID</label><input class="txt" id="sc-eid" value="${esc(sc.ebayId||"")}" placeholder="filled automatically in a later update"></div>
        <div class="col-title" style="text-align:left;margin-top:10px;">Listing fields (aspects)</div>
        <div class="smallhint" style="margin-bottom:6px;">These show on the item's landing page for this sub category. In a later update the magnifying-glass search fills these from eBay automatically.</div>
        <div id="sc-aspects"></div>
        <div style="display:flex;gap:6px;margin-top:6px;"><input class="txt" id="sc-aname" placeholder="Add a field (e.g. Genre)" style="flex:1;"><label class="chkrow" style="white-space:nowrap;"><span class="chk" id="sc-areq"></span> required</label><button class="btn sm" id="sc-aadd">Add field</button></div>
        <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn primary" id="sc-save">Save</button>${sc.name!==cat?'<button class="btn" id="sc-del">Delete sub category</button>':''}</div>
        <div class="err" id="sc-msg"></div>`;
      const aw=det.querySelector("#sc-aspects"); (sc.aspects||[]).forEach((a,i)=>{ const r=document.createElement("div"); r.style.cssText="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;";
        r.innerHTML=`<span style="flex:1;">${esc(a.name)} ${a.required?'<span class="badge warn">required</span>':''}</span>`;
        const x=document.createElement("button"); x.className="btn sm"; x.textContent="✕"; x.onclick=()=>{ sc.aspects.splice(i,1); save(); render(); }; r.appendChild(x); aw.appendChild(r); });
      if(!sc.aspects||!sc.aspects.length) aw.innerHTML=`<div class="smallhint">No fields yet.</div>`;
      const req=det.querySelector("#sc-areq"); req.onclick=()=>req.classList.toggle("on");
      det.querySelector("#sc-aadd").onclick=()=>{ const n=det.querySelector("#sc-aname").value.trim(); if(!n) return; if(!sc.aspects)sc.aspects=[];
        if(sc.aspects.some(a=>a.name.toLowerCase()===n.toLowerCase())){ det.querySelector("#sc-msg").textContent="That field already exists."; return; }
        sc.aspects.push({name:n,required:req.classList.contains("on"),type:"text"}); save(); render(); };
      det.querySelector("#sc-save").onclick=()=>{ sc.ebayName=det.querySelector("#sc-ename").value.trim(); sc.ebayId=det.querySelector("#sc-eid").value.trim(); save(); det.querySelector("#sc-msg").style.color="#1f7244"; det.querySelector("#sc-msg").textContent="Saved."; render(); };
      const del=det.querySelector("#sc-del"); if(del) del.onclick=()=>{ uiConfirm('Delete sub category "'+sc.name+'"? Items using it will fall back to the default.',()=>{
        DB.items.forEach(it=>{ if(it.section===cat&&it.subCategory===sc.name) it.subCategory=cat; });
        DB.subcats[cat]=DB.subcats[cat].filter(x=>x.name!==sc.name); sel=null; save(); render(); }); };
    }
    body.querySelector("#sc-add").onclick=()=>{ const n=body.querySelector("#sc-new").value.trim(); if(!n) return;
      if(DB.subcats[cat].some(s=>s.name.toLowerCase()===n.toLowerCase())){ return; }
      DB.subcats[cat].push({name:n,ebayId:"",ebayName:"",aspects:[]}); sel=n; save(); render(); };
  }
  render();
}

/* ============================================================ DESCRIPTION MANAGER ============================================================ */
function openDescriptionManager(){
  if(openWindows["desc-mgr"]){ focusWin(openWindows["desc-mgr"].el); return; }
  const {body}=buildWindow({id:"desc-mgr",title:"Description Manager",width:860,height:620,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Reusable listing descriptions, filtered by category</span>`});
  let sel=null, sortAsc=true;
  function render(){
    body.innerHTML=`<div style="display:flex;height:100%;">
      <div style="width:260px;border-right:1px solid #d8d8d8;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;gap:6px;padding:8px;"><b style="font-size:12.5px;flex:1;">Descriptions</b><button class="btn sm" id="dm-sort">Sort ${sortAsc?'A→Z':'Z→A'}</button><button class="btn sm" id="dm-new">+ New</button></div>
        <div class="listbox" id="dm-list" style="flex:1;"></div>
      </div>
      <div style="flex:1;padding:12px 14px;overflow:auto;" id="dm-detail"></div></div>`;
    const list=body.querySelector("#dm-list"); const arr=[...DB.descriptions].sort((a,b)=> sortAsc? a.title.localeCompare(b.title): b.title.localeCompare(a.title));
    if(!arr.length) list.innerHTML=`<div class="li" style="color:#888;">No descriptions yet. Click + New.</div>`;
    arr.forEach(d=>{ const li=document.createElement("div"); li.className="li"+(sel===d.id?" sel":"");
      const cats=(d.categories||[]).includes("*ALL*")?"All categories":(d.categories||[]).join(", ")||"—";
      li.innerHTML=`<b>${esc(d.title)}</b><br><span class="smallhint">${esc(cats)}</span>`; li.onclick=()=>{ sel=d.id; render(); }; list.appendChild(li); });
    body.querySelector("#dm-sort").onclick=()=>{ sortAsc=!sortAsc; render(); };
    body.querySelector("#dm-new").onclick=()=>{ const d={id:crypto.randomUUID(),title:"Untitled",body:"",categories:[],createdAt:new Date().toISOString()}; DB.descriptions.push(d); sel=d.id; save(); render(); };
    const det=body.querySelector("#dm-detail");
    if(!sel){ det.innerHTML=`<div class="smallhint">Select a description to edit, or create one. A description can appear under any categories you tick (or all of them), and you'll pick from them when listing an item.</div>`; return; }
    const d=DB.descriptions.find(x=>x.id===sel); if(!d){ sel=null; return render(); }
    const allOn=(d.categories||[]).includes("*ALL*");
    det.innerHTML=`<div class="ff" style="grid-template-columns:90px 1fr;margin-bottom:8px;"><label class="fld">Title</label><input class="txt" id="dm-title" value="${esc(d.title)}"></div>
      <div class="col-title" style="text-align:left;">Description text</div>
      <textarea id="dm-body" style="width:100%;height:170px;font-family:inherit;font-size:13px;padding:8px;border-top:1px solid #848484;border-left:1px solid #848484;border-right:1px solid #e9e9e9;border-bottom:1px solid #e9e9e9;">${esc(d.body)}</textarea>
      <div class="col-title" style="text-align:left;margin-top:10px;">Show under categories</div>
      <label class="chkrow"><span class="chk ${allOn?'on':''}" id="dm-all"></span> <b>Select All categories</b></label>
      <div id="dm-cats" style="columns:2;margin-top:4px;${allOn?'opacity:.45;pointer-events:none;':''}"></div>
      <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn primary" id="dm-save">Save</button><button class="btn" id="dm-del">Delete</button><span class="err" id="dm-msg" style="align-self:center;"></span></div>`;
    const catsHost=det.querySelector("#dm-cats");
    DB.sections.forEach(c=>{ const lab=document.createElement("label"); lab.className="chkrow"; lab.style.breakInside="avoid";
      const on=(d.categories||[]).includes(c); lab.innerHTML=`<span class="chk ${on?'on':''}"></span> ${esc(c)}`;
      lab.querySelector(".chk").onclick=()=>lab.querySelector(".chk").classList.toggle("on"); lab.dataset.cat=c; catsHost.appendChild(lab); });
    const allChk=det.querySelector("#dm-all"); allChk.onclick=()=>{ allChk.classList.toggle("on"); render2KeepSel(d.id); };
    function render2KeepSel(id){ // re-render keeping selection (toggle All affects layout)
      d.categories = allChk.classList.contains("on") ? ["*ALL*"] : collectCats(); d.title=det.querySelector("#dm-title").value; d.body=det.querySelector("#dm-body").value; save(); sel=id; render(); }
    function collectCats(){ return [...catsHost.querySelectorAll("label")].filter(l=>l.querySelector(".chk").classList.contains("on")).map(l=>l.dataset.cat); }
    det.querySelector("#dm-save").onclick=()=>{ const newBody=det.querySelector("#dm-body").value; const changed = newBody!==d.body;
      d.title=det.querySelector("#dm-title").value.trim()||"Untitled"; d.body=newBody;
      d.categories = allChk.classList.contains("on") ? ["*ALL*"] : collectCats();
      const affected = changed ? DB.items.filter(it=>it.listing&&it.listing.status==="listed"&&it.listing.descriptionId===d.id) : [];
      const finish=()=>{ save(); det.querySelector("#dm-msg").style.color="#1f7244"; det.querySelector("#dm-msg").textContent="Saved."; render(); };
      if(affected.length){ uiChoose("This description is on "+affected.length+" active listing(s). What would you like to do?",
        [ {label:"View affected listings",onClick:()=>{ openManageListings(); finish(); }},
          {label:"Push through to live listings",primary:true,onClick:()=>{ affected.forEach(it=>addHistory(it,"Listing description updated (pushed): "+d.title)); finish(); uiAlert("Marked "+affected.length+" listing(s) to update. The actual eBay revise call runs in the publishing update."); }},
          {label:"Just save",onClick:finish} ]); }
      else finish(); };
    det.querySelector("#dm-del").onclick=()=>{ uiConfirm('Delete description "'+d.title+'"?',()=>{ DB.descriptions=DB.descriptions.filter(x=>x.id!==d.id); sel=null; save(); render(); }); };
  }
  render();
}

      const tdL=document.createElement("td"); tdL.className="cc"; const b=document.createElement("button"); b.className="btn sm"; b.textContent="List"; b.onclick=()=>openItemDetail(it,"edit"); tdL.appendChild(b); tr.appendChild(tdL);
      const tdR=document.createElement("td"); tdR.className="cc"; const x=document.createElement("button"); x.className="btn sm"; x.textContent="Remove"; x.onclick=()=>{ it.listing.readyToList=false; addHistory(it,"Removed from Ready to List"); save(); render(); wimRefreshAll(); }; tdR.appendChild(x); tr.appendChild(tdR);
      tr.ondblclick=()=>openItemDetail(it,"edit"); tb.appendChild(tr); });
  }

const EBAY_SCOPE_APP="https://api.ebay.com/oauth/api_scope";
// Parses eBay's GetFeedback XML response (Trading API) into a plain JS object. Real
// Positive/Neutral/Negative + comment per entry, plus the account-wide positive
// percentage — there's no per-item 1-5 star rating in eBay's actual data, so this
// deliberately doesn't try to invent one.
function parseFeedbackXml(xmlText){
  const doc=new DOMParser().parseFromString(xmlText,"text/xml");
  const txt=(tag,node)=>{ const el=(node||doc).getElementsByTagName(tag)[0]; return el?el.textContent:""; };
  const pos=parseInt(txt("PositiveFeedbackCount")||"0",10)||0;
  // eBay's classic feedback percentage: positive / (positive + negative), neutral excluded —
  // matches how eBay itself displays this number on a seller's profile.
  const neg=Array.from(doc.getElementsByTagName("NegativeFeedbackPeriodArray")[0]?.getElementsByTagName("FeedbackPeriod")||[])
    .find(p=>txt("PeriodInDays",p)==="0");
  const negCount=neg?parseInt(txt("Count",neg)||"0",10):0;
  const totalForPct=pos+negCount;
  const positivePercent=totalForPct>0?Math.round((pos/totalForPct)*1000)/10:null;
  const entries=Array.from(doc.getElementsByTagName("FeedbackDetail")).map(node=>({
    commentingUser: txt("CommentingUser",node),
    commentText: txt("CommentText",node),
    commentType: txt("CommentType",node), // Positive | Neutral | Negative
    commentTime: txt("CommentTime",node),
    itemId: txt("ItemID",node)
  }));
  return { positivePercent, feedbackScore: txt("FeedbackScore"), entries };
}

  uploadPicture(b64,name){ return wimDesktop.invoke("ebay_upload_picture",{ env:(DB.ebay.env||"sandbox"), appId:DB.ebay.appId, certId:DB.ebay.certId, refreshToken:DB.ebay.refreshToken, imageBase64:b64, pictureName:name||"WIM photo" }); },

/* ============================================================ LISTED, NO SKU (pull your own eBay listings into WIM) ============================================================ */
function ebayCondLabel(c){ const m={NEW:"New",LIKE_NEW:"Like New",NEW_OTHER:"New (other)",NEW_WITH_DEFECTS:"New with defects",CERTIFIED_REFURBISHED:"Certified - Refurbished",EXCELLENT_REFURBISHED:"Excellent - Refurbished",VERY_GOOD_REFURBISHED:"Very Good - Refurbished",GOOD_REFURBISHED:"Good - Refurbished",SELLER_REFURBISHED:"Seller refurbished",USED_EXCELLENT:"Used - Excellent",USED_VERY_GOOD:"Used - Very Good",USED_GOOD:"Used - Good",USED_ACCEPTABLE:"Used - Acceptable",FOR_PARTS_OR_NOT_WORKING:"For parts or not working"}; return m[c]||c||""; }
// Best-effort mapping from WIM's free-text condition to eBay's official condition enum.
// Always returns *something* usable (falls back to USED_GOOD) but flags low-confidence
// guesses via ebayCondGuessed() so the Publish screen can show a warning instead of
// silently sending a possibly-wrong condition to eBay.
function ebayCondEnum(text){
  const t=(text||"").toLowerCase().trim();
  if(/for parts|not working|spare/.test(t)) return "FOR_PARTS_OR_NOT_WORKING";
  if(/new with defects/.test(t)) return "NEW_WITH_DEFECTS";
  if(/new \(other\)|new other|open box/.test(t)) return "NEW_OTHER";
  if(/certified.*refurb/.test(t)) return "CERTIFIED_REFURBISHED";
  if(/excellent.*refurb/.test(t)) return "EXCELLENT_REFURBISHED";
  if(/very good.*refurb/.test(t)) return "VERY_GOOD_REFURBISHED";
  if(/good.*refurb/.test(t)) return "GOOD_REFURBISHED";
  if(/refurb/.test(t)) return "SELLER_REFURBISHED";
  if(/like new/.test(t)) return "LIKE_NEW";
  if(/brand new|^new$/.test(t)) return "NEW";
  if(/used.*excellent|^excellent$/.test(t)) return "USED_EXCELLENT";
  if(/very good/.test(t)) return "USED_VERY_GOOD";
  if(/acceptable/.test(t)) return "USED_ACCEPTABLE";
  if(/good/.test(t)) return "USED_GOOD";
  if(/new/.test(t)) return "NEW";
  return "USED_GOOD";
}
function ebayCondGuessed(text){ const t=(text||"").toLowerCase().trim();
  return !/for parts|not working|spare|new with defects|new \(other\)|new other|open box|refurb|like new|brand new|^new$|excellent|very good|acceptable|^good$|new/.test(t); }
// Builds eBay's public sold-listings search URL — same thing the "Sold Items" checkbox
// on eBay's own site produces. No scraping happens here; this just opens a normal browser
// tab to a normal webpage, the same as a person typing the search in themselves.
function ebaySoldSearchUrl(query){ return "https://www.ebay.com/sch/i.html?_nkw="+encodeURIComponent(query||"")+"&LH_Sold=1&LH_Complete=1"; }
// Parses text copy-pasted from an eBay sold-listings search page into structured rows.
// Built directly against a real sample of what that page's text looks like when copied —
// each sold item reliably has a "Sold <Month> <Day>, <Year>" line, which is used as the
// anchor (this also conveniently filters out "Shop on eBay" ads and other non-sold filler,
// since those blocks never have a Sold line at all).
const EBAY_COND_WORDS=["Brand New","Pre-Owned","New (Other)","New (other)","New with tags","New with defects","Open box","For parts or not working","Certified - Refurbished","Certified Refurbished","Seller refurbished","Manufacturer refurbished","Like New","Very Good","Acceptable","Used"];
function parseEbaySoldPaste(raw){
  const lines=(raw||"").split(/\r?\n/).map(l=>l.trim());
  const soldRe=/^Sold\s+([A-Za-z]{3,9}\.?\s+\d{1,2},\s*\d{4})$/;
  const priceLineRe=/^\$([\d,]+\.\d{2})(?:\$[\d,]+\.\d{2})?(?:\s*to\s*\$[\d,]+\.\d{2})?$/;
  const isLotRe=/\sto\s\$/;
  const out=[];
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(soldRe); if(!m) continue;
    let p=i-1; while(p>=0 && !lines[p]) p--;
    const titleLine=(lines[p]||"").trim();
    if(!titleLine || /^Sold\s/.test(titleLine)) continue;
    let condition="", priceStr="", isLot=false;
    // line i+1 is reliably the duplicate "<title>Opens in a new window or tab" line — skip it
    for(let j=i+2; j<lines.length && j<i+16; j++){
      const L=lines[j]; if(!L) continue;
      if(/^Sell one like this$/i.test(L)) break;
      if(!condition){ const hit=EBAY_COND_WORDS.find(w=>L.toLowerCase().startsWith(w.toLowerCase())); if(hit){ condition=hit; continue; } }
      if(!priceStr){ const pm=L.match(priceLineRe); if(pm){ priceStr=pm[1].replace(/,/g,""); isLot=isLotRe.test(L); continue; } }
    }
    if(!priceStr) continue; // couldn't find a usable price for this block — skip rather than guess
    const d=new Date(m[1]);
    out.push({ title:titleLine.replace(/Opens in a new window or tab$/i,"").trim(), condition, price:priceStr, soldDate:isNaN(d)?"":d.toISOString(), isLot });
  }
  return out;
}
// eBay's Seller Hub "Research products" tool gives richer aggregated data per listing
// (avg sold price, total units sold, last-sold date) than the plain sold-search page —
// but it has no URL to deep-link a search term into, and condition is baked into the
// title text rather than a separate field. Built and verified against a real sample.
const SH_COND_PHRASES=["very good","like new","brand new","new with tags","new with defects","new (other)","acceptable","excellent","good","fair","poor"];
function inferConditionFromTitle(title){
  const t=(title||"").toLowerCase();
  for(const p of SH_COND_PHRASES){ if(t.includes(p)) return p.replace(/\b\w/g,c=>c.toUpperCase()); }
  return "";
}
function parseEbaySellerHubResearch(raw){
  const lines=(raw||"").split(/\r?\n/).map(l=>l.trim());
  const anchorRe=/^,\s*preview full size image$/i;
  const priceRe=/^\$([\d,]+\.\d{2})$/;
  const dateRe=/^[A-Za-z]{3,9}\.?\s+\d{1,2},\s*\d{4}$/;
  const out=[];
  for(let i=0;i<lines.length;i++){
    if(!anchorRe.test(lines[i])) continue;
    let p=i-1; while(p>=0 && !lines[p]) p--;
    const title=(lines[p]||"").trim(); if(!title) continue;
    let j=i+1;
    if(lines[j]===title) j++; // duplicate title line
    if(/^Edit$/i.test(lines[j]||"")) j++;
    while(lines[j]==="") j++; // blank line before the numbers start
    const avgPriceM=(lines[j]||"").match(priceRe); if(!avgPriceM) continue; const avgPrice=avgPriceM[1].replace(/,/g,""); j++;
    j++; // format ("Fixed price" etc.) — not needed for pricing, skip
    const avgShipM=(lines[j]||"").match(priceRe); const avgShip=avgShipM?avgShipM[1]:""; j++;
    j++; // "N% Free shipping" line
    const totalSoldLine=lines[j]||""; const totalSold=/^\d+$/.test(totalSoldLine)?parseInt(totalSoldLine,10):null; j++;
    j++; // item sales $ total — not needed individually
    j++; // bids
    const dateLine=lines[j]||""; let dateLastSold="";
    if(dateRe.test(dateLine)){ const d=new Date(dateLine); if(!isNaN(d)) dateLastSold=d.toISOString(); }
    out.push({ title, condition:inferConditionFromTitle(title), price:avgPrice, avgShip, totalSold, soldDate:dateLastSold });
  }
  return out;
}
async function pullNewListings(after,silent){
  if(!EBAY.ready()){ if(!silent) uiAlert("Not connected to eBay yet — click Connect next to Live Mode (or set up keys in Configuration → eBay Connection if you haven't yet)."); return; }
  if(!Array.isArray(DB.ebay.filedSkus)) DB.ebay.filedSkus=[];
  const prog=silent?null:uiModal("Pulling from eBay",`<div id="pnl-prog" style="font-size:13px;">Contacting eBay…</div>`,[]);
  const set=t=>{ if(silent) return; const e=document.getElementById("pnl-prog"); if(e) e.textContent=t; };
  try{
    const inv=await EBAY.user("/sell/inventory/v1/inventory_item?limit=100&offset=0", EBAY_SCOPE_INV);
    if(!inv.ok){ if(!silent){ closeAllModals(); uiAlert("eBay inventory read failed (HTTP "+inv.status+"): "+(inv.body||"").slice(0,300)); } return; }
    const items=(JSON.parse(inv.body).inventoryItems)||[];
    const known=new Set(); DB.items.forEach(x=>{ if(x.listing&&x.listing.ebaySku) known.add(x.listing.ebaySku); if(x.sku) known.add(x.sku); });
    (DB.ebay.filedSkus||[]).forEach(s=>known.add(s));
    const candidates=[];
    for(let n=0;n<items.length;n++){ const ei=items[n]; const sku=ei.sku; if(known.has(sku)) continue;
      set("Reading "+(n+1)+" of "+items.length+"…");
      let price="", qty="1", offerId=null, categoryId="";
      try{ const off=await EBAY.user("/sell/inventory/v1/offer?sku="+encodeURIComponent(sku), EBAY_SCOPE_INV);
        if(off.ok){ const o=((JSON.parse(off.body).offers)||[])[0]; if(o){ offerId=o.offerId; price=(o.pricingSummary&&o.pricingSummary.price&&o.pricingSummary.price.value)||""; qty=(o.availableQuantity!=null?String(o.availableQuantity):"1"); categoryId=o.categoryId||""; } } }catch(e){}
      const p=ei.product||{};
      candidates.push({ ebaySku:sku, offerId, title:p.title||sku, condEnum:ei.condition||"", condLabel:ebayCondLabel(ei.condition), price, qty, categoryId, images:(p.imageUrls||[]).slice(), thumb:(p.imageUrls||[])[0]||"" });
    }
    DB.pulledListings=candidates; DB.ebay.lastPullAt=new Date().toISOString(); save();
    if(!silent) closeAllModals();
    if(after) after(candidates);
  }catch(e){ if(!silent){ closeAllModals(); uiAlert("Could not pull listings: "+(e&&e.message?e.message:e)); } }
}

// Creates real WIM item(s) from a pulled eBay listing, headlessly — used by the bulk
// Import button. Reuses the exact same slot-allocation and item-numbering functions the
// interactive Add Item screen uses (allocateMulti/allocateInSlot, genItemNumber), so a
// quantity > 1 listing becomes that many individually-numbered, individually-slotted item
// records, the same way it always has — not a single record with a quantity field.
// Returns { ok:true, created:[...] } or { ok:false, error:"..." } without creating anything
// partial if a row can't actually be placed.
function createItemFromListing(c, section, subCategory, manualSlotValue){
  const qty=Math.max(1,parseInt(c.qty,10)||1);
  let placements;
  if(manualSlotValue){
    const slotV=normSlot(manualSlotValue);
    if(!slotV || !slotById(slotV)) return { ok:false, error:"Slot \""+(manualSlotValue||"")+"\" doesn't exist." };
    placements=allocateInSlot(slotV,qty,null);
    if(!placements) return { ok:false, error:"Slot "+slotV+" doesn't have room for "+qty+" unit(s)." };
  } else {
    placements=allocateMulti(qty,null,section);
    if(placements.length<qty) return { ok:false, error:"No slot for \""+section+"\" has room for "+qty+" unit(s) (found "+placements.length+")." };
  }

async function pullActiveListings(after){
  if(!EBAY.ready()){ uiAlert("Not connected to eBay yet — click Connect next to Live Mode (or set up keys in Configuration → eBay Connection if you haven't yet)."); return; }
  const prog=uiModal("Pulling from eBay",`<div id="pull-prog" style="font-size:13px;">Contacting eBay…</div>`,[]);
  const set=t=>{ const e=document.getElementById("pull-prog"); if(e) e.textContent=t; };
  try{
    const inv=await EBAY.user("/sell/inventory/v1/inventory_item?limit=100&offset=0", EBAY_SCOPE_INV);
    if(!inv.ok){ closeAllModals(); uiAlert("eBay inventory read failed (HTTP "+inv.status+"): "+(inv.body||"").slice(0,300)); return; }
    const ij=JSON.parse(inv.body); const items=ij.inventoryItems||[];
    let updated=0, unmatched=[];
    for(let n=0;n<items.length;n++){ const ei=items[n]; const sku=ei.sku; set("Reconciling "+(n+1)+" of "+items.length+" ("+sku+")…");
      let price="", qty="", status="listed", offerId=null;
      try{ const off=await EBAY.user("/sell/inventory/v1/offer?sku="+encodeURIComponent(sku), EBAY_SCOPE_INV);
        if(off.ok){ const oj=JSON.parse(off.body); const o=(oj.offers||[])[0]; if(o){ offerId=o.offerId; price=(o.pricingSummary&&o.pricingSummary.price&&o.pricingSummary.price.value)||""; qty=(o.availableQuantity!=null?String(o.availableQuantity):""); if(o.listing&&o.listing.listingStatus&&o.listing.listingStatus!=="ACTIVE") status="delisted"; } } }catch(e){}
      const wim=DB.items.find(x=> (x.listing&&x.listing.ebaySku===sku) || x.sku===sku || x.upc===sku );
      if(wim){ if(!wim.listing) wim.listing={}; wim.listing.ebaySku=sku; if(offerId) wim.listing.ebayOfferId=offerId;
        wim.listing.title=(ei.product&&ei.product.title)||wim.listing.title||wim.desc; if(price) wim.listing.price=price; if(qty) wim.listing.qty=qty;
        wim.listing.status=status; addHistory(wim,"Pulled from eBay (SKU "+sku+")"); updated++; }
      else unmatched.push(sku);
    }
    save(); if(typeof refreshSearchWindows==="function") refreshSearchWindows();
    closeAllModals();
    let m="Pulled "+items.length+" eBay inventory item(s).\nUpdated "+updated+" matching WIM item(s).";
    if(unmatched.length) m+="\n"+unmatched.length+" eBay SKU(s) had no WIM match: "+unmatched.slice(0,12).join(", ")+(unmatched.length>12?"…":"");
    uiAlert(m); if(after) after();
  }catch(e){ closeAllModals(); uiAlert("Could not pull listings: "+(e&&e.message?e.message:e)); }
}

// Real eBay seller feedback (Positive/Neutral/Negative + comment — eBay genuinely has no
// per-item star rating). Only shows feedback for items that have actually gone through
// WIM's own fulfillment workflow (matched by eBay listing ID), not a bulk pull of
// everything ever sold, per the original requirement.
function openReviews(){
  if(openWindows["reviews"]){ focusWin(openWindows["reviews"].el); return; }
  const {body}=buildWindow({id:"reviews",title:"Reviews",width:920,height:600});
  let range="all";
  // Start from whatever's already cached locally (from a previous pull), so the screen
  // isn't empty just because nobody's clicked Pull yet this session — and so opening this
  // screen at all is what marks things as "seen" for the Feedback widget.
  let allEntries=Object.entries(DB.cachedFeedback).map(([itemId,v])=>({ itemId, ...v }));
  if(allEntries.length){
    let changed=false;
    allEntries.forEach(e=>{ if(!DB.feedbackSeenIds.includes(e.itemId)){ DB.feedbackSeenIds.push(e.itemId); changed=true; } });
    if(changed){ save(); wimRefreshAll(); }
  }
  function matchedItem(itemId){ return DB.items.find(i=>i.listing && i.listing.ebayListingId===itemId && i.fulfillment); }
  function render(){
    const cutoffDays = range==="0-30"?30 : range==="30-60"?60 : range==="90"?90 : null;
    const since = cutoffDays!=null ? Date.now()-cutoffDays*86400000 : null;
    const rows = allEntries.filter(e=>{

    out+="\n[3] URL-encoding check (a token minted from an un-decoded auth code fails like this):\n";
    const hasPct = tk.indexOf("%")>=0;
    out+="    Token contains '%': "+(hasPct?"YES → likely URL-encoded, this is probably the cause":"no")+"\n";
    let dec=tk; try{ if(hasPct) dec=decodeURIComponent(tk); }catch(e){ dec=tk; out+="    (decode failed: "+e+")\n"; }
    if(dec!==tk){
      try{ const r=await wimDesktop.invoke("ebay_get_user",{env,appId:ap,certId:ce,refreshToken:dec,scope:EBAY_SCOPE_INV,marketplace:EBAY.mkt(),path:"/sell/inventory/v1/inventory_item?limit=1"});
        out+="    decoded-token test: HTTP "+r.status+(r.ok?"  ✓✓ DECODING FIXES IT — WIM will auto-fix this on save":" still failing")+"\n    "+(r.body||"").slice(0,160)+"\n"; }
      catch(e){ out+="    decoded test threw: "+(e&&e.message?e.message:e)+"\n"; }
    } else { out+="    (no % found, so URL-encoding is not the cause here)\n"; }
    showCopyable("Messages diagnostics (copy & paste this to me)", out);
  }
}

/* ============================================================ LIVE: LISTING REPORT ============================================================ */
function openListingReport(){
  if(openWindows["listing-report"]){ focusWin(openWindows["listing-report"].el); return; }
  const {body}=buildWindow({id:"listing-report",title:"Listing Report",width:680,height:460,
    toolbar:`<span style="font-size:12px;color:#555;padding-left:4px;">Snapshot of your Live inventory</span>`});
  const listed=listedItems().length, delisted=delistedItems().length, unlisted=unlistedActive().length;
  const value=listedItems().reduce((s,it)=>s+(parseFloat(it.listing.price)||0),0);
  body.innerHTML=`<div style="padding:18px;">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:420px;">
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Listed</div><div style="font-size:22px;font-weight:600;">${listed}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Delisted</div><div style="font-size:22px;font-weight:600;">${delisted}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Active, not listed</div><div style="font-size:22px;font-weight:600;">${unlisted}</div></div>
      <div style="background:#eef1f4;border-radius:6px;padding:12px;"><div class="smallhint">Listed price total</div><div style="font-size:22px;font-weight:600;">$${value.toFixed(2)}</div></div>
    </div>
    <p class="smallhint" style="margin-top:16px;">Sales/fulfillment figures appear here once the publishing &amp; fulfillment update is in.</p></div>`;
}

/* ---------- clock & boot ---------- */
function tick(){ const d=new Date(); const c=document.getElementById("clock"); if(c) c.innerHTML=`${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}<br>${d.toLocaleDateString()}`; }
setInterval(tick,1000); tick();
boot();
