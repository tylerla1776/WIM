  ["3.0.10","Real bug-fix batch from testing v3.0.3-3.0.9. Reviews screen was completely broken -- the Pull Feedback button lived outside the area the code could actually reach, which crashed the screen silently before it ever rendered (fixed by moving it into the same render pattern every other screen already uses). Simulation Mode: Load Inventory by Seller ID now looks up the real eBay category instead of defaulting to a fake placeholder category that showed as General; turning Simulation Mode off now actually hides simulated items everywhere (Item Maintenance, Catalog, Fulfillment, Ready to List, Listing Review) instead of leaving them visible -- this was a real gap where the toggle never touched any of the item-listing logic at all. Find on eBay button no longer shows on items that already have real listing data (loaded from a seller, or bulk-imported). Fixed a genuine CSS bug where form fields (Slot, Group, etc.) could overflow their panel when their content was wide -- form controls do not automatically stretch to fill a grid cell without being told to. The tree and the dashboard widgets were fully redundant with each other -- clicking a tree item replaced the widgets with the exact same action list already clickable inline in the tree itself; tree clicks no longer overwrite the dashboard, which now stays visible. One related item not yet resolved: Add Inventory and Sell Inventory still open a two-level submenu that has no tree equivalent yet and will still temporarily cover the dashboard when used -- calling this out rather than claiming it is fully solved. Real separate OS windows for every screen, multi-photo management, and a fully lived-in Simulation Mode with generated history are real, larger asks -- intentionally not built in this pass, to be scoped separately."],
  ["3.0.9","Phase 7, step 2: the real data migration tool. New Cloud Data Migration screen (Configuration, admin only) -- Preview (Dry Run) shows exactly what would be uploaded and what already exists in the cloud (matched by Warehouse SKU) without sending anything; Run Migration then actually uploads, with live progress and a clear pass/fail summary. Safe to re-run if interrupted partway -- already-migrated items are detected and skipped on a second pass rather than duplicated. Simulated items and deleted items are automatically excluded. Also fixed a real gap found while building this: upsert_item() (the cloud function every item save goes through) was never updated after the v10 schema catch-up added item_number, status, fulfillment, and simulated columns -- meaning any save, not just this migration tool, would have silently lost that data. This is the tool itself; actually running it on real data still needs to happen at the computer holding that data, not from here."],
  ["3.0.8","Phase 7, step 1: cloud schema catch-up. SQL-only -- no app behavior changes in this update, nothing reads or writes these new columns yet, on purpose, the same low-risk-first approach used for every other piece of this project. The cloud database's items table now has columns for everything Phases 1-6 actually added locally that it had nowhere to put: the real Item Number (was missing entirely), the real status field, the whole Fulfillment workflow's data, and a simulated flag. Staff records gained columns for supervisory level and individual permission overrides. Teams gained columns to hold the supervisory level definitions and feature registry as a whole, matching the exact shape already used locally. login() now also returns level/permission data. The actual per-screen migration -- making real screens read and write through these columns instead of local storage -- is the next, separate piece of work."],
  ["3.0.7","Phase 8: eBay Listing Import redesign. Listed, no SKU now has real bulk import alongside the existing one-at-a-time File flow: checkboxes per row, a blue Import Listing(s) button, and inline Category/Sub-Category pickers that auto-fill whenever eBay's real category ID on that listing has already been mapped to a WIM subcategory before (a genuine ID-based lookup, not a guess from the title text) -- fixed a real gap where that category ID was already being fetched from eBay but never actually saved anywhere. A Manually Slot checkbox per row works the same as it does on the regular item screen. Quantity-aware: a listing with quantity 3 creates three real, individually-numbered, individually-slotted item records (reusing the exact same slot-allocation and item-numbering functions every other part of WIM uses), not one record with a number in a field. The one-at-a-time File button stays available specifically because it is the one with duplicate-item detection, which does not translate cleanly into a bulk flow -- bulk import always creates fresh items."],
  ["3.0.6","Phase 6: Simulation Mode. New admin-only Simulation Mode screen (Configuration) -- a toggle that, once on, unlocks Load Inventory by Seller ID (a real, public eBay Browse API pull of another seller's active listings, useful for demoing WIM with a business partner's actual catalog), Quick Test Item creation, Simulate a Sale (pushes a test item through Recently Sold -> Shipping -> Completed using the exact same real screens and buttons everything else uses), and simulated buyer messages. Everything created here is tagged simulated and clearly marked with a SIMULATED badge on the item page so it is never ambiguous. The real eBay-calling buttons elsewhere (Mark Shipped, List Item in Listing Review) now check that tag and skip the real API call for simulated items, instead of either failing or doing something real by mistake. Since the per-screen cloud migration has not happened yet, simulated data was already local-only by default -- the tag is there so that future cloud-sync work can filter it out once that migration exists. Clear All Simulated Data wipes it without touching real inventory."],
  ["3.0.5","Phase 4: Messaging, Reviews & Widgets. Real finding worth knowing: eBay's seller feedback is genuinely Positive/Neutral/Negative plus a comment, not a 1-5 star rating -- confirmed against eBay's own API docs -- so Reviews uses that real system, with the actual account-wide feedback percentage standing in for an average score. New Reviews screen (Communication tree) pulls real feedback via eBay's older Trading API (a structurally different XML-based call, newly added as ebay_trading_call), filtered to only items that have actually gone through fulfillment, with date-range filtering and click-through to the item. The envelope icon across Recently Sold, Shipping, and Completed is now fully functional, not decorative: grey when no known messages, dark grey with messages but nothing unread, bold with a real unread count when there is -- powered by a lightweight per-buyer cache built from a single conversation pull every 5 minutes in Live mode, not one API call per row. Clicking any envelope opens Messages scoped straight to that buyer. Completed tab's Feedback and Rating columns are now real, sourced from the same local feedback cache Reviews populates. New Feedback and Customer Reviews dashboard widgets, plus an Items Sold, Not Complete exception widget breaking down what is still mid-fulfillment by stage. One honest gap: these new widgets follow the existing (older) per-widget role check dashboard widgets have always used, not the newer Supervisory Maintenance permission system from Phase 1 -- migrating the whole dashboard widget system onto that newer system is its own separate piece of work, not done here."],
  ["3.0.4","Phase 3c: Completed tab and the eBay compliance listener, together. Real finding worth knowing: eBay genuinely does not expose a delivery-confirmation event to sellers -- only listed/sold/paid/shipped, confirmed directly against eBay's own developer docs and forum -- so items move from Shipped to Completed automatically after an admin-configurable number of days (default 7) instead of waiting on a notification that does not exist. Completed tab adds the Catalog button (archives the record for real, fixing a related bug where sold items were incorrectly already visible in the Catalog screen before being explicitly sent there), 14-day red-text aging, and structural Feedback/Review/envelope columns (full Reviews and messaging data come in Phase 4, these are placeholders, not fake-working buttons). Compliance: a real Supabase Edge Function (deploy via copy/paste in Supabase's dashboard, no command line needed) receives eBay's actual account-deletion notifications -- WIM automatically purges that buyer's username and shipping address from any item record within a couple of minutes, with a new admin-only eBay Compliance Log screen as the audit trail. eBay dev-app setup for this is a real, separate step -- see the companion instructions."],
  ["3.0.3","Phase 3b: Shipping. New Shipping screen (Fulfillment tree) with Ready to Ship and Shipped tabs. Move to Shipping in Recently Sold sends items here. Mark Shipped is genuinely real -- it calls eBay's actual Fulfillment API to update the real order with a tracking number and carrier, and items auto-move to the Shipped tab once that succeeds. Print Label(s) currently prints a packing slip on your own printer using the real buyer shipping address and order info -- actually generating an eBay shipping label needs the separate, whitelist-only Logistics API (not something a developer account can simply request the way OneDrive/Google Drive access worked), so this is an honest, useful placeholder rather than a button that would quietly fail for everyone. Select-all checkboxes throughout."],
  ["3.0.2","Recently Sold now checks for new sales automatically every 5 minutes while WIM is in Live mode -- no need to click Pull Recently Sold to catch a sale. Stops checking the moment Live mode closes, and fails silently in the background (the manual button still surfaces real errors when someone is actually looking). Also redesigned the (#) count indicators on Ready to List, Listing Review, and Recently Sold: instead of a red circle badge, the count now reads as plain text matching the label itself, e.g. \"Ready to List (3)\" -- same idea, lighter visual treatment."],
  ["3.0.1","Phase 3a: the first piece of the Fulfillment workflow. New Fulfillment tree (Warehouse mode, between Manage Inventory and Discrepancies, package-with-checkmark icon) with a Recently Sold screen. Pull Recently Sold checks eBay's real order data (the Fulfillment API, not a listing report), matches each sold line item back to a local item by SKU, and -- the moment a match is found -- pulls that item out of active inventory and tags it Sold automatically, exactly like a real sale should behave. Condition is read from WIM's own item record since eBay order data does not carry it. Select items and Move to Shipping to advance them (the Shipping screen itself is next). Also fixed a real bug introduced in 2.9.29: items with the new sold status were not actually being excluded from active inventory counts and lists -- they are now."],
  ["2.9.30","Ready to List improvements: the first column is now the item photo instead of being blank, Sub Category was replaced with Listing Price, and a new Quantity column shows how many units of that item are being listed. Tree menu items that have a live count worth seeing at a glance (right now Ready to List, and Listing Review for supervisors) now show a small red (#) badge next to their label in both the tree and the action list, updating immediately as items move in or out -- no need to open the screen just to see if anything is waiting."],
  ["2.9.29","Phase 2: real item statuses and the warehouse listing workflow. Items now have four real statuses: Listed (green, actively on eBay), Created (blue, warehouse sent it for review but not on eBay yet), Active (default, in inventory unlisted), Sold (sold but not fulfilled), and Inactive (historical). Status shows in colored text on every item landing page instead of the old hardcoded Active record label. The Send Listing button (warehouse level) marks an item Created and sends it to the new Listing Review queue instead of pushing to eBay directly. The List on eBay button is only shown to Product Lister level and above (who can push to eBay themselves). Listing Review (Discrepancies tree, supervisor+) shows all Created items with Select All, List Items (pushes to eBay and marks Listed), and Send Back (returns to Active). Also renamed Discrepancies to SKU not Listed in the Live mode tree."],
  ["2.9.28","Phase 1, part 2: the actual enforcement sweep. Every tree menu item now checks the new permissions system and genuinely disappears (not greyed out) for accounts that lack it -- wired through one central mapping rather than scattered checks. Modify Users rewritten to use real supervisory levels: same-level-or-lower editing, admin accounts fully hidden from non-admins (still visible in history/records elsewhere, just not in this list). New Change Password screen (Security, everyone) -- separate from Modify Users, requires the actual current password. Warehouse Only Mode now really redirects to Warehouse instead of just being a label, both at login and if someone tries switching mid-session. Force Log Out exists as a menu item with correct admin-only gating, but is an honest placeholder -- the real feature needs live session tracking that does not exist yet. Also fixed: cloud-authenticated logins (Tyler_admin) now map their role to an equivalent level, so cloud testing does not accidentally get demoted to Basic by this update."],
  ["2.9.27","Phase 1, part 1 of the new permissions system: the actual data model (5 supervisory levels migrated automatically from the old admin/leadership/user roles, a master feature registry, per-user individual overrides that survive a level change) and the full Supervisory Maintenance screen (Configuration, admin only) -- create/rename/delete levels, the two-table feature picker with arrow buttons, and a separate Individual Users tab for per-person overrides on top of their level. Important: nothing elsewhere in WIM actually checks these permissions yet -- that enforcement sweep (making screens and tree items actually hide based on access) is real, separate work coming as the very next update, so this one is testable on its own without anything else changing behavior yet."],
  ["2.9.26","7-day backup fail-safe: if the automated GitHub Actions backup hasn't actually succeeded in 7+ days, WIM downloads an emergency JSON copy of your current cloud items itself and shows a clear warning -- a sign the automation broke (expired token, etc.), not something to wait out quietly. Deliberately does not mark the real automation as healthy when this fires, so the alarm stays accurate. Also fixed a real gap in the GitHub Action itself: it was not actually checking whether the OneDrive upload succeeded before marking the backup successful -- a failed upload (expired token, network blip) would have silently been recorded as a success. Added a Test Fail-Safe Backup Now button to Cloud Sync (Test) to verify this without waiting a real week."],
  ["2.9.25","New Manage Devices screen (Configuration, admin only): lists every device that has ever connected to the team, with a Pause/Resume button per row and a Rename option -- letting an admin remotely control any specific device's sync state from one screen, without needing to walk up to that computer. The This Device Only pause in Cloud Sync Setup is now backed by the same shared device record (it can also be toggled remotely from Manage Devices), instead of being purely local-only as it was in 2.9.24. Connecting a new device now also asks for a Device Name, so it shows up identifiably in the list."],
  ["2.9.24","Two separate pause controls now, not one: Pause This Device (purely local, instant, doesn't touch the database, doesn't affect anyone else -- for routine dev/test work on one machine) and Pause Cloud Sync / All Devices (a real team-wide flag stored on the shared team record, so one admin's click genuinely affects every device, immediately -- for when something bigger is happening). Corrects a real gap from 2.9.23, where the pause toggle only ever lived on one device's local copy and could never have affected anyone else despite looking like a real switch. Everyone now sees a banner when the team-wide pause is on; the device-only pause stays a quiet, admin-only local reminder since nobody else is actually affected by it."],
  ["2.9.23","Fixed the backup schedule: it now actually runs every day (OneDrive Mon/Wed/Fri/Sat, Google Drive Tue/Thu/Sun) with no local-only day anymore -- relying on a person remembering to back up on weekends was exactly what the 7-day fail-safe is meant to replace, so it does not make sense to also keep a fixed local day on the calendar. Rotation limits updated to 91/69 to match. Added Pause/Resume Cloud Sync (Configuration -> Cloud Sync Setup, admin only): while paused, nothing reads from or writes to the cloud -- not even queued for later -- and the Cloud Sync (Test) screen's data buttons lock accordingly, while login keeps working normally. Built specifically for actively developing/testing WIM without test runs quietly filling the real shared database."],
  ["2.9.22","Low cloud-storage warning, on both ends: the OneDrive upload step now checks real remaining space after every backup, writes it to the database, and fails the GitHub Action itself (triggering GitHub's own email) if either drive drops under 500MB. WIM now also reads those same numbers and shows an in-app warning banner to admins -- reusing the same banner style as the existing local-backup reminder -- rather than relying on an email getting noticed. Google Drive's side of this will be added once that upload step itself is built."],
  ["2.9.21","Added the GitHub Actions workflow that keeps Supabase from auto-pausing (a quick ping every few days, well under the 7-day pause window) and dumps a real backup of the whole database every weekday -- both run on GitHub's own servers on a schedule, with no computer needing to be on. The backup currently saves as a temporary GitHub artifact (auto-deleted after 14 days) as a placeholder you can verify works today; the actual OneDrive and Google Drive uploads (with the 90/60-file rotation) are their own next steps, each needing a one-time app setup similar in size to the eBay sign-in work."],
  ["2.9.20","Delta sync: Sync Changes Only (Cloud Sync Test screen) pulls just what changed since the last sync instead of the entire inventory every time, tracked by a watermark based on the server's own timestamps (not the device's clock, which can drift). The first sync on a device still pulls everything once -- there is nothing to compare against yet -- every sync after that only asks for what is new. Reset Sync Point lets you re-test the first-time behavior. Deletions are included in the delta results (not just new/changed items) so a device can find out an item was removed, not just that nothing changed."],
  ["2.9.19","Two cloud-sync foundations, both proven against the Cloud Sync (Test) screen: (1) an offline queue -- if a save can not reach the cloud right now, it is queued instead of lost, and sent automatically the moment connectivity returns (try airplane mode, then Create Test Item, then turn it back off); (2) item locking -- claim/ping/release functions that stop two people from editing the same item at once, with a 90-second auto-expiry so a crash can never permanently lock someone out. Both are backend-proven now; wiring item locking into the real Item Maintenance screen happens as part of the bigger per-screen cloud migration, once items have a stable cloud ID."],
  ["2.9.18","Both the eBay Live Mode badge and the cloud connectivity indicator now react instantly to a real network loss (airplane mode, wifi dropping) -- the OS reports this directly with no polling involved, so both flip to offline immediately at zero bandwidth cost. When the network comes back, that one moment triggers a real check of both eBay and Supabase to find the true state again. Clicking Connect/Disconnect never triggers this -- only an actual change in the network adapter itself does, so the two can not get confused with each other. Note: this catches your whole connection dropping, not eBay or Supabase individually having a bad day with the network otherwise fine -- that would need actual periodic polling, not built here."],
  ["2.9.17","Merged the separate eBay Connect button into the Live Mode badge itself -- click the badge to connect or disconnect, no second button needed. eBay now also auto-attempts connecting silently the moment Live mode opens (if Production keys are saved), instead of requiring a manual click every time; it never shows green until that real check actually succeeds, and a background attempt failing stays silent rather than popping an alert. Added the real cloud-database connectivity indicator next to the username/role text (outlined cloud = connected, cloud with a line through it = can't reach it right now) -- only appears once a device is connected to cloud sync, defaults to assuming online, and rechecks automatically every couple of minutes."],
  ["2.9.16","Fixed a real regression from 2.9.15: connecting a device to cloud sync made the login screen check ONLY the cloud, which broke existing local logins (like the default admin) that were never added to the cloud staff list. Local login is now always checked first, unconditionally -- connecting cloud sync never breaks an existing local login. The cloud is only ever consulted as an additional way to log in, for staff who exist there but not in this device's local list."],
  ["2.9.15","Real cloud login flow: a new Cloud Sync Setup screen (Configuration, admin only) connects a device to your team once with the team code -- after that, the regular User Login screen quietly checks the cloud instead of the local user list, with no team code ever shown to staff again. The login banner now reflects whether this device is connected. A Disconnect option lets an admin undo it if needed. Devices that never connect keep working exactly as they always have, fully local-only."],
  ["2.9.14","Cloud Sync (Test) gained two more buttons: Create Test Item (proves writing to the cloud database works) and Test Conflict Detection (deliberately tries to save a stale version of an item on purpose, to prove the safety check that catches two people editing the same thing at once actually rejects it rather than silently overwriting). Still test scaffolding, not the real migration."],
  ["2.9.13","First real cloud sync test: a Cloud Sync (Test) screen (Configuration, admin only) that logs in against the real Supabase backend with your team code/name/PIN and fetches your items back -- the actual login -> fetch pipeline working end to end from inside WIM, not just the Supabase SQL editor. This is scaffolding to prove the connection works, not the final UI -- the real migration (every screen moving from local-only to networked) comes next."],
  ["2.9.12","Fixed the Rust build error from 2.9.11: when open_url was inserted, it accidentally landed between ebay_oauth_login's #[tauri::command] attribute and the function itself, leaving ebay_oauth_login with no attribute at all (and open_url with a misplaced one) -- causing defined multiple times / cannot find macro errors. Each function now has exactly one attribute directly above it, confirmed against the actual attribute and command counts."],
  ["2.9.11","Fixed every \"open this in your browser\" link in the app (Open Product Research, View links in Find on eBay/Find by Photo/Price Compare, the eBay sold-search fallback, the Messages notification link) -- they were using window.open(), which does not reliably launch the real system browser from inside a Tauri window since it is not an actual browser. They now go through the same mechanism that already worked for eBay sign-in (Rust's open crate via a Tauri command), which is the proper way to do this. This was likely broken since it was first introduced and is a correction, not a new feature."],
  ["2.9.10","Renamed Research on eBay to Open Product Research (matches eBay's own name for the tool). Fixed photos not coming through on paste in Sold Items: a plain textarea can only ever receive plain text on paste -- that is a browser limitation, not something WIM controls -- so the paste box now reads the richer pasted content directly and pulls the real photo URLs out of it (filtered to eBay's own image hosting so logos/icons do not get swept in). Photos are matched by position (1st photo to 1st row, etc.) since there is no reliable way to tie a specific photo to a specific row from copied text alone -- the preview now shows a thumbnail per row so you can confirm they line up correctly before adding."],
  ["2.9.9","Fixed a mismatch in Sold Items: clicking Pull Sold Listings (after the API attempt failed) opened the plain eBay sold-search page, but pasting that into the box gave a confusing wrong-parser error if you actually had the Seller Hub Research tool open. All fallback paths -- Pull Sold Listings, the error screen's manual button, and Research on eBay -- now consistently copy the search text to your clipboard and open the Research tool, so there is one single, working paste flow instead of two that could mismatch."],
  ["2.9.8","Sold Items gained a second source: Research on eBay copies the item's search text to your clipboard and opens eBay's Seller Hub Research tool (richer than the plain sold-search page -- avg sold price, total units sold, last-sold date), then walks you through pasting the results back into WIM with a parser built and tested against a real sample of that exact page. Also added a Condition filter on Sold Items so Suggested Price and Price Range recalculate for just that condition, and results now default-sort by most recently sold. Confirmed: neither this source nor the plain sold-search page expose an original listing date, so Days Listed still is not available from manual sources -- only true with eBay-approved access."],
  ["2.9.7","Price Compare Sold Items now has a real, no-ToS-risk way to get sold data: Pull Sold Listings tries eBay's Marketplace Insights API first (so it auto-upgrades itself for free the day that's ever approved), and falls back to opening a normal eBay sold-listings search in your browser plus a paste box in WIM. Paste what you copy and WIM parses it into rows (title, condition, price, sold date), pre-flagging bundle/lot listings to leave unchecked, with a preview before anything is added. This involves no automated access to eBay -- it is a person reading a webpage and copying text, the same as using Terapeak manually, just streamlined."],
  ["2.9.6","Real eBay Publish/Delist: the listing screen now has Publish to eBay and Delist from eBay buttons that actually talk to eBay (createOrReplaceInventoryItem -> createOffer -> publishOffer, and withdrawOffer to delist), instead of only flipping a local status flag. New one-time Listing setup section in Configuration -> eBay Connection to load and pick your existing shipping/payment/return policies and inventory location (eBay requires these on every offer; WIM cannot invent them). A plain local-status-only toggle link remains for items listed manually outside WIM. Also: Items Needing SKU dashboard widget is now wired to real data (reuses the existing Listed, no SKU puller in the background, refreshes automatically). This is a first build against eBay's well-documented Sell Inventory API, not a beta one, but it has not been tested against a real account yet -- every failure shows eBay's exact response so we can fix anything precisely on the first real attempt, the same way Messages got fixed."],
  ["2.9.5","Find by Photo overhaul: added a Status column, a Buying Option column (fixed price / auction / best offer), a View link to the actual eBay listing, and a + Create item button per row that opens a new WIM item pre-filled from that match (every row correctly shows Active since eBay's image-search API cannot return sold items at all). Replaced the flat gear icon with the new silver 3D gear icon everywhere it appears (Configuration in the tree, widget settings gear, widget settings popup, Configure Widgets button). Find on eBay now has Active / Sold Items / Catalog tabs -- Catalog is your own WIM history and lights up blue only when a match is found, autofilling from Use this. Listing titles are now clickable links to the real eBay listing in Find on eBay and Price Compare. Price Compare gained matching Active / Sold Items tabs, and Date is now Date Listed. Sold Items in both places call eBay's real Marketplace Insights API and show eBay's exact error if the account isn't approved for it -- this requires eBay's separate Application Growth Check process (developer.ebay.com/grow/application-growth-check), not a WIM setting. Days Listed and the Pricing Calculator are intentionally not built yet, pending real approved access to confirm the data is even available."],
  ["2.9.2","Fixed Messages (and any other app) saying \"not connected\" right after connecting via the taskbar Connect button or Configuration. Cause: by default every app opens in its own separate window, which is a genuinely separate program in memory from the main window -- so the online/offline state from 2.9.0 wasn't reaching it. The connection state is now shared across every open window via local storage, and updates live in all of them the instant you Connect or Disconnect anywhere."],
  ["2.9.1","Messages Phase 2 (replying), first attempt: real buyer/seller conversations now show a reply box and Send button instead of a read-only note (eBay's own FROM_EBAY notifications still correctly show as not-repliable). This is a best-effort build against eBay's REST API conventions, not confirmed documentation -- there is no real buyer message in this account yet to test against. If sending fails, the exact request and eBay's response are shown via Show details so it can be corrected precisely, the same way the read side was fixed in 2.8.9-2.8.11. Added a general ebay_post_user command/EBAY.postUser() for this and any future eBay write calls."],
  ["2.9.0","New Connect/Disconnect button next to the Live Mode badge: click Connect to activate the already-saved Production eBay connection without opening Configuration; the badge only turns green once that connection is actually verified live, and starts gray (Offline) every time WIM launches. Disconnect immediately drops the session (it overrides any in-progress connect attempt) and other live features (Messages, Find by Photo, photo upload, etc.) now require an active connection via this button, not just saved keys. New Messages dashboard widget is wired to a real unread count (refreshes automatically, throttled to once a minute) instead of a placeholder."],
  ["2.8.11","Messages fix: eBay's single-conversation endpoint rejects FROM_EBAY (eBay's own automated notifications -- account alerts, password resets, promos) with a confusing \"missing parameter\" error even though the parameter is sent correctly. Confirmed by inspecting the literal request URL added in 2.8.10. WIM now recognizes these as notifications up front and shows the title/date already available instead of repeatedly hitting a call that always fails for this type, with a link to view the full notification on eBay.com. Genuine buyer/seller conversations (a different conversationType) are unaffected and untested until a real one comes in."],
  ["2.8.10","Diagnostic step for the conversation-detail 400 error: every eBay GET error message now shows the exact URL WIM actually requested, so we can see precisely what is or is not being sent instead of guessing. No behavior change for working calls."],
  ["2.8.9","Fixed opening an individual conversation in Messages: eBay's single-conversation endpoint requires a conversationType parameter that WIM was not sending (eBay's error said so directly: Missing the parameter conversationType). WIM now passes the conversation's own type (e.g. FROM_EBAY) along with the request, the same value already shown in the conversation list."],
  ["2.8.8","Messages list fix: the field WIM read the conversation subject from did not match eBay's real field name (conversationTitle), so every conversation showed \"(no subject)\" and a generic \"eBay member\" -- now fixed using the field names confirmed from a real response. Also: conversations from eBay itself (account alerts, password resets, feedback reminders, promos -- conversationType FROM_EBAY) are now labeled eBay (notification) instead of being shown as if they were a buyer message."],
  ["2.8.7","Fixed a bug in Connect with eBay: the field WIM read the new token back from was misnamed, so the saved token was literally the text \"undefined\" instead of the real value -- this is what caused the connect step to report success while everything afterward (Load Inbox, etc.) failed with an invalid_grant error. The token is now read and saved correctly. If you already connected under 2.8.5/2.8.6, just click Connect with eBay again once to overwrite the bad saved value."],
  ["2.8.6","Fixed eBay sign-in setup: eBay rejects a localhost \"auth accepted URL\" outright (it requires https://). WIM now uses a tiny pass-through page hosted on GitHub Pages (docs/ebay-callback.html) as the RuName's accepted URL -- eBay redirects there (satisfying its https requirement), and that page immediately forwards the result to WIM's local listener, unchanged. Updated the in-app eBay Connection instructions and EBAY_SETUP.md with the exact URL to use and the one-time GitHub Pages setup (Settings > Pages > Deploy from branch > main /docs)."],
  ["2.8.5","In-app eBay sign-in: a new Connect with eBay button (Configuration > eBay Connection) opens eBay's real sign-in/consent page in your browser and, the moment you approve, WIM captures the result itself and exchanges it for a User Token directly -- no copy-pasting a token from eBay's developer site anymore. This removes the one external step that could cause eBay's \"issued to another client\" rejection, since the same App ID/Cert ID/RuName that started the sign-in is the same one used to redeem it. Requires a RuName from your eBay keyset pointed at http://localhost:8765/wim-ebay-callback (Sandbox supports this out of the box; see the in-app instructions for Production). The manual paste-a-token method still works as a fallback."],
  ["2.8.4","Dashboard Widget Maintenance fixes & gear-icon widget settings: the available-widgets list is now on the left and the dashboard preview on the right, and that preview now looks like the real dashboard (same cards/tiles) with sample data instead of placeholder boxes. Drag-and-drop was rebuilt from scratch (the old version could show a blocked no-entry cursor and stop working) -- dragging is now handled directly instead of relying on the browser native drag-and-drop, so it should be reliable. Widgets you can adjust (for example Items Sold, Items Added) now show a small gear icon in their top-left corner -- click it to choose Today / This Week / Last 7 Days / This Month / This Year in a small popup, and the widget name updates to match, e.g. \"Items Sold (this week)\". The same gear icon (replacing the old gear character) is now used for the Configure Widgets button and the Configuration tree icon for visual consistency."],
  ["2.8.3","Dashboard Widget Maintenance is now drag-and-drop: a live dashboard preview on the left and an available-widgets list on the right. Drag a widget onto the preview to add it, drag tiles to reorder, drag a tile back to the list to remove it, or click the small ✕ in a tile's corner to remove it (the next widgets shift up). Works per mode (Warehouse/Live); Save applies it."],
  ["2.8.2","Analytics (batch 5 pt.3): new Item Rank report (rank sold items by sales, units, or profit over any date range and category, top or bottom N) under Reports. New Listing Efficiency report (units sold per day over a range, by user, vs an expectation, with exclude-zero-days). New dashboard widgets: Hot Items (best sellers last 30 days, click opens Item Rank), Fastest Turning* and Most Profitable* (leadership), and a Listing Efficiency* tile. Sales/profit use each item's retail (or listing price) minus cost; this completes the internal-data dashboard work."],
  ["2.8.1","Capacity & utilization widgets (batch 5 pt.2): five new dashboard widgets driven by each slot's capacity (the SKU limit set in Warehouse Maintenance) versus how full it is — Warehouse Utilization, Category Utilization (top 3), Slot Utilization (top 3), Slot Open Capacity (top 3), and Category Open Capacity (top 3). Add them from Configuration > Dashboard Widgets."],
  ["2.7.9","Dashboard widgets (batch 5 pt.1): the home dashboard is now built from configurable widgets. New Dashboard Widget Maintenance (Configuration > Dashboard Widgets) lets you pick which widgets show on the Warehouse and Live dashboards and their order, each with a description; widgets marked * (Inventory Value, Highest Value SKU) are leadership/admin only. Widgets included: Items Sold and Items Added (today/week/month/year), Active Items, Units on Hand, Discrepancies, Average Time Listed, Inventory Value*, Highest Value SKU*, plus 30-day Sold/Listed graphs and Top Categories. Items Needing SKU and New Messages are placeholders until the eBay connection is restored."],
  ["2.7.8","Print finish (batch 4 pt.2): new SL-100 label layout (no borders) that prints the Warehouse SKU large and bold, then the Item Number, then the Description — sized to the real SL-100 sheet (2.625in x 1in, 3 across x 10 down, 30 per sheet). Printing now opens an on-screen Print Preview with a Print button (set Margins=None, Scale=100% in the print dialog). Print Configuration has a layout chooser (SL-100 or custom fields); SL-100 is the default. The Print Queue's Print uses the preview and marks rows Printed once you print."],
  ["2.7.7","Modes & Print (batch 4 pt.1): refreshed the left-tree icons (Configuration=gear, Discrepancies=warning triangle, Reports=clipboard, Records=file cabinet) and added a new Print section with a printer icon. Print Configuration moved under Print, and a new Print Queue lives there too. Printing no longer uses a blocked browser pop-up — SKU tags now go to the Print Queue (Queue/Printed/Deleted, select rows and Print). In Warehouse mode you can no longer list directly to eBay: the item page shows 'Send to Live' instead of 'List on eBay', and the Add screen has a new 'Add & Send' button that adds the item and sends it to Live (Ready to List)."],
  ["2.7.6","Category windows: opening a category's Sub Categories editor (and double-clicking a category or group to see its items) now opens in its own window, like item landing pages do — closing out the windowing for these screens. This completes the feedback fixes from the 2.7.1-2.7.3 round."],
  ["2.7.5","Windowing + dropdown fixes: pop-out app windows are now locked to fill their own window (you can no longer drag the app around inside an empty window — dragging the title bar moves the whole window like a normal app), so Previous/Next on the item page reloads in the same spot every time. The Category, Condition, Group and Slot fields on the Item Maintenance and Catalog search screens are now proper dropdowns that match the rest of the app."],
  ["2.7.4","Item Number system: every item now gets a category-based Item Number in the form CategoryID-UniqueID (e.g. a Books & Magazines item becomes 3-73200-xxxxxx). Each individual unit gets its own unique number, generated automatically when the item is created. The Item Number field is now locked and grayed on the item page (it can't be changed even if the category or manual-slot setting changes). You can search by item number without typing the dashes (e.g. 373200301840). Existing items are migrated to the new format."],
  ["2.7.3","Windowing (batch 2): opening an existing item from Item Maintenance or the Catalog now opens that item's landing page in its own separate window, instead of nesting it inside the search window. This fixes the bug where the item landing page couldn't be closed. Previous/Next still page through records within that window. (Applies when floating windows are on, in the desktop app.)"],
  ["2.7.2","UI fixes (batch 1, part 2): Next/Previous record buttons now work on the item page (they were being looked up in the wrong place). Saving shows clear feedback — a 'Saved' toast and the changed fields briefly flash green. Adding warehouse inventory now asks if you want to create SKU tag(s) to print. The Groups tab has a search box to filter the assignable groups. And the app no longer follows Windows dark mode (forced light rendering). Note: the auto-update 'error opening file for writing' message still needs a dedicated fix."],
  ["2.7.1","UI fixes (batch 1, part 1): restored the WIM icon in window headers (now a clear chip on the gray bar); windows fill the whole app area so there's no gap above the title bar or below the footer (removes the 'app in front of another app' look); the Search/Location info moved up inline with the toolbar row instead of sitting on its own row; and dropdowns are now consistently styled everywhere."],
  ["2.6.12","Added a 'Support info' button in Messages that runs the eBay token exchange and shows the full request (including the Base64 Authorization header), the HTTP status, the response body, and the rlogid / request-id response headers — all copyable — so eBay Developer Support gets exactly what they asked for."],
  ["2.6.11","Likely fix for the eBay user-token 'invalid_grant' error: if a refresh token was generated from a URL-encoded authorization code (containing %23/%5E/%3D instead of #/^/=), it looks valid but always fails. WIM now auto-decodes URL-encoded tokens when you save them, and the Diagnose tool detects and tests this case."],
  ["2.6.10","Enhanced messages diagnostics: now shows the masked App ID, Cert ID and token with their lengths and a check for stray spaces/newlines, plus the token prefix — to pinpoint why the user token is rejected (refresh vs access token, wrong cert, hidden whitespace)."],
  ["2.6.9","Messages diagnostics: added a Diagnose button that tests your token and probes the eBay messaging endpoints, plus made all eBay error/raw output selectable with a Copy button so it can be shared easily. This is to pinpoint why the inbox returns an error."],
  ["2.6.8","Fix: the Messages window crashed on open (the Load Inbox button lives in the toolbar but was being looked up in the body), which also showed as a pop-out failure. Now opens correctly."],
  ["2.6.7","Messages, phase 1 (read): the Communication tool is now an in-app inbox. Click Load Inbox to pull your eBay buyer conversations, click one to read the full thread, and if the message is about an item already in WIM the matching item card (photo, SKU, price) shows alongside with an Open item button. Read-only for now; replying from WIM comes next. Uses the commerce.message scope."],
  ["2.6.6","Replaced the purple theme with a professional gray theme: a medium-gray header band with white titles on every window, lighter grays through the toolbars and content backdrops, and a subtle blue accent for buttons, links, selected rows and tabs."],
  ["2.6.5","Purple theme: bold #9D00FF header bands across every window with white titles, and lighter purple tints throughout — toolbars, table headers, tabs, selected rows, buttons, and content backdrops — for stronger color and clearer separation between sections (less white wash)."],
  ["2.6.4","More color and less white: window title bars are a richer indigo, table headers are tinted indigo, and window bodies now have a soft tinted backdrop so the forms and tables read as white cards floating on it instead of one big white sheet. New Find by Photo tool (under Item Maintenance / Manage Listings): pick a photo, search eBay for visually similar listings, tick the ones that match, and get a median price and range."],
  ["2.6.3","UI refinement: window title bars and toolbars now have a subtle indigo tint so they read as distinct bands instead of an all-white sheet (applied to every window). The login screen now fills the whole app surface instead of appearing as a small floating window sitting on a blank background."],
  ["2.6.2","Dashboard home screen (modern UI phase 2): the launcher now opens to a Dashboard with summary cards (Active Items, Units on Hand, Listed on eBay, Sold This Month), an Items-Sold chart for the last 6 months, a Top Categories breakdown, and inventory value at cost. Click a menu option to open a tool, or click the WIM title to return to the Dashboard."],
  ["2.6.1","Modern visual refresh (phase 1): white rounded cards with soft shadows, a friendlier font, an indigo accent, pill-shaped status badges, cleaner tables with more breathing room, and softer buttons and fields throughout — while keeping WIM's draggable floating-window workflow. Same screens, fresh look."],
  ["2.6.0","Listed, no SKU (Phase 1): new Discrepancies > Listed, no SKU screen in Warehouse mode. 'Pull New Listings' fetches your active eBay listings, hides the ones already filed in WIM, and shows the rest. Click File on one and it opens Add Inventory pre-filled with the listing's title, condition, price and photos so you just assign a slot/SKU; it's saved as Listed. If a pulled listing looks like a copy of something already filed (similar title + condition within your tolerance), WIM offers to file it as another quantity next to the existing item instead. Never merges automatically."],
  ["2.5.1","Condition-match tolerance is now configurable in Listing Configuration and defaults to Relaxed (within 2 steps on the category's eBay scale), so e.g. a Like new book listing can match an existing Good copy. Switch to Strict (1 step) anytime."],
  ["2.5.0","Foundation for pulling your own listings: WIM now uses eBay's official categories and each category's official condition scale (e.g. Books: Brand new -> Like new -> Very good -> Good -> Acceptable). Replaces the old placeholder categories/conditions. New Listing Configuration screen under Configuration (eBay seller name + fuzzy-title-match toggle). Adds the duplicate-match engine (same category, condition within one step on that scale, fuzzy title) that the upcoming Pull New Listings feature will use."],
  ["2.4.8","Polish: every column in Item Maintenance now has a filter caret (including Item Number, SKU, On Hand, and the Sold checkbox — whose filter offers Checked / Unchecked). The Floating/Docked control in the title bar is now a plain clickable icon instead of a button."],
  ["2.4.7","Three things. (1) The Floating/Docked control is now a small pop-out icon in the launcher title bar next to Switch/Log out (blue = floating, gray = docked) instead of footer text. (2) The same multi-select column filter + click-header-to-group from Price Compare now works on Item Maintenance, Live Inventory, and Manage Listings — click a column's small ▾ to filter to any values, click a header to group/sort. (3) The login updater check now retries a couple times before reporting a problem, so a brief network hiccup no longer flashes an error."],
  ["2.4.6","Floating windows: every app now opens in its own movable desktop window automatically (no button needed). A 'Windows: Floating/Docked' toggle in the launcher footer turns it off if you prefer the old single-window behavior; if a window can't float it falls back to opening docked. Experimental."],
  ["2.4.5","Price Compare column tools reworked: click a column's pin to open a checkbox dropdown with Select all (checked by default) — check as many values as you like and the table filters to any of them, recomputing the avg and range live. Click a column header to group rows by that value alphabetically. (Rolling this out to the other search tables comes next.)"],
  ["2.4.4","Re-ship of the 2.4.3 changes (the previous build went out without the updated index.html, so its features were missing): per-environment eBay keys, Price Compare top-15 + column filter pins with recompute, and the login-screen updater status line."],
  ["2.4.3","Three improvements. (1) eBay Connection now remembers separate Sandbox and Production keys — flip the environment and the matching keys load; the environment also persists properly. Find on eBay now retries without the category filter when a search comes back empty, and tells you if you're on Sandbox (which has no real listings). (2) Price Compare pulls the top 15, and each column (Condition, Price, Date, Category) has a little filter pin — filter to a value and the Suggested Price and Range recompute from just the shown rows. (3) The login screen shows an updater status at the bottom: Checking for updates… → Up to date / Installing update / Update installed."],
  ["2.4.2","Auto-update plumbing fix: the build now publishes latest.json to a dedicated updater branch, and the app checks it at a direct raw URL instead of GitHub's redirect link (which the updater would not follow). This is the cross-over install; the version after it should auto-update on its own."],
  ["2.4.1","Find on eBay now fills the top fields, not just Listing Details: the listing title flows into Item Description, the matched eBay category is pulled into the top Category (and its fields load automatically, so you no longer have to set the category first), and the price pulls in. The eBay-listing Price is editable again and linked to the top Price — typing in either updates both. The confusing read-only Status field is relabeled Listing status (it shows not listed/listed/delisted — not condition)."],
  ["2.4.0","Updater endpoint corrected (was pointing at a non-existent {{version}} URL that always failed). Auto-update should work from this version forward."],
  ["2.3.8","Pop-out permission fix: the app now actually grants the window-creation permission (the missing piece behind the “not allowed by ACL” error), so the pop-out ⧉ button can open a separate window. This requires copying the updated capabilities file (see steps)."],
  ["2.3.7","Auto-update repair: WIM is moving to a fresh signing key so future versions update themselves automatically (one last manual install needed for this one). Also made the experimental pop-out (⧉) button report errors instead of silently doing nothing, with a fallback for finding the window-creation tool."],
  ["2.3.6","Item photos can now be uploaded to eBay Picture Services. On an item's Listing Details tab, add photos then click Upload photos to eBay — WIM sends them to eBay's image host and saves the eBay-hosted links on the item, ready for publishing. (Experimental; uses eBay's Trading upload API.)"],
  ["2.3.5","Experimental Pop-out windows: Item Maintenance, Bulk Add, Manage Listings and Live Inventory now have a pop-out button (⧉) in their title bar that opens them in their own separate desktop window you can move anywhere. Windows sync your data through storage. This is experimental and best used one editor at a time — see notes."],
  ["2.3.4","Slots can now hold more than one category. Slot Maintenance lets you tick every category a slot should hold (with the slot list showing all of them). When Find on eBay pulls in a category that doesn't exist yet, choosing Create now opens a Create Category window where you name it and pick which slot(s) it belongs to (filterable list showing each slot's current categories); Cancel still defaults the item to NONE."],
  ["2.3.3","WIM now opens as a normal, resizable desktop window sized to your screen instead of taking up the whole screen — move it, resize it, or maximize it from the title bar like any app. (Note: tool windows still open inside the WIM window; making each one a separate window that floats anywhere on the desktop is a larger rearchitecture planned as its own update.)"],
  ["2.3.2","Item pages opened from an Item Maintenance search now have Previous/Next arrows and a counter (e.g. 3 / 7) in the toolbar, so you can thumb through all matching records without going back to the list. The arrows grey out at the first and last record, and if you have unsaved changes it asks before moving on."],
  ["2.3.1","New Price Compare tab on the item page: pulls the top 10 similar eBay listings (thumbnail, title, condition, price, date, category). Shows a Suggested Price (average) and Price Range across them. Compare on any row copies its title, condition and price onto the item and logs the changes to Item History. Remove rows to re-figure the average/range, and Update Listings re-pulls with a last-pulled timestamp."],
  ["2.3.0","Item page reorganized: Price and Cost now sit at the top; the item's own description is labeled Item Description (the eBay listing text stays Description); and the eBay Listing Fields + listing section moved into a new Listing Details tab next to Groups and Item History. The page now scrolls as one continuous page with the Save bar pinned, instead of small inner scrollbars."],
  ["2.2.9","Find on eBay now shows the top 10 similar listings after you pick a category — each with a thumbnail, title, condition, category and price. Choose one and it loads into the item: listing title fills the Description, the UPC fills the Item Number, eBay fields fill in, and the eBay main category is pulled in as the item's Category (with a prompt to create it if it doesn't exist yet, or default to NONE). Includes a Back button to reselect, and a 'just use the category fields' option to fill them in manually."],
  ["2.2.8","Bulk Add Create works again (and now shows a message if a row has a problem instead of doing nothing); you can open Find on eBay from a Bulk Add row without typing a description first. Live indicator is back to green Live Mode. Removed the red Stop button from the item page. eBay listing fields now use clean inline auto-complete that matches the app, and the browser's own autofill no longer intrudes."],
  ["2.2.7","Fix: restored a missing function (backupAgeDays) that caused a blank launcher after login, and wrapped the launcher render so a single error can no longer blank the screen."],
  ["2.2.6","Stability fix: removed the automatic category reset that could blank the app on startup. WIM now only ensures General, NONE, and Bulk exist (nothing is deleted or forced). Added a startup safety net so a data-load problem shows a readable message instead of a blank screen, and turned on the developer console (F12) for easier troubleshooting."],
  ["2.2.5","eBay verbiage now says User Token; Live indicator shows Offline (gray) until a live eBay connection is confirmed, then Live Mode (green). Find on eBay starts fresh each time, the change link resets the search, picking an eBay category creates/assigns a matching sub category, and the listing title flows into the description. Item page drops Unit Cost/Retail, validates required eBay fields with a red * before adding, and scrolls as one page. Bulk Add leads with a search (magnifying glass) column and shows Sub Category instead of Group. Warehouse uses Send to Listing into a new Ready to List view in Live mode."],
  ["2.2.4","Live eBay read features: a 🔍 Find on eBay button on the item page pulls eBay's category and listing fields and auto-fills them into the sub category (tagged *NEW); and Pull Active Listings (in Manage Listings and Live Inventory) refreshes your listings from eBay and matches them to WIM by SKU."],
  ["2.2.3","Live mode: Add Items now offers Bulk Add Items, and Manage Listings has a View Live Inventory list of all active listings. The app now opens as just the login window (it grows to full size after sign-in) instead of a small login over a large empty window."],
  ["2.2.2","Two modes: choose Warehouse or Live at login; the launcher shows the current mode (Live has a green dot). New Live shell with Manage Listings, Add Items, Communication (opens eBay messaging), Reports, and a Discrepancies view that lists active SKUs not yet listed. Categories are now eBay-aware with Sub Categories (each can map to an eBay category and carry its own listing fields); a new NONE category is the default. New Description Manager under Configuration for reusable, category-filtered listing descriptions, with a prompt to push edits through to affected live listings. Items now hold listing details, a featured photo, and subsidiary photos. (Live eBay calls — catalog field auto-fill, photo upload, publishing — arrive in the next updates.)"],
  ["2.2.1","Window-style interface: WIM now looks like a normal Windows program — flat native workspace, no painted desktop background or fake taskbar. The launcher fills the app window (tool windows open in front of it, RPM-style), and minimize/maximize/full screen come from the real window title bar. Log out moved to a button in the launcher header."],
  ["2.2.0","Standalone desktop build (Tauri): real application window, no browser, unlimited local storage, GitHub auto-update, and direct live eBay connectivity (Test Connection + Create/Update eBay Inventory Item)."],
  ["2.1.7","Backup reminder for System Administrators on the launcher when no backup has been taken in 7+ days. Prepared for the standalone (Tauri) build with direct eBay connectivity."],
  ["2.1.6","No more browser pop-ups — all confirmations are now in-app. Delete is a trash-can icon that lets you pick which SKU(s) to remove and is fully reversible from Records. Bulk Add: created rows are clickable (double-click to open) with a + to add more before printing labels. New Print Configuration to design your label template, and a printer menu on the item page to choose which SKUs to print. Conditions are now per-Category. New Active Summary report (movement by type over a date range). Barcode-scanner friendly entry. First-iteration eBay connection settings."],
  ["2.1.5","Manage Inventory menu (Add / Sell / Adjust Inventory) with renamed tools. New Adjust Inventory to pull stock for reasons like Damaged/Lost/Theft, plus Adjustment Configuration. Records now log every Add, Sell, and Adjustment with Record #, User, and Type, and are searchable. Item page: Okay becomes Save when you edit, with a top Save icon and a save-prompt on Cancel. Sold catalog items can be Reactivated back into inventory. Double-click a Category/Group to see its items. Bulk Sell: green + in its own column (only when On Hand > 1) and a Review Order screen before selling."],
  ["2.1.4","Same Item Number now groups as one item (quantity) in Item Maintenance — On Hand shows the total, Warehouse SKU shows the first to sell (closest to A.1.01) with a dropdown of all units. On Hand and Category are read-only (Category unlocks only with Manually slot). New Item History tab logs every change. Changing a slot's Category now re-tags the items inside it, and slots can be sorted by Category. Type-ahead autofill on Category/Group/Condition. Bulk Add: press Enter to add the next record. Redesigned Bulk Sell with a single scan/type box. Invoices renamed Records; Add/Sell renamed Inventory Adjustment. Category/Group/Condition Maintenance save instantly (just an Okay button)."],
  ["2.1.3","\"Category\" replaces \"Section\" throughout. Slots and items now carry a Category, and items only auto-slot into a slot of the same Category (existing slots set to \"General\"). Storage moved to IndexedDB — far higher capacity, no more ~5MB ceiling. New Condition Maintenance (rename updates all items; delete clears the tag). Vendor Management reworked with inline Modify and a Save button. Add/Bulk Add/Sell/Bulk Sell moved to a new Add/Sell menu. User privilege levels: System Administrator, Leadership, User, with menu visibility per level."],
  ["2.1.2","Quantity on Add and Bulk Add — each unit gets its own Warehouse SKU, kept together and consecutive in a slot (spilling to the next slot only when one is full). New Condition attribute (set per item, shown as a column, searchable). New Reports menu: Aging Inventory (30/60/90 days) and Item Report (sortable). Sell and Bulk Sell tools under Item Maintenance. \"UPC\" renamed to \"Item Number\" throughout. Bulk Add's Create button becomes Print to print labels for the items just added. Removed the Families column from the item page."],
  ["2.1.1","Working maximize button; windows now auto-fit the screen. Search headers show on open (rows wait for Search). Section/Slot/Group are type-or-pick comboboxes, blank = all, with a \"None\" option for Section/Group. Real stop sign cancels a search. Item page button reads Okay / Add Item and closes on click; UPC now optional. New Add and Bulk Add tools, Vendor Management, and Invoices moved to its own menu. Invoices show the seller's name. Short Name limited to 2 letters; only the admin can reset the admin password."],
  ["2.1.0","Search runs on demand (no auto-load); sortable result columns; Sold checkboxes + batch \"Items Sold\" with printable order and Invoices application (partial/full reversals). New Section Code & Group Maintenance apps. Item page trimmed (manual-slot, fewer fields). Warehouse Maintenance sort by mapping order/capacity and filter by row. New app icon. \"Records: #\" counter and PDF print of results."],
  ["2.0.0","Local edition: slot SKU limits + manual-slot flag, auto-slot algorithm, zero-padded SKUs, item photos, sold/catalog with timestamps, admin backup & restore."]

/* ---------- persistence (IndexedDB, with localStorage fallback) ---------- */
let MEM=null;
const IDB_NAME="WIM_DB", IDB_STORE="state", IDB_KEY="db";
function idbOpen(){ return new Promise((res,rej)=>{ if(!window.indexedDB){ rej(new Error("no idb")); return; }
  const r=indexedDB.open(IDB_NAME,1);
  r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
  r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); }); }
function idbGet(){ return idbOpen().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readonly"); const rq=tx.objectStore(IDB_STORE).get(IDB_KEY); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); })); }
function idbPut(val){ return idbOpen().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readwrite"); tx.objectStore(IDB_STORE).put(val,IDB_KEY); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); })); }
let wimSyncBC=null; try{ wimSyncBC=new BroadcastChannel("wim-sync"); }catch(e){}
function save(){ MEM=DB; idbPut(DB).catch(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){ console.warn("WIM: could not persist data",e); } });
  try{ if(wimSyncBC) wimSyncBC.postMessage({t:"changed",at:Date.now()}); }catch(e){} }

// Reusable multi-select column filter for any results table.
function makeColFilter(){
  const filt={}; // key -> array of allowed string values (absent = all)
  const norm=v=>String(v==null?"":v);
  function apply(rows, colVal){ const keys=Object.keys(filt); if(!keys.length) return rows;
    return rows.filter(r=> keys.every(k=>{ const sel=filt[k]; if(sel===undefined) return true; return sel.includes(norm(colVal(r,k))); })); }
  function active(key){ return filt[key]!==undefined; }
  function pinHtml(key){ return `<span class="cf-pin" data-key="${key}" title="Filter this column" style="cursor:pointer;color:${active(key)?'#1f5fbf':'#9a9a9a'};font-size:11px;margin-left:4px;">&#9662;</span>`; }
  function closeMenu(){ const m=document.getElementById("cf-menu"); if(m) m.remove(); }
  function wire(scope, allRowsFn, colVal, rerender){
    scope.querySelectorAll(".cf-pin").forEach(p=>{ p.onclick=(e)=>{ e.stopPropagation(); openMenu(p, p.dataset.key, allRowsFn, colVal, rerender); }; });
  }
  function openMenu(anchor, key, allRowsFn, colVal, rerender){
    closeMenu();
    const vals=[...new Set(allRowsFn().map(r=>norm(colVal(r,key))).filter(v=>v!==""))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:"base"}));
    if(!vals.length) return;
    const sel = filt[key]!==undefined ? filt[key] : vals.slice();
    const m=document.createElement("div"); m.id="cf-menu"; const r=anchor.getBoundingClientRect();
    m.style.cssText="position:fixed;top:"+(r.bottom+3)+"px;left:"+Math.max(8,Math.min(r.left-90,window.innerWidth-200))+"px;z-index:99999;background:#fff;border:1px solid #9a9a9a;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.18);padding:6px;min-width:160px;max-height:300px;overflow:auto;font-size:12.5px;";
    const rowHtml=(ck,lbl,v)=>`<label style="display:flex;align-items:center;gap:7px;padding:3px 6px;cursor:pointer;white-space:nowrap;"><input type="checkbox" ${ck?'checked':''} data-v="${esc(String(v))}"> ${esc(lbl)}</label>`;
