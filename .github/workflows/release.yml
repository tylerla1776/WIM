name: release
# Builds the Windows installer, signs it for the auto-updater, creates a GitHub
# Release, uploads latest.json, AND publishes latest.json to the "updater" branch
# at a direct (non-redirecting) raw URL so installed apps can fetch it cleanly.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#     TAURI_SIGNING_PRIVATE_KEY            -> contents of the private key file
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD   -> the key password
#
# To publish a new version: bump the version numbers, commit, then:
#     git tag v2.4.2
#     git push origin v2.4.2

on:
  push:
    tags:
      - "v*"

# Only ever ONE release build per tag.
#
# This exists because of a real failure: an old copy of this workflow was still sitting in
# .github/workflows/ under a "backup" filename. GitHub runs EVERYTHING in that folder, so every
# tag built WIM twice, on two runners. Each one compiled its own installer and SIGNED it with its
# own signature, then both raced to upload to the same Release. One won the .msi, the other won
# latest.json -- so the published signature described a binary that was never uploaded, and every
# auto-update died with "signature didn't match". The loser's failed upload was the
# "Not Found - update-a-release-asset" error that looked harmless and wasn't.
#
# The duplicate file is gone. This guard makes sure a second run can never quietly corrupt a
# release again: if one somehow starts, it is cancelled rather than allowed to overwrite.
concurrency:
  # GLOBAL group (not per-tag). Two release runs were firing for every tag at the same
  # instant, each building and signing its own installer. One run's release assets won,
  # the other run's latest.json won -- so the published signature described a binary that
  # no longer existed, and every auto-update failed with "signature didn't match".
  # A single global group means a second run is cancelled instead of racing.
  group: release
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # The installer and its signature MUST come from the same build. If a release already exists
      # for this tag (a re-run, or a re-pushed tag), clear it out first so we never end up with a
      # binary from one build and a latest.json from another.
      - name: Clear any existing release for this tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "A release already exists for ${{ github.ref_name }} -- deleting it so this build owns both the installer and its signature."
            gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes
          else
            echo "No existing release for ${{ github.ref_name }}. Good."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache the compiled Rust dependencies between builds. Without this, every single release
      # recompiles all ~400 Tauri crates from an empty machine — which is why builds were taking
      # 20-30 minutes. Only WIM's own code needs rebuilding each time; the libraries underneath it
      # do not change. First build after this is still slow (it has to fill the cache); after that
      # they should land in a few minutes.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WIM ${{ github.ref_name }}"
          releaseBody: "Download the installer below. Existing installs will auto-update."
          releaseDraft: false
          prerelease: false

      # Publish latest.json to the dedicated "updater" branch so the app can fetch it
      # from a direct raw.githubusercontent.com URL (GitHub's /releases/latest/ URL is a
      # redirect the in-app updater does not follow). This runs AFTER the release above,
      # so a failure here never blocks the normal release.
      - name: Publish latest.json to updater branch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Downloading latest.json AND the signature asset from the release..."
          mkdir -p "$RUNNER_TEMP/upd"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" --pattern "*.sig" \
            --dir "$RUNNER_TEMP/upd" --clobber

          # THE GUARANTEE: rewrite every platform signature in latest.json using the .sig file
          # that is actually attached to this release. Even if another run raced us, what we
          # publish always describes the binary sitting on the release right now.
          SIGFILE=$(ls "$RUNNER_TEMP/upd"/*.sig | head -n1)
          echo "Using signature file: $SIGFILE"
          SIG=$(tr -d '\r\n' < "$SIGFILE")
          if [ -z "$SIG" ]; then echo "::error::No signature asset found on the release."; exit 1; fi
          jq --arg sig "$SIG" '.platforms |= with_entries(.value.signature = $sig)' \
            "$RUNNER_TEMP/upd/latest.json" > "$RUNNER_TEMP/upd/latest.fixed.json"
          mv "$RUNNER_TEMP/upd/latest.fixed.json" "$RUNNER_TEMP/upd/latest.json"

          # Sanity: the installer named in latest.json must exist on the release.
          EXE=$(jq -r '.platforms["windows-x86_64"].url' "$RUNNER_TEMP/upd/latest.json" | sed 's#.*/##')
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets \
               --jq '.assets[].name' | grep -qx "$EXE"; then
            echo "::error::latest.json points at $EXE but that asset is not on the release."
            exit 1
          fi
          echo "Verified: latest.json signature matches the release .sig, and $EXE exists."

          echo "Cloning repo to publish to updater branch..."
          cd "$RUNNER_TEMP"
          rm -rf repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo
          cd repo
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin updater >/dev/null 2>&1; then
            echo "updater branch exists; checking it out"
            git checkout updater
          else
            echo "creating updater branch"
            git checkout --orphan updater
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$RUNNER_TEMP/upd/latest.json" latest.json
          git add latest.json
          git commit -m "latest.json for ${{ github.ref_name }}" || echo "no changes to commit"
          git push origin updater
          echo "Published latest.json to updater branch."

          # Final proof: what is now on the updater branch must match the release signature.
          PUBLISHED=$(jq -r '.platforms["windows-x86_64"].signature' latest.json)
          if [ "$PUBLISHED" != "$SIG" ]; then
            echo "::error::Published latest.json does not match the release signature."
            exit 1
          fi
          echo "Verified after push: updater feed and release signature agree."
