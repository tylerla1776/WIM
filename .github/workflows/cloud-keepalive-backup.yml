name: cloud-keepalive-backup
# Two jobs that run on GitHub's own servers, on a schedule — neither depends on any
# computer being turned on.
#
#   keepalive: touches the database every few days so Supabase's free tier never
#              auto-pauses it from inactivity (it pauses after 7 days untouched).
#   backup:    dumps the whole database every single day and uploads it to OneDrive,
#              keeping a rolling 160-day history and deleting the oldest once that
#              limit is hit. A second cloud destination (for cross-provider redundancy)
#              was considered -- Google Drive needed a multi-week Google verification
#              wait for a non-expiring credential, Dropbox's free tier (300MB) was too
#              small to be useful here -- so for now it's OneDrive alone, which has
#              comfortable room (1TB) for this at any realistic inventory size. There's
#              no local-only day either: relying on a person remembering to back up
#              manually was exactly what we wanted to avoid, so the 7-day fail-safe
#              inside WIM itself is the actual safety net for "what if this silently
#              stops working," not a fixed local day on the calendar.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#     SUPABASE_DB_URL        -> the database connection string from Supabase
#                              (click Connect at the top of the dashboard -> Session pooler --
#                              Direct connection uses IPv6, which GitHub's runners can't reach,
#                              so Session pooler is the one that actually works here)
#     ONEDRIVE_CLIENT_ID      -> from the Azure app registration
#     ONEDRIVE_CLIENT_SECRET  -> from the Azure app registration
#     ONEDRIVE_REFRESH_TOKEN  -> from the one-time sign-in/consent flow
#
# Note on the OneDrive refresh token: it's a long-lived credential, but if Microsoft
# ever rotates it out from under us, the fix is just redoing that one-time sign-in flow
# and dropping the new value into ONEDRIVE_REFRESH_TOKEN -- not something to over-engineer
# automatic renewal for until it's actually needed.
#
# Note on the 3am schedule: GitHub Actions cron always runs in UTC and does not
# shift for daylight saving time, so this will actually run at 3am Central time
# in winter (CST) and 4am in summer (CDT) -- a one-hour drift twice a year that
# doesn't matter for an overnight backup.

on:
  schedule:
    - cron: '0 9 */3 * *'   # keep-alive, roughly every 3 days
    - cron: '0 9 * * *'     # backup, every single day -- all going to OneDrive (1TB headroom comfortably covers it); Google Drive/Dropbox were considered for a second destination but ruled out (Drive needed a multi-week Google verification wait, Dropbox's free tier was too small) -- no local-only day either, that's what the 7-day fail-safe inside WIM is for instead
  workflow_dispatch: {}              # lets you trigger this manually from GitHub's Actions tab, for testing

jobs:
  keepalive:
    if: github.event.schedule == '0 9 */3 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install matching postgres client (v17, to match Supabase's server version)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: Touch the database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: psql "$SUPABASE_DB_URL" -c "select 1;"

  backup:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install matching postgres client (v17, to match Supabase's server version)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: Dump the database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          STAMP=$(date +%Y-%m-%d_%H%M)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -f "backups/wim-backup-$STAMP.sql"
          ls -lh backups/
      - name: Upload to OneDrive (160-file rolling history)
        env:
          CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          FOLDER="WIM-Backups"
          FILE=$(ls backups/*.sql | head -n1)
          NAME=$(basename "$FILE")

          # Trade a saved refresh token for a fresh, short-lived access token
          TOKEN_RESPONSE=$(curl -s -X POST https://login.microsoftonline.com/common/oauth2/v2.0/token \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" \
            -d "grant_type=refresh_token" \
            -d "scope=Files.ReadWrite offline_access")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Could not get an access token. Response was:"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          # Uploading to a path under a folder that doesn't exist yet creates the folder
          # automatically -- no separate "create folder" step needed.
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            "https://graph.microsoft.com/v1.0/me/drive/root:/$FOLDER/$NAME:/content" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$FILE")
          UPLOADED_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.id // empty')
          if [ -z "$UPLOADED_ID" ]; then
            echo "::error::Upload to OneDrive failed -- not marking this as a successful backup. Response was:"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi
          echo "$UPLOAD_RESPONSE" | jq '{name, size, id}'

          # Rotation: once there are more than 160 backups in that folder, delete the
          # oldest ones until exactly 160 remain.
          curl -s "https://graph.microsoft.com/v1.0/me/drive/root:/$FOLDER:/children?\$select=id,name,createdDateTime&\$orderby=createdDateTime%20asc&\$top=999" \
            -H "Authorization: Bearer $ACCESS_TOKEN" > files.json

          COUNT=$(jq '.value | length' files.json)
          EXCESS=$((COUNT - 160))
          if [ "$EXCESS" -gt 0 ]; then
            echo "Have $COUNT backups in OneDrive, removing the oldest $EXCESS to stay at 160."
            jq -r ".value[0:$EXCESS][].id" files.json | while read -r ID; do
              curl -s -X DELETE "https://graph.microsoft.com/v1.0/me/drive/items/$ID" \
                -H "Authorization: Bearer $ACCESS_TOKEN"
            done
          else
            echo "Have $COUNT backups in OneDrive, under the 160 limit -- nothing to remove."
          fi

          # Check how much space is actually left, write it to the database so WIM can
          # show admins an in-app warning, and fail this step (which triggers GitHub's
          # own "workflow failed" email) if it's getting low.
          QUOTA=$(curl -s "https://graph.microsoft.com/v1.0/me/drive" -H "Authorization: Bearer $ACCESS_TOKEN")
          REMAINING=$(echo "$QUOTA" | jq -r '.quota.remaining')
          echo "OneDrive space remaining: $REMAINING bytes"

          # psql is already installed and on PATH from the earlier step in this job.
          psql "$SUPABASE_DB_URL" -c "update backup_status set onedrive_remaining_bytes = $REMAINING, onedrive_checked_at = now(), last_backup_at = now() where id = 1;"

          if [ "$REMAINING" -lt 524288000 ]; then
            echo "::error::OneDrive has less than 500MB free ($REMAINING bytes remaining) -- the backup itself succeeded, but space is running low."
            exit 1
          fi
      - name: Also keep this run's backup as a short-lived GitHub artifact (bonus extra copy, not depended on)
        uses: actions/upload-artifact@v4
        with:
          name: wim-backup-${{ env.STAMP }}
          path: backups/*.sql
          retention-days: 14
